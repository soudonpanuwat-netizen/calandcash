async function uploadImageToStorage(dataUrl, prefix) {
  if (!dataUrl || !dataUrl.startsWith('data:')) return dataUrl || '';
  if (!sb) return dataUrl;
  try {
    const res = await fetch(dataUrl);
    const blob = await res.blob();
    const path = `${prefix}/${Date.now()}-${Math.random().toString(36).slice(2, 8)}.jpg`;
    const { error: uploadError } = await sb.storage.from(IMAGES_BUCKET).upload(path, blob, { contentType: 'image/jpeg', upsert: true });
    if (uploadError) { console.error('uploadImageToStorage failed:', uploadError); return dataUrl; }
    const { data } = sb.storage.from(IMAGES_BUCKET).getPublicUrl(path);
    return data.publicUrl;
  } catch (err) {
    console.error('uploadImageToStorage failed:', err);
    return dataUrl;
  }
}

async function fetchProductsFromCloud() {
  if (!sb) throw new Error('ไม่พบไลบรารี Supabase');
  const { data, error } = await sb.from(PRODUCTS_TABLE).select('*').order('expiry_date', { ascending: true });
  if (error) throw error;
  return (data || []).map(rowToProduct);
}
async function fetchPendingFromCloud() {
  if (!sb) throw new Error('ไม่พบไลบรารี Supabase');
  const { data, error } = await sb.from(PENDING_TABLE).select('*').order('submitted_at', { ascending: false });
  if (error) throw error;
  return (data || []).map(rowToPending);
}

async function saveProducts(list) {
  if (!sb) return false;
  try {
    const ids = list.map((p) => p.id);
    if (ids.length > 0) {
      const { error: delError } = await sb.from(PRODUCTS_TABLE).delete().not('id', 'in', `(${ids.join(',')})`);
      if (delError) throw delError;
    } else {
      const { error: delAllError } = await sb.from(PRODUCTS_TABLE).delete().gte('id', 0);
      if (delAllError) throw delAllError;
    }
    if (list.length > 0) {
      const rows = list.map(productToRow);
      const { error: upsertError } = await sb.from(PRODUCTS_TABLE).upsert(rows, { onConflict: 'id' });
      if (upsertError) throw upsertError;
    }
    return true;
  } catch (err) {
    console.error('saveProducts (Supabase) failed:', err);
    return false;
  }
}

async function savePending(list) {

// ==================== Domain helpers ====================
function getStatus(expiryDateStr) {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const exp = new Date(expiryDateStr + 'T00:00:00');
  const diffDays = Math.ceil((exp - today) / 86400000);
  if (diffDays < 0) return 'expired';
  if (diffDays <= URGENT_WINDOW_DAYS) return 'urgent';
  return 'safe';
}
function daysUntil(expiryDateStr) {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const exp = new Date(expiryDateStr + 'T00:00:00');
  return Math.ceil((exp - today) / 86400000);
}
function withComputed(p) { return { ...p, status: getStatus(p.expiryDate), daysLeft: daysUntil(p.expiryDate) }; }
function formatThaiDate(dateStr) {
  return new Date(dateStr + 'T00:00:00').toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: '2-digit' });
}
function escapeHtml(str) {
  const p = document.createElement('p');
  p.textContent = str;
  return p.innerHTML;
}

      <input id="scan-image-input" type="file" accept="image/*" class="hidden" onchange="handleScanImageFile(event)" />

        <input id="manual-input" placeholder="หรือพิมพ์บาร์โค้ดเอง..." class="flex-1 rounded-2xl border-none bg-white px-4 py-3 text-sm font-bold outline-none ring-1 ring-stone-200 focus:ring-2 focus:ring-brand-500" />
        <button type="submit" class="rounded-2xl bg-brand-600 px-6 font-bold text-white shadow-lg active:scale-95">ไป</button>
      </form>

      <div id="scan-result" class="min-h-[100px]"></div>
    </div>`;
}

function initScanner() {
  if (!window.Html5Qrcode) return;
  html5QrCode = new Html5Qrcode('qr-reader');
  html5QrCode.start(
    { facingMode: 'environment' },
    { fps: 10, qrbox: { width: 250, height: 150 } },
    (decodedText) => {
      playBeep();
      handleScannedBarcode(decodedText);
    },
    () => {}
  ).then(() => {
    const status = document.getElementById('camera-status');
    if (status) status.remove();
    const frame = document.getElementById('camera-frame');
    if (frame) frame.classList.remove('hidden');
  }).catch(err => {
    console.error(err);
    const status = document.getElementById('camera-status');
    if (status) status.textContent = 'ไม่สามารถเข้าถึงกล้องได้';
  });

  document.getElementById('manual-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const val = document.getElementById('manual-input').value.trim();
    if (val) handleScannedBarcode(val);
  });
}

function stopScanner() {
  if (html5QrCode) {
    const scanner = html5QrCode;
    html5QrCode = null;
    scanner.stop().catch(() => {}).finally(() => { try { scanner.clear(); } catch {} });
  }
}

function handleScannedBarcode(barcode) {
  const existing = products.map(withComputed).filter(p => p.barcode === barcode && !p.removed);
  const resEl = document.getElementById('scan-result');
  
  if (existing.length > 0) {
    resEl.innerHTML = `
      <div class="space-y-3">
        <p class="text-xs font-bold text-stone-400 uppercase tracking-wider">พบสินค้าในระบบ (${existing.length} รายการ)</p>
        ${existing.map(p => productCardHTML(p)).join('')}
        <button onclick="${isDev() ? `openProductForm(null, '${barcode}')` : `openSubmissionForm('${barcode}')`}" class="w-full rounded-2xl bg-brand-50 py-3 text-sm font-bold text-brand-700 ring-1 ring-brand-200 active:scale-95">
          ${isDev() ? '+ เพิ่มล็อตใหม่โดยตรง' : '+ เพิ่มวันหมดอายุล็อตใหม่ (ส่ง AI)'}
        </button>
      </div>`;
  } else {
    resEl.innerHTML = `
      <div class="flex flex-col items-center justify-center rounded-3xl bg-white p-8 text-center shadow-sm ring-1 ring-stone-200">
        <div class="mb-4 text-4xl">❓</div>
        <p class="text-sm font-bold text-stone-800">ไม่พบข้อมูลบาร์โค้ดนี้: ${barcode}</p>
        <p class="mt-1 text-xs text-stone-400">สินค้านี้ยังไม่มีในฐานข้อมูล</p>
        <button onclick="${isDev() ? `openProductForm(null, '${barcode}')` : `openSubmissionForm('${barcode}')`}" class="mt-6 w-full rounded-2xl bg-brand-600 py-3.5 text-sm font-bold text-white shadow-lg active:scale-95">
          ${isDev() ? 'เพิ่มสินค้าใหม่โดยตรง' : 'ส่งข้อมูลให้ AI ตรวจสอบ'}
        </button>
      </div>`;
  }
}

// ==================== Calendar ====================
function calendarHTML() {
  const daysInMonth = new Date(state.cal.year, state.cal.month, 0).getDate();
  const firstDay = new Date(state.cal.year, state.cal.month - 1, 1).getDay();
  
  const events = products.map(withComputed).filter(p => !p.removed);
  const getDayEvents = (d) => {
    const dStr = `${state.cal.year}-${String(state.cal.month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    return events.filter(p => p.expiryDate === dStr);
  };

  return `
    <div class="space-y-5">
      <header class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <span class="rounded-xl bg-gradient-to-br from-brand-600 to-brand-800 p-2 text-white text-lg shadow-sm ring-1 ring-white/10">🗓️</span>
          <h1 class="text-lg font-bold text-stone-800">ปฏิทินวันหมดอายุ</h1>
        </div>
        <div class="flex items-center gap-3 rounded-xl bg-white p-1 ring-1 ring-stone-200">
          <button onclick="changeMonth(-1)" class="p-1.5 text-stone-400 active:scale-90">◀</button>
          <span class="text-xs font-bold text-stone-700 min-w-[80px] text-center">${MONTHS_TH[state.cal.month - 1]} ${state.cal.year + 543}</span>
          <button onclick="changeMonth(1)" class="p-1.5 text-stone-400 active:scale-90">▶</button>
        </div>
      </header>

      <div class="rounded-3xl bg-white p-4 shadow-sm ring-1 ring-stone-200">
        <div class="grid grid-cols-7 mb-2">
          ${WEEKDAYS_TH.map(d => `<div class="text-center text-[10px] font-bold text-stone-400 uppercase">${d}</div>`).join('')}
        </div>
        <div class="grid grid-cols-7 gap-1">
          ${Array(firstDay).fill(0).map(() => `<div class="aspect-square"></div>`).join('')}
          ${Array(daysInMonth).fill(0).map((_, i) => {
            const d = i + 1;
            const dayEvents = getDayEvents(d);
            const isSelected = state.cal.selected === d;
            const hasExpired = dayEvents.some(p => p.status === 'expired');
            const hasUrgent = dayEvents.some(p => p.status === 'urgent');
            
            return `
              <button onclick="selectCalDate(${d})" class="relative flex aspect-square flex-col items-center justify-center rounded-xl transition-all ${isSelected ? 'bg-brand-600 text-white shadow-lg' : 'hover:bg-stone-50'}">
                <span class="text-sm font-bold">${d}</span>
                <div class="mt-0.5 flex gap-0.5">
                  ${hasExpired ? `<span class="h-1 w-1 rounded-full bg-red-500"></span>` : ''}
                  ${hasUrgent ? `<span class="h-1 w-1 rounded-full bg-amber-500"></span>` : ''}
                  ${dayEvents.length > 0 && !hasExpired && !hasUrgent ? `<span class="h-1 w-1 rounded-full bg-brand-400"></span>` : ''}
                </div>
              </button>`;
          }).join('')}
        </div>
      </div>

      <div id="calendar-detail" class="space-y-3">
        ${state.cal.selected ? calendarDetailHTML(getDayEvents(state.cal.selected)) : `<p class="py-8 text-center text-xs text-stone-400 italic">เลือกวันที่เพื่อดูรายการสินค้า</p>`}
      </div>
    </div>`;
}

function changeMonth(delta) {
  state.cal.month += delta;
  if (state.cal.month > 12) { state.cal.month = 1; state.cal.year++; }
  if (state.cal.month < 1) { state.cal.month = 12; state.cal.year--; }
  state.cal.selected = null;
  renderPage();
}

function selectCalDate(d) {
  state.cal.selected = d;
  renderPage();
}

function calendarDetailHTML(list) {
  if (list.length === 0) return `<p class="py-8 text-center text-xs text-stone-400 italic">ไม่มีสินค้าหมดอายุในวันนี้</p>`;
  return `
    <p class="text-xs font-bold text-stone-400 uppercase tracking-wider">รายการสินค้า (${list.length})</p>
    ${list.map(p => productCardHTML(p)).join('')}`;
}

async function approvePending(id) {
  const item = pendingSubmissions.find(p => p.id === id);
  if (!item) return;
  
  const name = document.getElementById(`pending-name-${id}`).value.trim();
  const barcode = document.getElementById(`pending-barcode-${id}`).value.trim();
  const expiryDate = document.getElementById(`pending-expiry-${id}`).value;
  
  if (!name || !expiryDate) return showAlertModal('กรุณากรอกข้อมูลให้ครบถ้วน');
  
  const newId = products.length > 0 ? Math.max(...products.map(p => p.id)) + 1 : 1;
  products.push({
    id: newId, barcode, name, category: '',
    imageUrl: item.imageUrl,
    expiryDate, addedDate: new Date().toISOString(),
    addedBy: item.submittedBy || state.staffCode
  });
  
  pendingSubmissions = pendingSubmissions.filter(p => p.id !== id);
  await saveProducts(products);
  await savePending(pendingSubmissions);
  renderPage();
  showToast('✅ อนุมัติสินค้าเข้าสู่ระบบแล้ว');
}

async function rejectPending(id) {
  pendingSubmissions = pendingSubmissions.filter(p => p.id !== id);
  await savePending(pendingSubmissions);
  renderPage();
  showToast('🗑️ ปฏิเสธคำขอแล้ว');
}

// ==================== Utilities ====================
function computeStats() {
  const active = products.map(withComputed).filter(p => !p.removed);
  return {
    expired: active.filter(p => p.status === 'expired').length,
    urgent: active.filter(p => p.status === 'urgent').length,
    safe: active.filter(p => p.status === 'safe').length
  };
}

async function compressImageFile(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let width = img.width, height = img.height;
        if (width > 800) { height *= 800 / width; width = 800; }
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', 0.7));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function showToast(msg) {
  const root = document.getElementById('toast-root');
  const el = document.createElement('div');
  el.className = 'fixed bottom-24 left-1/2 z-[100] -translate-x-1/2 rounded-full bg-stone-800/90 px-6 py-3 text-xs font-bold text-white shadow-2xl backdrop-blur-md animate-in fade-in slide-in-from-bottom-4 duration-300';
  el.textContent = msg;
  root.appendChild(el);
  setTimeout(() => {
    el.classList.add('animate-out', 'fade-out', 'slide-out-to-bottom-4');
    setTimeout(() => el.remove(), 300);
  }, 3000);
}

function showAlertModal(msg) {
  openModal(`
    <div class="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 p-6" onclick="closeModal()">
      <div class="w-full max-w-xs rounded-3xl bg-white p-6 shadow-2xl text-center">
        <div class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-full bg-red-50 text-red-500 text-xl">⚠️</div>
        <p class="text-sm font-bold text-stone-800">${msg.replace(/\n/g, '<br/>')}</p>
        <button onclick="closeModal()" class="mt-6 w-full rounded-2xl bg-stone-100 py-3 text-sm font-bold text-stone-600">ตกลง</button>
      </div>
    </div>
  `);
}

function playBeep() { try { new Audio('data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YV9vT19W').play(); } catch {} }

async function refreshFromCloud() {
  try {
    state.realtimeStatus.products = 'connecting'; renderPage();
    products = await fetchProductsFromCloud();
    pendingSubmissions = await fetchPendingFromCloud();
    adminCreds = await fetchAdminCredsFromCloud();
    state.realtimeStatus.products = 'connected';
    showToast('✅ อัปเดตข้อมูลล่าสุดแล้ว');
  } catch (err) {
    state.realtimeStatus.products = 'error';
    showToast('❌ รีเฟรชไม่สำเร็จ');
  } finally {
    renderPage();
  }
}

// ==================== Init ====================
(async function init() {
  const savedStaff = getSavedStaffCode();
  if (savedStaff) state.staffCode = savedStaff;
  
  try {
    await refreshFromCloud();
  } catch (e) {
    console.error('Initial fetch failed', e);
  }
  renderPage();
})();
