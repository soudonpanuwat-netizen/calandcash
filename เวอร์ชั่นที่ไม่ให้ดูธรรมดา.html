/*
  ── Supabase RLS Setup (run once in Supabase SQL Editor) ─────────
  CREATE TABLE transactions (
    id          BIGINT       PRIMARY KEY,
    type        TEXT         NOT NULL,
    cat         TEXT,
    amount      NUMERIC      NOT NULL,
    note        TEXT,
    date        TEXT,
    bank        TEXT         DEFAULT 'cash',
    user_id     UUID         REFERENCES auth.users(id),
    created_at  TIMESTAMPTZ  DEFAULT now()
  );
  ALTER TABLE transactions ENABLE ROW LEVEL SECURITY;
  CREATE POLICY "user_own_data" ON transactions
    FOR ALL USING (auth.uid() = user_id);
  ─────────────────────────────────────────────────────────────── */

// ── Supabase helper: sync a transaction row ──────────────────
async function sbInsertTxn(txn, userId) {
  try {
    const { error } = await supabase.from('transactions').insert([{
      id:         txn.id,
      type:       txn.type,
      cat:        txn.cat,
      amount:     txn.amount,
      note:       txn.note || null,
      date:       txn.date,
      bank:       txn.bank || 'cash',
      user_id:    userId,
      created_at: new Date().toISOString(),
    }]);
    if (error) console.warn('Supabase insert error:', error.message);
  } catch(e) { console.warn('Supabase unreachable:', e.message); }
}

// ── Supabase helper: load transactions for a user ───────────
async function sbLoadTxns(userId) {
  try {
    const { data, error } = await supabase
      .from('transactions')
      .select('*')
      .eq('user_id', userId)
      .order('id', { ascending: false });
    if (error) { console.warn('Supabase fetch error:', error.message); return null; }
    return data || [];
  } catch(e) { console.warn('Supabase unreachable:', e.message); return null; }
}

// ── Supabase helper: delete a transaction row ────────────────
async function sbDeleteTxn(id) {
  try {
    const { error } = await supabase.from('transactions').delete().eq('id', id);
    if (error) console.warn('Supabase delete error:', error.message);
  } catch(e) { console.warn('Supabase unreachable:', e.message); }
}

// ── Supabase Auth helpers ────────────────────────────────────
async function sbSignIn(email, password) {
  const { data, error } = await supabase.auth.signInWithPassword({ email, password });
  return { user: data?.user || null, error };
}
async function sbSignUp(email, password) {
  const { data, error } = await supabase.auth.signUp({ email, password });
  if (!error && data?.user) {
    // Auto-create profile row with email on signup
    try {
      await supabase.from('user_profiles').upsert([{
        user_id:     data.user.id,
        email:       email,
        loan_status: 'none',
        created_at:  new Date().toISOString(),
        updated_at:  new Date().toISOString(),
      }], { onConflict: 'user_id', ignoreDuplicates: true });
    } catch(e) { /* non-fatal */ }
  }
  return { user: data?.user || null, error };
}
async function sbSignOut() {
  await supabase.auth.signOut();
}
async function sbGetSession() {
  const { data } = await supabase.auth.getSession();
  return data?.session?.user || null;
}

// ── Supabase: save user profile ────────────────────────────
async function sbSaveProfile(userId, profile) {
  try {
    const { error } = await supabase.from('user_profiles').upsert([{
      user_id:     userId,
      email:       profile.email       || null,
      nickname:    profile.nickname    || null,
      phone:       profile.phone       || null,
      height:      profile.height      ? +profile.height : null,
      weight:      profile.weight      ? +profile.weight : null,
      age:         profile.age         ? +profile.age    : null,
      gender:      profile.gender      || null,
      loan_status: profile.loan_status || 'none',
      updated_at:  new Date().toISOString(),
    }], { onConflict: 'user_id' });
    if (error) { console.warn('Profile save error:', error.message); return false; }
    return true;
  } catch(e) { console.warn('Profile save failed:', e.message); return false; }
}

async function sbLoadProfile(userId) {
  try {
    const { data, error } = await supabase
      .from('user_profiles').select('*').eq('user_id', userId).single();
    if (error) return null;
    return data;
  } catch(e) { return null; }
}

// ── Supabase: save daily summary ────────────────────────────
async function sbSaveDailySummary(userId, dateStr, income, expense, cal, txnCount, foodCount) {
  try {
    const { error } = await supabase.from('daily_summaries').upsert([{
      user_id:    userId,
      date:       dateStr,           // 'YYYY-MM-DD'
      income:     income   || 0,
      expense:    expense  || 0,
      calories:   cal      || 0,
      txn_count:  txnCount || 0,
      food_count: foodCount|| 0,
      net:        (income||0) - (expense||0),
      saved_at:   new Date().toISOString(),
    }], { onConflict: 'user_id,date' });
    if (error) console.warn('Daily summary save error:', error.message);
    return !error;
  } catch(e) { console.warn('saveDailySummary failed:', e.message); return false; }
}

// ── Supabase: load last N days of summaries ───────────────
async function sbLoadDailySummaries(userId, days=15) {
  try {
    const since = new Date();
    since.setDate(since.getDate() - days);
    const sinceStr = since.toISOString().slice(0,10);
    const { data, error } = await supabase
      .from('daily_summaries')
      .select('*')
      .eq('user_id', userId)
      .gte('date', sinceStr)
      .order('date', { ascending: false });
    if (error) { console.warn('Load summaries error:', error.message); return []; }
    return data || [];
  } catch(e) { console.warn('loadDailySummaries failed:', e.message); return []; }
}

// ── Tip: Supabase Password Policy ──────────────────────────
// ถ้าต้องการใช้รหัสผ่าน 000000 (6 ตัว):
// Supabase Dashboard → Authentication → Policies → Password strength → ปิด "Enforce password strength"
// แล้วตั้ง "Minimum password length" = 6

// ── Real-time clock hook ────────────────────────────────────
function useRealtimeClock() {
  const [now, setNow] = useState(new Date());
  useEffect(() => {
    const id = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(id);
  }, []);
  return now;
}

// ── Auto-reset + midnight save hook ─────────────────────────
// Saves daily summary to Supabase at midnight, then resets today's data
// ── Rolling Log helpers (pure localStorage, no Supabase) ───────
const DAILY_LOG_KEY  = 'calcash_daily_log';   // array of daily entries
const DEBT_RESET_KEY = 'calcash_debt_reset';  // 'YYYY-MM' of last debt reset
const LAST_RESET_KEY  = 'calcash_lastReset';
const CAL_RESET_KEY   = 'calcash_calResetDate';
const AUTH_SESSION_KEY = 'calcash_auth_date'; // วันที่ล็อกอินล่าสุด YYYY-MM-DD
const PREMIUM_KEY    = 'calcash_premium';      // 'true' = premium member

function isPremium() {
  try { return localStorage.getItem(PREMIUM_KEY) === 'true'; } catch { return false; }
}

function getRollingLimit() {
  return isPremium() ? 60 : 7;
}

// Save one day's report — rolling log: oldest entry removed when over limit
function saveDailyReport(dateStr, income, expense, cal, txnList, foodList) {
  try {
    const entry = {
      date:      dateStr,
      income:    Math.round(income  * 100) / 100,
      expense:   Math.round(expense * 100) / 100,
      calories:  Math.round(cal),
      net:       Math.round((income - expense) * 100) / 100,
      txn_count: txnList.length,
      food_count:foodList.length,
      saved_at:  new Date().toISOString(),
    };
    const log = JSON.parse(localStorage.getItem(DAILY_LOG_KEY) || '[]');
    // Remove duplicate for same date
    const deduped = log.filter(r => r.date !== dateStr);
    // Prepend newest, slice to rolling limit
    const limit = getRollingLimit();
    const updated = [entry, ...deduped].slice(0, limit);
    localStorage.setItem(DAILY_LOG_KEY, JSON.stringify(updated));
    console.log('[DailyLog] Saved', dateStr, `(${updated.length}/${limit} days kept, ${isPremium()?'premium':'free'})`);
    return true;
  } catch(e) {
    console.error('[DailyLog] Save failed:', e);
    return false;
  }
}

// Load history from localStorage (no Supabase)
function loadHistory() {
  try {
    const log = JSON.parse(localStorage.getItem(DAILY_LOG_KEY) || '[]');
    const limit = getRollingLimit();
    return log.slice(0, limit);
  } catch(e) {
    console.error('[DailyLog] Load failed:', e);
    return [];
  }
}

// Migrate old archive format → new daily log (runs once)
function migrateArchive() {
  try {
    const oldKey = 'calcash_archive';
    const old = JSON.parse(localStorage.getItem(oldKey) || '[]');
    if (old.length === 0) return;
    const existing = JSON.parse(localStorage.getItem(DAILY_LOG_KEY) || '[]');
    if (existing.length > 0) return; // already migrated
    const migrated = old.map(a => ({
      date:      a.date,
      income:    a.income   || 0,
      expense:   a.expense  || 0,
      calories:  a.cal      || 0,
      net:       (a.income||0) - (a.expense||0),
      txn_count: (a.txns||[]).length,
      food_count:(a.foods||[]).length,
      saved_at:  new Date().toISOString(),
    })).slice(0, getRollingLimit());
    localStorage.setItem(DAILY_LOG_KEY, JSON.stringify(migrated));
    console.log('[DailyLog] Migrated', migrated.length, 'entries from old archive');
  } catch(e) {}
}

// ── useAutoReset hook — midnight rolling-log save ────────────────
function useAutoReset({ txns, setTxns, foods, setFoods, sbUser }) {
  // Migrate old data on first run
  useEffect(() => { migrateArchive(); }, []);

  const doReset = useCallback((dateStr) => {
    const income  = txns.filter(t=>t.type==='income').reduce((a,t)=>a+t.amount, 0);
    const expense = txns.filter(t=>t.type==='expense').reduce((a,t)=>a+t.amount, 0);
    const cal     = foods.reduce((a,f)=>a+f.cal, 0);

    // Save to local rolling log (primary)
    saveDailyReport(dateStr, income, expense, cal, txns, foods);

    // Also sync to Supabase if logged in (non-blocking, optional)
    if (sbUser) {
      sbSaveDailySummary(sbUser.id, dateStr, income, expense, cal,
        txns.length, foods.length).catch(()=>{});
    }

    // Keep txns AND foods — history accumulates (max 60 food entries, max 30 txns)
    localStorage.setItem(LAST_RESET_KEY, dateStr);
    console.log('[AutoReset] Daily log saved for', dateStr, '— txns and foods kept');
  }, [txns, foods, sbUser, setTxns, setFoods]);

  useEffect(() => {
    const check = () => {
      const todayStr  = new Date().toISOString().slice(0,10);
      const lastReset = localStorage.getItem(LAST_RESET_KEY) || '';
      if (lastReset !== todayStr) {
        if (lastReset) {
          doReset(lastReset); // save yesterday's data
        } else {
          localStorage.setItem(LAST_RESET_KEY, todayStr); // first run
        }
      }
    };
    check();
    const id = setInterval(check, 60_000); // re-check every minute
    return () => clearInterval(id);
  }, [doReset]);
}

// ── useCalDailyReset — resets today's calorie foods at midnight ──
function useCalDailyReset({ foods, setFoods }) {
  useEffect(() => {
    const check = () => {
      const todayStr  = new Date().toISOString().slice(0,10);
      const lastReset = localStorage.getItem(CAL_RESET_KEY) || '';
      if (lastReset !== todayStr) {
        // Archive today's foods (keep in history), then clear today's entries
        // Foods accumulated before today are kept; only reset "today's" cal counter
        // We store today's date so tomorrow we know to reset
        if (lastReset) {
          // Move foods older than today to history-only (keep all), clear today's foods
          // "today's calorie count" = foods with today's date
          const prevDate = lastReset; // date we're resetting FROM
          // Filter: keep foods NOT from yesterday (keep history), wipe today's fresh count
          setFoods(prev => {
            // Keep only foods that are NOT from the previous day (prevDate)
            // This preserves multi-day history but resets today's running total
            const kept = prev.filter(f => {
              try {
                // f.date is Thai locale string — check if it was saved on prevDate
                // We mark foods with isoDate when saved; fallback: keep all (no reset)
                return f.isoDate ? f.isoDate !== prevDate : true;
              } catch { return true; }
            });
            db.set({ foods: kept });
            return kept;
          });
        }
        localStorage.setItem(CAL_RESET_KEY, todayStr);
        console.log('[CalReset] Daily calorie counter reset for', todayStr);
      }
    };
    check();
    // Check every 30 seconds so reset happens close to midnight
    const id = setInterval(check, 30_000);
    return () => clearInterval(id);
  }, []);
}

// ----------------------------------------------------------------
// REAL-TIME ACCOUNT BALANCE SYSTEM
// Single source of truth: localStorage key 'calcash_accounts'
// Sync mechanism: custom 'calcash_acc_update' event
// Any component that calls save() broadcasts to ALL useAccounts
// instances → Dashboard updates instantly after Transaction save
// ----------------------------------------------------------------
const ACC_KEY        = 'calcash_accounts';

function BankLogo({ id, name, color, size=36 }) {
  // สีใช้ color prop (จาก account object) เป็นหลัก ถ้าไม่มีถึงดู id
  const bg = color || BANK_COLOR[id] || '#6B7E8D';
  // ตัวอักษรย่อ: ดู id map ก่อน ถ้าไม่มีใช้ตัวแรกของชื่อ
  const abbrev = BANK_ABBREV[id] || (name||id||'B').slice(0,3).toUpperCase();
  const fontSize = abbrev.length <= 1 ? size*0.48
                 : abbrev.length <= 3 ? size*0.32
                 : size*0.26;
  return (
    <div style={{
      width:size, height:size, borderRadius:size*0.26,
      background:bg,
      display:'flex', alignItems:'center', justifyContent:'center',
      flexShrink:0, overflow:'hidden',

// ── Low-level helpers (no React) ─────────────────────────────
function accLoad() {
  try {
    const d = JSON.parse(localStorage.getItem(ACC_KEY));
    if (!Array.isArray(d) || d.length < 3) return JSON.parse(JSON.stringify(ACC_DEFAULTS));

    // ── Migration: fix wrong id/color mismatch ──
    const fixed = d.map(acc => {
      // ถ้าชื่อบอกว่าเป็นกรุงไทย แต่ id บอกว่าเป็น SCB → แก้ id และสีให้ถูก
      if (acc.name && acc.name.includes('กรุงไทย') && acc.id === 'SCB') {
        return { ...acc, id:'KTB', color:'#009FDA' };
      }
      // ถ้า id ถูกแต่ color ผิด → แก้ color ตาม BANK_COLOR map
      const correctColors = {
        cash:'#2D7A4A', KBANK:'#00A950', SCB:'#4E2E7F', KTB:'#009FDA',
        BBL:'#1A3A6B', GSB:'#D8007D', BAY:'#E8B800', TTB:'#002D63',
      };
      if (correctColors[acc.id] && !acc.color) {
        return { ...acc, color: correctColors[acc.id] };
      }
      return acc;
    });

    // บันทึก migration result กลับ
    const changed = JSON.stringify(fixed) !== JSON.stringify(d);
    if (changed) {
      try { localStorage.setItem(ACC_KEY, JSON.stringify(fixed)); } catch {}
      console.log('[accLoad] Migration applied:', fixed.map(a=>a.id+':'+a.name));
    }
    return fixed;
  } catch { return JSON.parse(JSON.stringify(ACC_DEFAULTS)); }
}

function accSave(accs) {
  const clean = accs.map(a => ({
    ...a, balance: Math.round((+(a.balance)||0) * 100) / 100
  }));
  try { localStorage.setItem(ACC_KEY, JSON.stringify(clean)); } catch {}
  // Broadcast to all useAccounts instances in this tab
  try { window.dispatchEvent(new CustomEvent(ACC_EVENT, { detail: clean })); } catch {}
  return clean;
}

// PRIMARY FUNCTION — updateBalance(id, amount, type)
// type: 'income' → add, 'expense' → subtract
// Returns updated accounts array
function updateAccountBalance(id, amount, type) {
  const delta = type === 'income' ? +amount : -(+amount);
  const cur   = accLoad();
  const next  = cur.map(a =>
    a.id === id
      ? { ...a, balance: Math.round((a.balance + delta) * 100) / 100 }
      : a
  );
  return accSave(next);
}

// ── React hook — subscribes to ACC_EVENT for real-time sync ──
function useAccounts() {
  const [accounts, setAccounts] = useState(accLoad);

  // Listen for changes from ANY component in same tab
  useEffect(() => {
    const onUpdate = (e) => {
      if (e.detail) setAccounts(e.detail);
      else setAccounts(accLoad());
    };
    window.addEventListener(ACC_EVENT, onUpdate);
    // Also listen for cross-tab storage events (optional)
    const onStorage = (e) => {
      if (e.key === ACC_KEY) setAccounts(accLoad());
    };
    window.addEventListener('storage', onStorage);
    return () => {
      window.removeEventListener(ACC_EVENT, onUpdate);
      window.removeEventListener('storage', onStorage);
    };
  }, []);

  // ── Write helpers (all broadcast via accSave) ──
  const save = (accs) => {
    const clean = accSave(accs);
    setAccounts(clean);
  };

  const updateBalance = (id, amount, type) => {
    const next = updateAccountBalance(id, amount, type);
    setAccounts(next);
  };

  const setBalance  = (id, val)   => save(accounts.map(a => a.id===id ? {...a, balance: Math.round(+(val||0)*100)/100} : a));
  const setName     = (id, name)  => save(accounts.map(a => a.id===id ? {...a, name: name.trim()||a.name} : a));
  const setEmoji    = (id, emoji) => save(accounts.map(a => a.id===id ? {...a, emoji} : a));
  const editAccount = (id, patch) => save(accounts.map(a => a.id===id ? {...a,...patch} : a));

  const totalBalance = accounts.reduce((s,a) => s + (a.balance||0), 0);

  return { accounts, save, updateBalance, setBalance, setName, setEmoji, editAccount, totalBalance };
}

// ── Monthly debt reset hook ─────────────────────────────────
// Resets debtPayments on the 1st of each month
function useDebtMonthlyReset({ debtPayments, setDebtPayments }) {
  useEffect(() => {
    const now    = new Date();
    const month  = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    const lastReset = localStorage.getItem(DEBT_RESET_KEY) || '';

    if (lastReset !== month) {
      // New month — archive paid amounts then reset
      try {
        const archive = JSON.parse(localStorage.getItem('calcash_debt_archive') || '[]');
        archive.unshift({
          month: lastReset || month,
          payments: { ...debtPayments },
          archivedAt: now.toISOString(),
        });
        localStorage.setItem('calcash_debt_archive', JSON.stringify(archive.slice(0, 24)));
      } catch(e) {}

      // Only reset if we actually had a previous month recorded
      if (lastReset && lastReset !== month) {
        setDebtPayments({});
        console.log('[DebtReset] Monthly reset done for:', month);
      }
      localStorage.setItem(DEBT_RESET_KEY, month);
    }
  }, []); // run once on mount
}

// ── WebAuthn / Biometric helpers ──────────────────────────────
// รองรับ Face ID, Touch ID, Fingerprint ผ่าน Web Authentication API

function isBiometricSupported() {
  return !!(window.PublicKeyCredential &&
    typeof PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable === 'function');
}

async function checkBiometricAvailable() {
  try {
    return await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
  } catch { return false; }
}

// Register biometric (เรียกครั้งแรกเมื่อผู้ใช้เปิดใช้งาน)
async function registerBiometric(userName) {
  try {
    const challenge = new Uint8Array(32);
    crypto.getRandomValues(challenge);
    const userId = new TextEncoder().encode(userName || 'calcash_user');

    const cred = await navigator.credentials.create({ publicKey: {
      challenge,
      rp: { name: 'Cal & Cash', id: location.hostname || 'localhost' },
      user: { id: userId, name: userName || 'user', displayName: 'Cal & Cash User' },
      pubKeyCredParams: [
        { alg: -7,  type: 'public-key' },   // ES256
        { alg: -257,type: 'public-key' },   // RS256
      ],
      authenticatorSelection: {
        authenticatorAttachment: 'platform',   // Face ID / Touch ID
        userVerification: 'required',
        requireResidentKey: false,
      },
      timeout: 60000,
      attestation: 'none',
    }});

    if (cred) {
      // Store credential id for future auth
      const credId = btoa(String.fromCharCode(...new Uint8Array(cred.rawId)));
      localStorage.setItem(BIOMETRIC_CRED, credId);
      localStorage.setItem(BIOMETRIC_KEY, 'true');
      return { ok: true };
    }
  } catch(e) {
    console.warn('[Biometric] Register failed:', e.message);
    if (e.name === 'NotAllowedError') return { ok:false, reason:'cancelled' };
    if (e.name === 'NotSupportedError') return { ok:false, reason:'unsupported' };
  }
  return { ok: false, reason: 'unknown' };
}

// Authenticate with biometric
async function authenticateBiometric() {
  try {
    const storedId = localStorage.getItem(BIOMETRIC_CRED);
    const challenge = new Uint8Array(32);
    crypto.getRandomValues(challenge);

    const allowCreds = storedId ? [{
      id: Uint8Array.from(atob(storedId), c=>c.charCodeAt(0)),
      type: 'public-key',
      transports: ['internal'],
    }] : [];

    const assertion = await navigator.credentials.get({ publicKey: {
      challenge,
      allowCredentials: allowCreds,
      userVerification: 'required',
      timeout: 60000,
    }});

    return !!assertion;
  } catch(e) {
    console.warn('[Biometric] Auth failed:', e.message);
    return false;
  }
}

function isBiometricEnabled() {
  return localStorage.getItem(BIOMETRIC_KEY) === 'true';

function Toast({ msg, color='#059669', onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2200); return () => clearTimeout(t); }, [onDone]);
  return (
    <div style={{ position:'fixed',top:20,left:'50%',transform:'translateX(-50%)',zIndex:999,
      background:color,color:'#fff',padding:'12px 24px',borderRadius:16,fontSize:14,
      fontWeight:700,boxShadow:'0 8px 32px rgba(0,0,0,0.25)',minWidth:220,textAlign:'center' }}>
      {msg}
    </div>
  );
}

function useToast() {
  const [toasts, setToasts] = useState([]);
  const show = useCallback((msg, color='#059669') => {
    setToasts(t => [...t, { id: Date.now(), msg, color }]);
  }, []);
  const comp = (
    <>
      {toasts.map(t => (
        <Toast key={t.id} msg={t.msg} color={t.color} onDone={() => setToasts(ts => ts.filter(x => x.id !== t.id))}/>
      ))}
    </>
  );
  return [show, comp];
}

function SupabaseAuthScreen({ onSuccess }) { 
const [mode,     setMode]     = useState('login');   // 'login' | 'signup' | 'forgot' 
const [email,    setEmail]    = useState(''); 
const [password, setPassword] = useState(''); 
const [loading,  setLoading]  = useState(false); 
const [error,    setError]    = useState(''); 
const [info,     setInfo]     = useState('');

const handleSubmit = async (e) => { 
e.preventDefault(); 
if (!email.trim() || !password.trim()) { setError('กรุณากรอกอีเมลและรหัสผ่าน'); return; } 
setLoading(true); setError(''); setInfo(''); 
try { 
if (mode === 'forgot') { 
if (!email.trim()) { setError('กรุณากรอกอีเมล'); setLoading(false); return; } 
console.log('[ResetPW] Sending reset email to:', email.trim()); 
const { error } = await supabase.auth.resetPasswordForEmail(email.trim(), { 
redirectTo: window.location.origin + window.location.pathname, 
}); 
if (error) { 
console.error('[ResetPW] Error:', error); 
setError(error.message || 'ส่งอีเมลรีเซ็ตไม่สำเร็จ'); 
} else { 
console.log('[ResetPW] Reset email sent successfully'); 
setInfo('✅ ส่งลิงก์รีเซ็ตรหัสผ่านไปที่อีเมลแล้ว กรุณาตรวจสอบกล่องข้อความครับ'); 
setMode('login'); 
} 
} else if (mode === 'login') { 
const { user, error } = await sbSignIn(email.trim(), password); 
if (error) { setError(error.message || 'ล็อกอินไม่สำเร็จ'); } 
else if (user) { onSuccess(user, false); } 
} else { 
const { user, error } = await sbSignUp(email.trim(), password); 
if (error) { setError(error.message || 'สมัครไม่สำเร็จ'); } 
else if (user) { 
onSuccess(user, true); 
} else { 
setInfo('✅ สมัครสำเร็จ! กรุณาตรวจสอบอีเมลเพื่อยืนยัน แล้วล็อกอินใหม่'); 
setMode('login'); 
} 
} 
} catch(err) { 
console.error('[Auth] Exception:', err); 
setError('เชื่อมต่อไม่ได้ — ตรวจสอบอินเทอร์เน็ต'); 
} finally { setLoading(false); } 
};

function ChangePinScreen({ role, onDone, onBack }) { 
const [step,    setStep]    = useState('verify'); 
const [verify,  setVerify]  = useState(''); 
const [newPin,  setNewPin]  = useState(''); 
const [confirm, setConfirm] = useState(''); 
const [shake,   setShake]   = useState(false); 
const [err,     setErr]     = useState(''); 
const userPin = db.get().userPin || DEFAULT_USER_PIN;

const fail = (msg, setter) => { 
setShake(true); setErr(msg); 
setTimeout(()=>{ setShake(false); setErr(''); setter(''); },800); 
}; 
const doVerify  = useCallback((p) => { if(p === (role === 'admin' ? ADMIN_PIN : userPin)){setStep('newpin');return;} fail('PIN ปัจจุบันไม่ถูกต้อง',setVerify); },[role,userPin]); 
const doNew     = useCallback((p) => { if(p === ADMIN_PIN && role !== 'admin'){fail('ไม่สามารถใช้ PIN นี้ได้',setNewPin);return;} setNewPin(p); setStep('confirm'); },[role]); 
const doConfirm = useCallback((p) => { if(p !== newPin){fail('PIN ไม่ตรงกัน',setConfirm);return;} db.set({userPin:newPin}); onDone(); },[newPin,onDone]);

useEffect(()=>{ if(verify.length === 6)  doVerify(verify);  },[verify,  doVerify]); 
useEffect(()=>{ if(newPin.length === 6)  doNew(newPin);     },[newPin,  doNew]); 
useEffect(()=>{ if(confirm.length === 6) doConfirm(confirm); },[confirm, doConfirm]);

const labels = {verify:'ยืนยัน PIN ปัจจุบัน',newpin:'ตั้ง PIN ใหม่',confirm:'ยืนยัน PIN ใหม่อีกครั้ง'}; 
const cur  = step==='verify'?verify:step==='newpin'?newPin:confirm; 
const setter = step==='verify'?setVerify:step==='newpin'?setNewPin:setConfirm;

return ( 
<div style={{ minHeight:'100vh',position:'relative',overflow:'hidden', 
background:'linear-gradient(160deg,#F0E8DC 0%,#E4D8CA 100%)',

<div style={{ position:'absolute',bottom:-40,left:-40,width:200,height:200,borderRadius:'50%', 
background:'radial-gradient(circle,rgba(168,50,64,0.08) 0%,transparent 70%)' }}/> 
</div> 
<div style={{ position:'relative',zIndex:2,width:'100%',maxWidth:340, 
background:'rgba(255,253,248,0.78)',backdropFilter:'blur(18px)',WebkitBackdropFilter:'blur(18px)', 
borderRadius:28,padding:'32px 24px 28px', 
boxShadow:'8px 12px 28px rgba(160,130,100,0.22),-3px -3px 12px rgba(255,252,245,0.9)', 
border:'1.5px solid rgba(255,255,255,0.85)' }}> 
<div style={{ textAlign:'center',marginBottom:20 }}> 
<div style={{ width:52,height:52,borderRadius:16,margin:'0 auto 12px', 
background:'linear-gradient(145deg,#A83240,#8B2635)', 
boxShadow:'4px 6px 16px rgba(168,50,64,0.35)', 
display:'flex',alignItems:'center',justifyContent:'center' }}> 
<Icons.Key size={24} color="white"/> 
</div> 
<h2 style={{ fontSize:20,fontWeight:900,color:'#1C2C3A',margin:'0 0 4px' }}>เปลี่ยน PIN</h2>

</div> 
<div style={{ marginBottom:16 }}> 
<PinDots value={cur} shake={shake} error={shake}/> 
</div> 
{err && ( 
<div style={{ textAlign:'center',marginBottom:12 }}> 
<span style={{ fontSize:12,fontWeight:700,color:'#A83240',

}

function EmergencyFundCard({ emergencyFund, setEmergencyFund }) {

const startEdit  = () => { if (locked) return; setInputVal(String(amount)); setEditing(true); }; 
const saveEdit   = () => { const v=+inputVal; if(!isNaN(v)&&v>=0) setEmergencyFund(f=>({...f,amount:v})); setEditing(false); }; 
const toggleLock = () => setEmergencyFund(f=>({...f,locked:!f.locked}));

return ( 
<Card className="p-5"> 
{/* Header */} 
<div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4 }}>

</div> 
</div>

style={{ display:'flex',alignItems:'center',gap:5,padding:'6px 14px',borderRadius:12,border:'none', 
cursor:'pointer',fontWeight:700,fontSize:12, 
background:locked?'#FEF2F2':'#F0FDF4',color:locked?'#DC2626':'#059669' }}> 
{locked?'🔒 ล็อก':'🔓 ไม่ล็อก'} 
</button>

  {/* Amount */}
  <div style={{ textAlign:'center',padding:'20px 0 16px' }}>

      <div style={{ display:'flex',gap:8,alignItems:'center',justifyContent:'center' }}>
        <input type="number" value={inputVal} onChange={e=>setInputVal(e.target.value)}

          บันทึก
        </button>
      </div>
    ) : (
      <div>
        <p style={{ fontSize:11,fontWeight:700,color:'#94A3B8',marginBottom:4,letterSpacing:1 }}>ยอดเงินสำรองปัจจุบัน</p>
        <p style={{ fontSize:42,fontWeight:900,color:'#1C3D5A',margin:0,letterSpacing:'-2px',lineHeight:1.1 }}>

    <button onClick={startEdit}

    </div>
  )}
</Card>

); 
}

function HomeScreen({ user, loans, txns, foods, debtPayments, setTab, emergencyFund, setEmergencyFund, accountsMgr }) {

const dateStr = now.toLocaleDateString('th-TH', { weekday:'long', day:'numeric', month:'long', year:'numeric' }); 
const myApp      = loans.find(l=>l.userId===user.name); 
const loanAmount = myApp?.amount || 0; 
const interest   = Math.round(loanAmount * INTEREST_RATE / 100); 
const totalDebt  = loanAmount + interest; 
const paidAmount = (debtPayments[myApp?.id] || 0); 
const totalPaid = paidAmount; 
const debtPct    = totalDebt > 0 ? Math.round(paidAmount/totalDebt*100) : 0; 
// Calculate remaining from localDebts + system loan 
const localDebts = (() => { try { return JSON.parse(localStorage.getItem('calcash_localDebts')||'[]'); } catch { return []; } })(); 
const localDebtRemaining = localDebts.reduce((sum, d) => sum + Math.max(0, (d.total || 0) - (d.paid || 0)), 0); 
const systemLoanRemaining = Math.max(0, totalDebt - paidAmount); 
const remaining  = localDebtRemaining + systemLoanRemaining;

const totalOut   = txns.filter(t=>t.type==='expense').reduce((a,t)=>a+t.amount,0);

  {/* ── MULTI-ACCOUNT TRACKER — Large Cards ── */}
  {accountsMgr && (() => {
    const { accounts, editAccount, totalBalance } = accountsMgr;
    const [editId,    setEditId]    = useState(null);
    const [editBal,   setEditBal]   = useState('');
    const [editName,  setEditName]  = useState('');
    const [editEmoji, setEditEmoji] = useState('');
    const [selectedId,setSelectedId]= useState(null);  // highlighted card

    const startEdit = (acc) => {
      setEditId(acc.id);
      setEditBal(String(acc.balance));
      setEditName(acc.name);
      setEditEmoji(acc.emoji || '💵');
    };
    const doSave = (id) => {
      editAccount(id, {
        name:    editName.trim() || accounts.find(a=>a.id===id)?.name,
        balance: Math.round((+editBal || 0) * 100) / 100,
        emoji:   editEmoji,
      });
      setEditId(null);
    };

    return (
      <div style={{ display:'flex',flexDirection:'column',gap:0 }}>
        {/* ── Total row ── */}
        <div style={{ display:'flex',alignItems:'center',
          justifyContent:'space-between',marginBottom:10,padding:'0 2px' }}>

          <div style={{ textAlign:'right' }}>
            <p style={{ fontSize:10,color:'#B0B8C4',margin:0,letterSpacing:.5,

              color: totalBalance>0?'#0F6E56':totalBalance<0?'#A32D2D':'#B0B8C4' }}>
              {totalBalance>=0?'+':''}{fmtM(totalBalance)} ฿
            </p>
          </div>
        </div>

        {/* ── 3 large cards ── */}
        <div style={{ display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10 }}>
          {accounts.map(acc => {
            const isEdit = editId === acc.id;
            const balColor = acc.balance > 0 ? (acc.color||'#1C3D5A')
                           : acc.balance < 0 ? '#A83240' : '#9CA3AF';

            if (isEdit) return (
              /* ── EDIT CARD ── */
              <div key={acc.id} style={{
                background:'#fff', borderRadius:18,
                border:'2px solid #1C3D5A',
                padding:'12px 10px',

                    fontSize:15,fontWeight:900,outline:'none',width:'100%',
                    boxSizing:'border-box',textAlign:'center',
                    background:'#F7F8FA',color:'#1C2C3A',fontFamily:'inherit' }}/>

                </p>
              </div>
            );
          })}
        </div>

        {/* ── TOTAL SUMMARY BAR (กรอบใต้การ์ด) ── */}
        {(() => {
          const efAmount = emergencyFund?.amount || 0;
          const grandTotal = totalBalance + efAmount;
          return (

            background:'linear-gradient(145deg,#1C3D5A 0%,#2B5278 100%)',
            borderRadius:24, padding:'20px 22px',

            position:'relative',
            overflow:'hidden'

              background:'linear-gradient(to bottom, rgba(255,255,255,0.08), transparent)',
              pointerEvents:'none' }}/>
            {/* ยอดรวมทั้งหมด */}
            <div style={{ display:'flex',alignItems:'center',
              justifyContent:'space-between',marginBottom:10 }}>
              <div>
                <p style={{ fontSize:10,color:'rgba(255,255,255,0.6)',
                  margin:'0 0 2px',textTransform:'uppercase',letterSpacing:1 }}>

                </p>
                <p style={{ fontSize:32,fontWeight:900,color:'#fff',
                  margin:0,letterSpacing:'-1.5px',lineHeight:1,
                  textShadow:'0 2px 4px rgba(0,0,0,0.2)' }}>
                  {grandTotal >= 0 ? '+' : ''}{fmtM(grandTotal)}
                  <span style={{ fontSize:16,fontWeight:700,
                    opacity:.85,marginLeft:5 }}>฿</span>
                </p>
                {efAmount > 0 && (
                  <p style={{ fontSize:9,color:'rgba(255,255,255,0.45)',
                    margin:'4px 0 0' }}>
                    บัญชี {fmtM(totalBalance)}฿ + สำรอง {fmtM(efAmount)}฿
                  </p>
                )}
              </div>
              <div style={{ textAlign:'right' }}>
                <p style={{ fontSize:9,color:'rgba(255,255,255,0.5)',margin:'0 0 4px' }}>
                  {accounts.length} บัญชี
                </p>
                <div style={{ display:'flex',flexDirection:'column',gap:2 }}>
                  {accounts.map(acc=>(
                    <div key={acc.id} style={{ display:'flex',alignItems:'center',
                      gap:5,justifyContent:'flex-end' }}>
                      <div style={{ width:10,height:10,borderRadius:3,flexShrink:0,
                        background:acc.color||'#6B7E8D' }}/>
                      <span style={{ fontSize:11,fontWeight:700,
                        color: acc.balance>0?'#A7F3D0'
                             : acc.balance<0?'#FCA5A5'
                             : 'rgba(255,255,255,0.4)' }}>
                        {acc.balance>=0?'+':''}{fmtM(acc.balance)}฿
                      </span>
                    </div>
                  ))}
                  {efAmount > 0 && (
                    <div style={{ display:'flex',alignItems:'center',
                      gap:5,justifyContent:'flex-end',
                      borderTop:'1px solid rgba(255,255,255,0.12)',
                      paddingTop:3,marginTop:1 }}>
                      <span style={{ fontSize:11 }}>🔒</span>
                      <span style={{ fontSize:11,fontWeight:700,color:'#FDE68A' }}>
                        +{fmtM(efAmount)}฿
                      </span>
                    </div>
                  )}
                </div>
              </div>
            </div>

            {/* Progress bar สัดส่วนแต่ละแหล่งเงิน */}
            {grandTotal > 0 && (
              <div>
                <div style={{ display:'flex',borderRadius:99,overflow:'hidden',
                  height:6,gap:1 }}>
                  {accounts.filter(a=>a.balance>0).map(acc=>(
                    <div key={acc.id} style={{
                      height:6,
                      width:`${Math.round(acc.balance/grandTotal*100)}%`,
                      background: acc.color||'#A7F3D0',
                      transition:'width .5s',
                      minWidth: acc.balance>0?3:0,
                    }}/>
                  ))}
                  {efAmount > 0 && (
                    <div style={{
                      height:6,
                      width:`${Math.round(efAmount/grandTotal*100)}%`,
                      background:'#FDE68A',
                      transition:'width .5s',
                      minWidth:3,
                    }}/>
                  )}
                </div>
                <div style={{ display:'flex',gap:10,marginTop:6,flexWrap:'wrap' }}>
                  {accounts.filter(a=>a.balance>0).map(acc=>(
                    <div key={acc.id} style={{ display:'flex',alignItems:'center',gap:4 }}>
                      <div style={{ width:7,height:7,borderRadius:'50%',
                        background:acc.color||'#A7F3D0',flexShrink:0 }}/>
                      <span style={{ fontSize:9,color:'rgba(255,255,255,0.6)' }}>
                        {acc.name} {Math.round(acc.balance/grandTotal*100)}%
                      </span>
                    </div>
                  ))}
                  {efAmount > 0 && (
                    <div style={{ display:'flex',alignItems:'center',gap:4 }}>
                      <div style={{ width:7,height:7,borderRadius:'50%',
                        background:'#FDE68A',flexShrink:0 }}/>
                      <span style={{ fontSize:9,color:'rgba(255,255,255,0.6)' }}>
                        🔒 สำรอง {Math.round(efAmount/grandTotal*100)}%
                      </span>
                    </div>
                  )}
                </div>
              </div>
            )}

            {grandTotal <= 0 && (
              <p style={{ fontSize:10,color:'rgba(255,255,255,0.35)',
                margin:0,textAlign:'center' }}>
                ✏️ กดดินสอบนการ์ดเพื่อใส่ยอดเงินแต่ละบัญชี
              </p>
            )}
          </div>
          );
        })()}
      </div>
    );
  })()}

function DebtScreen({ user, loans, setLoans, debtPayments, setDebtPayments, toast, mockUser, invitations }) {

const myApp = loans.find(l=>l.userId===user.name); 
const [debts,         setDebts]         = useState(()=>{ try{return JSON.parse(localStorage.getItem('calcash_localDebts')||'[]');}catch{return[];} }); 
const [debtName,      setDebtName]      = useState(''); 
const [debtAmount,    setDebtAmount]    = useState(''); 
const [paymentInputs, setPaymentInputs] = useState({}); 
const saveDebts = (d) => { setDebts(d); try{localStorage.setItem('calcash_localDebts',JSON.stringify(d));}catch{} }; 
const addDebt = () => { 
if(!debtName.trim()||!debtAmount||+debtAmount<=0){toast('กรอกชื่อและจำนวนหนี้ด้วย','#DC2626');return;} 
const nd={id:Date.now(),name:debtName.trim(),total:+debtAmount,paid:0}; 
saveDebts([...debts,nd]); setDebtName(''); setDebtAmount(''); toast(`เพิ่มหนี้ "${nd.name}" แล้ว ✓`); 
}; 
const payDebt = (id) => { 
const amt=+(paymentInputs[id]||0); 
if(!amt||amt<=0){toast('กรอกยอดชำระด้วย','#DC2626');return;} 
saveDebts(debts.map(d=>d.id===id?{...d,paid:Math.min(d.paid+amt,d.total)}:d)); 
setPaymentInputs(p=>({...p,[id]:''})); toast(`ชำระ ฿${fmt(amt)} สำเร็จ ✓`); 
}; 
const removeDebt=(id)=>saveDebts(debts.filter(d=>d.id !== id)); 
const debtTotal   = debts.reduce((a,d)=>a+d.total,0); 
const debtPaidSum = debts.reduce((a,d)=>a+d.paid, 0); 
const overallPct  = debtTotal>0?Math.round(debtPaidSum/debtTotal*100):0;

const totalDebt = debtTotal;

if (debtTab === 'lending') return (

// ─────────────────────────────────────────────────────────────
// LENDING SCREEN — ให้คนอื่นยืมเงิน
// ─────────────────────────────────────────────────────────────
const LEND_KEY = 'calcash_lendings';
function loadLendings() {
  try { return JSON.parse(localStorage.getItem(LEND_KEY)||'[]'); } catch { return []; }
}
function saveLendings(arr) {
  try { localStorage.setItem(LEND_KEY, JSON.stringify(arr)); } catch {}
}

function LendingScreen({ toast }) {
  const [lendings, setLendings] = useState(loadLendings);
  const [showForm, setShowForm] = useState(false);
  // form fields
  const [fName,     setFName]     = useState('');
  const [fAmount,   setFAmount]   = useState('');
  const [fDate,     setFDate]     = useState(() => new Date().toISOString().slice(0,10));
  const [fDue,      setFDue]      = useState('');
  const [fRate,     setFRate]     = useState('0');
  const [fNote,     setFNote]     = useState('');
  const [fRateType, setFRateType] = useState('flat'); // 'flat' | 'compound'

  const resetForm = () => {
    setFName(''); setFAmount(''); setFDate(new Date().toISOString().slice(0,10));
    setFDue(''); setFRate('0'); setFNote(''); setFRateType('flat');
  };

  const addLending = () => {
    if (!fName.trim())          { toast('กรุณากรอกชื่อผู้ยืม','#DC2626'); return; }
    if (!fAmount || +fAmount<=0){ toast('กรุณากรอกจำนวนเงิน','#DC2626'); return; }
    if (!fDue)                  { toast('กรุณาเลือกวันครบกำหนด','#DC2626'); return; }
    const rec = {
      id:       Date.now(),
      name:     fName.trim(),
      amount:   +fAmount,
      date:     fDate,
      due:      fDue,
      rate:     +fRate || 0,
      rateType: fRateType,
      note:     fNote.trim(),
      status:   'pending', // 'pending' | 'returned'
      returnedAt: null,
    };
    const next = [rec, ...lendings];
    setLendings(next); saveLendings(next);
    toast(`บันทึกการยืมเงินของ "${rec.name}" แล้ว ✓`);
    resetForm(); setShowForm(false);
  };

  const toggleStatus = (id) => {
    const next = lendings.map(l => l.id===id
      ? { ...l, status: l.status==='pending'?'returned':'pending',
          returnedAt: l.status==='pending'? new Date().toISOString() : null }
      : l);
    setLendings(next); saveLendings(next);
    const rec = next.find(l=>l.id===id);
    toast(rec.status==='returned' ? `${rec.name} คืนเงินแล้ว ✓` : `เปลี่ยนสถานะเป็นค้างชำระ`);
  };

  const removeLending = (id) => {
    const next = lendings.filter(l=>l.id!==id);
    setLendings(next); saveLendings(next);
    toast('ลบรายการแล้ว');
  };

  // คำนวณดอกเบี้ย
  const calcInterest = (l) => {
    if (!l.rate || l.rate===0) return 0;
    const start = new Date(l.date);
    const end   = l.status==='returned' && l.returnedAt ? new Date(l.returnedAt) : new Date(l.due);
    const days  = Math.max(0, Math.round((end-start)/(1000*60*60*24)));
    const months = days/30;
    if (l.rateType==='compound') {
      return Math.round(l.amount * (Math.pow(1+l.rate/100, months)-1));
    }
    return Math.round(l.amount * (l.rate/100) * months);
  };

  const pending   = lendings.filter(l=>l.status==='pending');
  const returned  = lendings.filter(l=>l.status==='returned');
  const totalOut  = pending.reduce((s,l)=>s+l.amount,0);
  const totalInt  = pending.reduce((s,l)=>s+calcInterest(l),0);

  const INP2 = 'clay-input';

  return (
    <div className="space-y-4">
      {/* Summary banner */}
      {pending.length > 0 && (
        <div style={{ background:'linear-gradient(135deg,#0C4A6E,#0284C7)',
          borderRadius:16, padding:'14px 16px', color:'#fff' }}>
          <p style={{ fontSize:10,opacity:.65,margin:'0 0 4px',textTransform:'uppercase',letterSpacing:1 }}>ยอดค้างรับทั้งหมด</p>
          <p style={{ fontSize:28,fontWeight:900,margin:'0 0 4px',letterSpacing:'-1px' }}>฿{fmt(totalOut)}</p>
          <div style={{ display:'flex',gap:16 }}>
            <div>
              <p style={{ fontSize:9,opacity:.6,margin:'0 0 2px' }}>ดอกเบี้ยสะสม</p>
              <p style={{ fontSize:14,fontWeight:800,color:'#FDE68A',margin:0 }}>+฿{fmt(totalInt)}</p>
            </div>
            <div>
              <p style={{ fontSize:9,opacity:.6,margin:'0 0 2px' }}>รวมทั้งสิ้น</p>
              <p style={{ fontSize:14,fontWeight:800,color:'#A7F3D0',margin:0 }}>฿{fmt(totalOut+totalInt)}</p>
            </div>
          </div>
        </div>
      )}

      {/* Add button */}
      <button onClick={()=>setShowForm(v=>!v)}
        style={{ width:'100%',padding:'13px 0',borderRadius:16,fontWeight:900,fontSize:14,
          border:'none',cursor:'pointer',color:'#fff',display:'flex',alignItems:'center',
          justifyContent:'center',gap:8,
          background: showForm
            ? 'linear-gradient(145deg,#6B7E8D,#4A5568)'
            : 'linear-gradient(145deg,#0284C7,#0C4A6E)',
          boxShadow:'var(--shadow-btn)' }}>
        {showForm ? '✕ ยกเลิก' : '➕ บันทึกการให้ยืม'}
      </button>

      {/* Form */}
      {showForm && (
        <div style={{ background:'var(--clay-card)',borderRadius:20,padding:'18px 16px',
          boxShadow:'var(--shadow-out)',border:'1px solid var(--clay-border)' }}>
          <p style={{ fontSize:13,fontWeight:900,color:'#1C2C3A',margin:'0 0 14px' }}>📋 รายละเอียดการยืม</p>
          <div style={{ display:'flex',flexDirection:'column',gap:10 }}>
            {/* ชื่อผู้ยืม */}
            <div>
              <label style={{ fontSize:10,fontWeight:700,color:'#6B7E8D',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:5 }}>ชื่อผู้ยืม *</label>
              <input value={fName} onChange={e=>setFName(e.target.value)}
                placeholder="เช่น คุณสมชาย" className={INP2}/>
            </div>
            {/* จำนวนเงิน */}
            <div>
              <label style={{ fontSize:10,fontWeight:700,color:'#6B7E8D',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:5 }}>จำนวนเงิน (฿) *</label>
              <input type="number" value={fAmount} onChange={e=>setFAmount(e.target.value)}
                placeholder="0" className={INP2}/>
            </div>
            {/* วันที่ให้ยืม / ครบกำหนด */}
            <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:8 }}>
              <div>
                <label style={{ fontSize:10,fontWeight:700,color:'#6B7E8D',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:5 }}>วันที่ให้ยืม</label>
                <input type="date" value={fDate} onChange={e=>setFDate(e.target.value)} 
                  className={INP2} style={{ fontSize:12, padding:'10px 8px' }}/>
              </div>
              <div>
                <label style={{ fontSize:10,fontWeight:700,color:'#6B7E8D',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:5 }}>ครบกำหนดคืน *</label>
                <input type="date" value={fDue} onChange={e=>setFDue(e.target.value)} 
                  className={INP2} style={{ fontSize:12, padding:'10px 8px' }}/>
              </div>
            </div>
            {/* ดอกเบี้ย */}
            <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:8 }}>
              <div>
                <label style={{ fontSize:10,fontWeight:700,color:'#6B7E8D',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:5 }}>ดอกเบี้ย (%/เดือน)</label>
                <input type="number" value={fRate} onChange={e=>setFRate(e.target.value)}
                  placeholder="0" step="0.1" className={INP2}/>
              </div>
              <div>
                <label style={{ fontSize:10,fontWeight:700,color:'#6B7E8D',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:5 }}>ประเภทดอก</label>
                <select value={fRateType} onChange={e=>setFRateType(e.target.value)} className={INP2}>
                  <option value="flat">คงที่ (Flat)</option>
                  <option value="compound">ทบต้น (Compound)</option>
                </select>
              </div>
            </div>
            {/* หมายเหตุ */}
            <div>
              <label style={{ fontSize:10,fontWeight:700,color:'#6B7E8D',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:5 }}>หมายเหตุ</label>
              <textarea value={fNote} onChange={e=>setFNote(e.target.value)}
                placeholder="เช่น ยืมซื้อของ ตกลงคืนวันเงินเดือนออก..."
                rows={2}
                style={{ background:'var(--clay-inset)',boxShadow:'var(--shadow-in)',
                  border:'1px solid #D4C9B8',borderRadius:14,color:'var(--clay-ink)',
                  padding:'12px 16px',fontSize:14,width:'100%',outline:'none',
                  fontFamily:'Inter,sans-serif',boxSizing:'border-box',resize:'none' }}/>
            </div>
            <button onClick={addLending} className="clay-btn-navy" style={{ marginTop:4 }}>💾 บันทึก</button>
          </div>
        </div>
      )}

      {/* Pending list */}
      {pending.length === 0 && returned.length === 0 && (
        <div style={{ textAlign:'center',padding:'32px 16px' }}>
          <div style={{ fontSize:56,marginBottom:12 }}>🤝</div>
          <p style={{ fontSize:13,fontWeight:700,color:'#6B7E8D',margin:0 }}>ยังไม่มีรายการให้ยืม</p>
          <p style={{ fontSize:11,color:'#A3B4BE',marginTop:4 }}>กดปุ่มด้านบนเพื่อบันทึกรายการ</p>
        </div>
      )}

      {pending.length > 0 && (
        <div>
          <p style={{ fontSize:11,fontWeight:800,color:'#0284C7',textTransform:'uppercase',letterSpacing:1,margin:'0 0 8px' }}>⏳ ยังไม่ได้คืน ({pending.length})</p>
          {pending.map(l => {
            const interest = calcInterest(l);
            const total    = l.amount + interest;
            const isOverdue = new Date(l.due) < new Date() && l.status==='pending';
            return (
              <div key={l.id} style={{ background:'var(--clay-card)',borderRadius:18,padding:'14px 16px',
                marginBottom:10,boxShadow:'var(--shadow-out)',border:`1.5px solid ${isOverdue?'#FCA5A5':'var(--clay-border)'}` }}>
                <div style={{ display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:8 }}>
                  <div style={{ flex:1 }}>
                    <div style={{ display:'flex',alignItems:'center',gap:6,marginBottom:4 }}>
                      <span style={{ fontSize:15 }}>👤</span>
                      <span style={{ fontSize:14,fontWeight:900,color:'#1C2C3A' }}>{l.name}</span>
                      {isOverdue && <span style={{ fontSize:9,fontWeight:800,color:'#DC2626',
                        background:'#FEF2F2',padding:'2px 7px',borderRadius:20 }}>เกินกำหนด!</span>}
                    </div>
                    <p style={{ fontSize:20,fontWeight:900,color:'#0284C7',margin:'0 0 2px' }}>฿{fmt(l.amount)}</p>
                    {interest > 0 && (
                      <p style={{ fontSize:11,color:'#F97316',fontWeight:700,margin:'0 0 4px' }}>
                        + ดอกเบี้ย ฿{fmt(interest)} = รวม ฿{fmt(total)}
                      </p>
                    )}
                    <div style={{ display:'flex',gap:12,flexWrap:'wrap' }}>
                      <span style={{ fontSize:10,color:'#9CA3AF' }}>📅 ให้ยืม: {l.date}</span>
                      <span style={{ fontSize:10,color: isOverdue?'#DC2626':'#9CA3AF',fontWeight:isOverdue?800:400 }}>⏰ ครบ: {l.due}</span>
                    </div>
                    {l.rate > 0 && <p style={{ fontSize:10,color:'#9CA3AF',margin:'2px 0 0' }}>ดอก {l.rate}%/เดือน ({l.rateType==='compound'?'ทบต้น':'คงที่'})</p>}
                    {l.note && <p style={{ fontSize:11,color:'#6B7E8D',margin:'6px 0 0',
                      background:'var(--clay-inset)',borderRadius:8,padding:'5px 8px' }}>💬 {l.note}</p>}
                  </div>
                  <button onClick={()=>removeLending(l.id)}
                    style={{ background:'none',border:'none',cursor:'pointer',color:'#D1D5DB',flexShrink:0 }}>
                    <Icons.Trash2 size={15}/>
                  </button>
                </div>
                <button onClick={()=>toggleStatus(l.id)}
                  style={{ marginTop:10,width:'100%',padding:'10px 0',borderRadius:14,
                    fontWeight:800,fontSize:13,border:'none',cursor:'pointer',
                    background:'linear-gradient(145deg,#059669,#065F46)',color:'#fff',
                    boxShadow:'var(--shadow-btn)' }}>
                  ✅ ทำเครื่องหมายว่าคืนแล้ว
                </button>
              </div>
            );
          })}
        </div>
      )}

      {/* Returned list */}
      {returned.length > 0 && (
        <div>
          <p style={{ fontSize:11,fontWeight:800,color:'#059669',textTransform:'uppercase',letterSpacing:1,margin:'8px 0 8px' }}>✅ คืนแล้ว ({returned.length})</p>
          {returned.map(l => {
            const interest = calcInterest(l);
            return (
              <div key={l.id} style={{ background:'var(--clay-card)',borderRadius:18,padding:'12px 16px',
                marginBottom:8,boxShadow:'var(--shadow-out)',border:'1px solid #D1FAE5',opacity:0.75 }}>
                <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between' }}>
                  <div>
                    <p style={{ fontSize:13,fontWeight:800,color:'#374151',margin:'0 0 2px' }}>👤 {l.name}</p>
                    <p style={{ fontSize:12,color:'#059669',fontWeight:700,margin:0 }}>฿{fmt(l.amount)}{interest>0?` + ดอก ฿${fmt(interest)}`:''}</p>
                    {l.note && <p style={{ fontSize:10,color:'#9CA3AF',margin:'3px 0 0' }}>💬 {l.note}</p>}
                  </div>
                  <div style={{ display:'flex',alignItems:'center',gap:6 }}>
                    <button onClick={()=>toggleStatus(l.id)}
                      style={{ fontSize:10,padding:'4px 10px',borderRadius:10,fontWeight:700,
                        background:'var(--clay-inset)',border:'1px solid var(--clay-border)',
                        color:'#6B7E8D',cursor:'pointer',boxShadow:'var(--shadow-in)' }}>↩ ยกเลิก</button>
                    <button onClick={()=>removeLending(l.id)}
                      style={{ background:'none',border:'none',cursor:'pointer',color:'#D1D5DB' }}>
                      <Icons.Trash2 size={14}/>
                    </button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function MoneyScreen({ txns, setTxns, toast, showBuddy, accountsMgr }) { 
const [type,        setType]       = useState('expense'); 
const [cat,         setCat]        = useState(''); 
const [amount,      setAmount]     = useState(''); 
const [note,        setNote]       = useState(''); 
const [bank, setBank] = useState(() => { 
try { 
const accs = JSON.parse(localStorage.getItem('calcash_accounts') || '[]'); 
return accs?.[0]?.id || 'cash'; 
} catch { return 'cash'; } 
});

// Sync bank → first account whenever accountsMgr loads 
useEffect(() => { 
if (!accountsMgr) return; 
const accs = accountsMgr.accounts; 
if (accs.length > 0 && !accs.find(a => a.id === bank)) { 
setBank(accs[0].id); // auto-correct to first valid account 
} 
}, [accountsMgr?.accounts]); 
const [dailyBudget, setDailyBudget]= useState(()=>{ 
try{ return +localStorage.getItem('calcash_dailyBudget')||500; }catch{ return 500; } 
}); 
const [editingBudget, setEditingBudget] = useState(false); 
const [budgetInput,   setBudgetInput]   = useState('');

const cats = type==='income'?INCOME_CATS:EXPENSE_CATS; 
const totalIn  = txns.filter(t=>t.type==='income').reduce((a,t)=>a+t.amount,0); 
const totalOut = txns.filter(t=>t.type==='expense').reduce((a,t)=>a+t.amount,0); 
const net      = totalIn - totalOut;

// Daily stats — filter today's expenses by date string prefix (DD/MM/YYYY pattern) 
const todayStr = new Date().toLocaleDateString('th-TH',{day:'2-digit',month:'2-digit',year:'numeric'}); 
const todayExp = txns 
.filter(t=>t.type==='expense' && t.date && t.date.startsWith(todayStr)) 
.reduce((a,t)=>a+t.amount, 0); 
const remaining = dailyBudget - todayExp; 
const budgetPct = dailyBudget>0 ? clamp(Math.round(todayExp/dailyBudget*100),0,100) : 0; 
const isOver    = remaining < 0;

useEffect(()=>{ try{ localStorage.setItem('calcash_dailyBudget', String(dailyBudget)); }catch{} }, [dailyBudget]);

const saveBudget = () => { 
const v = +budgetInput; 
if (!isNaN(v) && v > 0) { setDailyBudget(v); toast(`ตั้งเป้าหมายรายวัน ฿${fmt(v)} แล้ว ✓`); } 
setEditingBudget(false); 
};

const add = () => { 
// ── Validation ── 
if (!cat) { 
toast('กรุณาเลือกหมวดหมู่ก่อนนะครับ ✏️', '#C4622D'); return; 
} 
if (!amount || +amount <= 0) { 
toast('กรุณากรอกจำนวนเงินให้ถูกต้องครับ 💰', '#C4622D'); return; 
}

// ── หา account ที่เลือก ──
const accs = accountsMgr?.accounts || [];
let matchedAcc = accs.find(a => a.id === bank);
if (!matchedAcc && accs.length > 0) {
  matchedAcc = accs[0];
  setBank(accs[0].id);
}

// ── snapshot ค่าปัจจุบัน ──
const snapCat    = cat;
const snapAmount = +amount;
const snapNote   = note.trim();
const snapType   = type;
const snapBank   = matchedAcc?.id || bank;

// ── สร้าง transaction ──
const t = {
  id:     Date.now(),
  type:   snapType,
  cat:    snapCat,
  amount: snapAmount,
  note:   snapNote,
  date:   todayTH(),
  bank:   snapBank,
};

// ── Functional update — keep max 30, newest first ──
const TXN_LIMIT = 30;
setTxns(prev => {
  const next = [t, ...prev].slice(0, TXN_LIMIT);
  db.set({ txns: next });   // sync localStorage
  return next;
});

// ── Reset form ──
setAmount('');
setNote('');
setCat('');

// ── อัปเดตยอด Multi-Account ──
if (accountsMgr && matchedAcc) {
  accountsMgr.updateBalance(matchedAcc.id, snapAmount, snapType);
}

const accName = matchedAcc?.name || snapBank;
toast('บันทึกแล้ว ✓ (' + accName + ')');

// ── Scroll to list ──
setTimeout(() => {
  const el = document.getElementById('txn-list');
  if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
}, 150);

if (showBuddy) showBuddy(
  snapType === 'income' ? 'income' : 'expense',
  null,
  snapCat + ' ฿' + fmt(snapAmount) + ' ' + accName
);
sbGetSession().then(u => { if (u) sbInsertTxn(t, u.id); });

}; 
const del=(id)=>{ 
const up=txns.filter(t=>t.id !== id); setTxns(up); db.set({txns:up}); 
sbDeleteTxn(id); // fire-and-forget Supabase delete 
};

return ( 
<div className="space-y-4"> 
<h2 className="text-2xl font-black text-slate-900">💰 รายรับ–รายจ่าย</h2>

  {/* ── OVERALL SUMMARY BANNER ── */}
  <div style={{ borderRadius:24,padding:20,background:'linear-gradient(145deg,#0F2537,#1C3D5A,#2B5278)',boxShadow:'var(--shadow-out)' }}>
    <div style={{ display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,color:'#fff' }}>
      <div><p style={{ fontSize:9,opacity:.5,textTransform:'uppercase' }}>รายรับ</p><p style={{ fontSize:15,fontWeight:900,color:'#BBF7D0' }}>+{fmtM(totalIn)}</p></div>
      <div style={{ textAlign:'center' }}><p style={{ fontSize:9,opacity:.5,textTransform:'uppercase' }}>สุทธิ</p><p style={{ fontSize:15,fontWeight:900 }}>{net>=0?'+':''}{fmtM(net)}</p></div>
      <div style={{ textAlign:'right' }}><p style={{ fontSize:9,opacity:.5,textTransform:'uppercase' }}>รายจ่าย</p><p style={{ fontSize:15,fontWeight:900,color:'#FECACA' }}>-{fmtM(totalOut)}</p></div>
    </div>
  </div>

  {/* ── DAILY BUDGET SUMMARY CARD ── */}
  <Card className="p-5" style={{ overflow:'hidden',position:'relative' }}>
    {/* deco bg */}
    <div style={{ position:'absolute',right:-8,top:-8,fontSize:72,opacity:.05,pointerEvents:'none',lineHeight:1 }}>📅</div>

    {/* Header row */}
    <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14 }}>
      <div style={{ display:'flex',alignItems:'center',gap:10 }}>
        <div style={{ width:38,height:38,borderRadius:12,flexShrink:0,
          background:'linear-gradient(145deg,#A83240,#8B2635)',
          boxShadow:'var(--shadow-btn)',
          display:'flex',alignItems:'center',justifyContent:'center' }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
            <path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/>
          </svg>
        </div>
        <div>
          <p style={{ fontSize:10,fontWeight:700,color:'#8A9BA8',textTransform:'uppercase',letterSpacing:1.5,margin:0 }}>Today's Budget</p>
          <p style={{ fontSize:13,fontWeight:900,color:'#1C2C3A',margin:0 }}>สรุปยอดรายวัน</p>
        </div>
      </div>
      <button onClick={()=>{ setBudgetInput(String(dailyBudget)); setEditingBudget(true); }}
        style={{ fontSize:11,fontWeight:700,padding:'6px 12px',borderRadius:12,
          background:'var(--clay-inset)',boxShadow:'var(--shadow-in)',
          border:'1px solid var(--clay-border)',color:'#6B7E8D',cursor:'pointer' }}>
        🎯 ตั้งเป้า
      </button>
    </div>

    {/* Budget edit inline */}
    {editingBudget && (
      <div style={{ display:'flex',gap:8,marginBottom:14,alignItems:'center' }}>
        <div style={{ position:'relative',flex:1 }}>
          <span style={{ position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',
            fontWeight:700,color:'#8A9BA8',fontSize:14 }}>฿</span>
          <input type="number" value={budgetInput} onChange={e=>setBudgetInput(e.target.value)}
            onKeyDown={e=>{ if(e.key==='Enter')saveBudget(); if(e.key==='Escape')setEditingBudget(false); }}
            autoFocus className={INP} style={{ paddingLeft:28,fontSize:18,fontWeight:900,color:'#A83240' }}/>
        </div>
        <button onClick={saveBudget} className="clay-btn-navy" style={{ padding:'10px 20px',width:'auto',flexShrink:0,fontSize:13 }}>บันทึก</button>
        <button onClick={()=>setEditingBudget(false)}
          style={{ padding:'10px 14px',borderRadius:12,background:'var(--clay-inset)',
            boxShadow:'var(--shadow-in)',border:'1px solid var(--clay-border)',
            color:'#8A9BA8',cursor:'pointer',fontWeight:700,flexShrink:0 }}>✕</button>
      </div>
    )}

    {/* 3 stat pills */}
    <div style={{ display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:14 }}>
      {/* Goal */}
      <div style={{ padding:'10px 8px',borderRadius:14,textAlign:'center',
        background:'linear-gradient(145deg,#EAF0F6,#DDE8F0)',boxShadow:'var(--shadow-out)',
        border:'1px solid #C8D8E8' }}>
        <p style={{ fontSize:9,fontWeight:700,color:'#4A7FA5',textTransform:'uppercase',margin:'0 0 3px',letterSpacing:1 }}>เป้าหมาย</p>
        <p style={{ fontSize:15,fontWeight:900,color:'#1C3D5A',margin:0 }}>฿{fmt(dailyBudget)}</p>
      </div>
      {/* Used today */}
      <div style={{ padding:'10px 8px',borderRadius:14,textAlign:'center',
        background:isOver?'linear-gradient(145deg,#F5EBEB,#EDD8D8)':'linear-gradient(145deg,#FAF0E8,#F5E8D8)',
        boxShadow:'var(--shadow-out)',
        border:`1px solid ${isOver?'#E8C8C8':'#DDD0C0'}` }}>
        <p style={{ fontSize:9,fontWeight:700,color:isOver?'#A83240':'#C4622D',textTransform:'uppercase',margin:'0 0 3px',letterSpacing:1 }}>วันนี้ใช้</p>
        <p style={{ fontSize:15,fontWeight:900,color:isOver?'#A83240':'#C4622D',margin:0 }}>฿{fmt(todayExp)}</p>
      </div>
      {/* Remaining */}
      <div style={{ padding:'10px 8px',borderRadius:14,textAlign:'center',
        background:isOver?'linear-gradient(145deg,#F5EBEB,#EDD8D8)':'linear-gradient(145deg,#E8F0F6,#D8EAF0)',
        boxShadow:'var(--shadow-out)',
        border:`1px solid ${isOver?'#E8C8C8':'#B8D0E0'}` }}>
        <p style={{ fontSize:9,fontWeight:700,color:isOver?'#A83240':'#1C3D5A',textTransform:'uppercase',margin:'0 0 3px',letterSpacing:1 }}>คงเหลือ</p>
        <p style={{ fontSize:15,fontWeight:900,color:isOver?'#A83240':'#1C3D5A',margin:0 }}>{isOver?'-':''}฿{fmt(Math.abs(remaining))}</p>
      </div>
    </div>

    {/* Progress bar */}
    <Progress pct={budgetPct} color={isOver?'#A83240':'#2B5278'} height={12}/>
    <div style={{ display:'flex',justifyContent:'space-between',marginTop:6 }}>
      <span style={{ fontSize:10,fontWeight:700,color:isOver?'#A83240':'#2B5278' }}>
        {budgetPct}% ของเป้าหมายวันนี้
      </span>
      {isOver
        ? <span style={{ fontSize:10,fontWeight:800,color:'#A83240' }}>⚠️ เกินเป้า ฿{fmt(Math.abs(remaining))}</span>
        : <span style={{ fontSize:10,color:'#8A9BA8' }}>เหลือ ฿{fmt(remaining)}</span>}
    </div>

    {/* Alert banner when over budget */}
    {isOver && (
      <div style={{ marginTop:12,padding:'10px 14px',borderRadius:14,
        background:'linear-gradient(145deg,#F5EBEB,#EDD8D8)',
        boxShadow:'var(--shadow-in)',border:'1px solid #E8C8C8',
        display:'flex',alignItems:'center',gap:8 }}>
        <span style={{ fontSize:18,flexShrink:0 }}>🚨</span>
        <p style={{ fontSize:12,fontWeight:800,color:'#A83240',margin:0 }}>
          ใช้เงินเกินเป้าวันนี้ ฿{fmt(Math.abs(remaining))} — ระวังค่าใช้จ่าย!
        </p>
      </div>
    )}
  </Card>

  {/* ── INPUT FORM ── */}
  <Card className="p-4">
    <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12 }}>
      {[['income','💚 รายรับ'],['expense','💸 รายจ่าย']].map(([v,l])=>(
        <button key={v} onClick={()=>{setType(v);setCat('');}}
          className={type===v?'clay-pill active':'clay-pill'}
          style={{ padding:'12px 0',fontSize:13,textAlign:'center',width:'100%',
            ...(type===v&&v==='expense'?{background:'linear-gradient(145deg,#A83240,#8B2635)'}:{}) }}>
          {l}
        </button>
      ))}
    </div>
    <div style={{ display:'flex',flexDirection:'column',gap:10 }}>
      <select value={cat} onChange={e=>setCat(e.target.value)} className={INP}>
        <option value="">เลือกหมวดหมู่...</option>{cats.map(c=><option key={c} value={c}>{c}</option>)}
      </select>

      {/* ── Account selector: Multi-Account chips ── */}
      {(() => {
        const accs = accountsMgr?.accounts || [];
        const [renameId,  setRenameId]  = useState(null);
        const [renameVal, setRenameVal] = useState('');
        const [renameEmoji, setRenameEmoji] = useState('');
        return (
          <div>
            <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8 }}>
              <p style={{ fontSize:10,fontWeight:700,color:'#8A9BA8',textTransform:'uppercase',
                letterSpacing:1,margin:0 }}>🏦 เลือกบัญชีที่ทำรายการ</p>
              {bank && <p style={{ fontSize:9,color:'#4A7FA5',margin:0,fontWeight:600 }}>
                ✓ เลือก: {accs.find(a=>a.id===bank)?.name||bank}
              </p>}
            </div>
            <div style={{ display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8 }}>
              {(accs.length>0?accs:ACC_DEFAULTS).map(acc => {
                const active  = bank === acc.id;
                const balPosColor = acc.balance>0?acc.color:acc.balance<0?'#A83240':'#9CA3AF';
                if (renameId === acc.id) {
                  // ── Inline rename mode ──
                  return (
                    <div key={acc.id} style={{ borderRadius:12,border:'1.5px solid #1C3D5A',

                      <div style={{ display:'flex',justifyContent:'center',gap:3,flexWrap:'wrap',marginBottom:2 }}>
                        {['💵','💳','🏦','🟢','🟣','🔵','🟡','🏧','💰'].map(em=>(
                          <button key={em} onClick={()=>setRenameEmoji(em)}
                            style={{ fontSize:14,padding:'2px',border:'none',cursor:'pointer',
                              background:renameEmoji===em?'#CBD5E1':'transparent',
                              borderRadius:4,lineHeight:1 }}>{em}</button>
                        ))}
                      </div>
                      <input value={renameVal} onChange={e=>setRenameVal(e.target.value)}
                        maxLength={10} placeholder="ชื่อบัญชี"

                          fontSize:10,outline:'none',textAlign:'center',
                          boxSizing:'border-box',width:'100%',fontFamily:'inherit' }}/>
                      <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:3 }}>
                        <button onClick={()=>{
                            if(accountsMgr) accountsMgr.editAccount(acc.id,{
                              name:renameVal.trim()||acc.name, emoji:renameEmoji||acc.emoji
                            });
                            setBank(acc.id); setRenameId(null);
                          }}
                          style={{ fontSize:10,padding:'4px',borderRadius:6,border:'none',
                            cursor:'pointer',background:'#1C3D5A',color:'#fff',fontFamily:'inherit' }}>
                          ✓
                        </button>
                        <button onClick={()=>{setRenameId(null);setBank(acc.id);}}
                          style={{ fontSize:10,padding:'4px',borderRadius:6,
                            border:'1px solid #CBD5E1',cursor:'pointer',
                            background:'#F4F4F4',color:'#8A9BA8',fontFamily:'inherit' }}>
                          ✕
                        </button>
                      </div>
                    </div>
                  );
                }
                // ── Display chip ──
                return (
                  <button key={acc.id} type="button"
                    onClick={()=>setBank(acc.id)}
                    onDoubleClick={()=>{ setRenameId(acc.id); setRenameVal(acc.name); setRenameEmoji(acc.emoji||'💵'); }}
                    title="กดเพื่อเลือก • กดสองครั้งเพื่อแก้ไขชื่อ"

// ── Rule-based fallback (more granular) ───────────────────── 
function ruleBasedCal(input) { 
if(input.includes('ไข่ต้ม')||input.includes('ไข่ลวก')) return{kcal:78,type:'ไข่'}; 
if(input.includes('ไข่ดาว')) return{kcal:120,type:'ไข่'}; 
if(input.includes('ไข่เจียว')) return{kcal:200,type:'ไข่'}; 
if(input.includes('ไข่')) return{kcal:100,type:'ไข่ (ประมาณ)'}; 
if(input.includes('ทอด')&&input.includes('ข้าว')) return{kcal:520,type:'อาหารจานเดียว'}; 
if(input.includes('ทอด')) return{kcal:350,type:'อาหารทอด'}; 
if(input.includes('นึ่ง')) return{kcal:160,type:'อาหารนึ่ง'}; 
if(input.includes('ย่าง')) return{kcal:280,type:'อาหารปิ้งย่าง'}; 
if(input.includes('ต้มยำ')) return{kcal:170,type:'แกง'}; 
if(input.includes('ต้ม')) return{kcal:180,type:'ต้ม'}; 
if(input.includes('แกง')) return{kcal:250,type:'แกงทั่วไป'}; 
if(input.includes('ผัด')&&input.includes('ข้าว')) return{kcal:520,type:'ข้าวผัด'}; 
if(input.includes('ข้าว')) return{kcal:400,type:'อาหารข้าว'}; 
if(input.includes('เส้น')||input.includes('ก๋วยเตี๋ยว')||input.includes('บะหมี่')) return{kcal:380,type:'เส้น'}; 
if(input.includes('สลัด')) return{kcal:120,type:'สลัด'}; 
if(input.includes('ซุป')||input.includes('น้ำซุป')) return{kcal:80,type:'ซุป'}; 
if(input.includes('ผัก')) return{kcal:50,type:'ผัก'}; 
if(input.includes('ชา')||input.includes('กาแฟ')) return{kcal:120,type:'เครื่องดื่ม'}; 
if(input.includes('น้ำ')) return{kcal:60,type:'เครื่องดื่ม'}; 
if(input.includes('นม')) return{kcal:150,type:'นม'}; 
return{kcal:350,type:'ไม่พบในฐานข้อมูล (ค่าประมาณ)'}; 
}

// ── analyzeInput: match ยาวก่อน + dedup ซ้ำ ───────────────── 
function analyzeInput(raw) { 
const input = raw.toLowerCase().trim(); 
// Split by common delimiters for multi-food input 
const segments = input.split(/[,+/\s]+(?=\S)/);

const matched = []; 
// Sort keys longest-first to prefer specific matches (e.g. 'ไข่เจียว' before 'ไข่') 
const keys = Object.keys(FOOD_CALORIES).sort((a,b)=>b.length-a.length);

// Track which part of input is already "consumed" 
let remaining = input; 
const usedKcal = new Set(); // dedup: skip key if a longer key already matched that substring

for (const key of keys) { 
const k = key.toLowerCase(); 
if (remaining.includes(k)) { 
// Check not already subsumed by a longer match 
const alreadyCovered = matched.some(m => m.name.toLowerCase().includes(k) && m.name.length > key.length); 
if (!alreadyCovered) { 
matched.push({ name: key, ...FOOD_CALORIES[key] }); 
// Remove matched text to prevent sub-key double-count 
remaining = remaining.replace(k, ''); 
} 
} 
}

if (matched.length > 0) return { items: matched, fallback: false }; 
// Full fallback 
const rule = ruleBasedCal(input); 
return { items: [{ name: raw.trim(), ...rule }], fallback: true }; 
}

} 
] 
}] 
}) 
});

  if (!resp.ok) {
    const errText = await resp.text();
    throw new Error(`API error ${resp.status}: ${errText.slice(0,120)}`);
  }

  const data = await resp.json();
  const raw  = data.content?.[0]?.text || '{}';

if(showBuddy) showBuddy('calorie'); 
};

color:'#fff',border:'none',cursor:'pointer', 
background:'linear-gradient(145deg,#A83240,#8B2635)', 
boxShadow:'var(--shadow-btn)' }}>รีเซ็ต</button> 
</div>

  {/* ── CALORIE PROGRESS ── */}

            {/* Item breakdown */}
            <div style={{ padding:14,background:'#FFFDF8' }}>

                      <span style={{ fontSize:12,fontWeight:900,color:'#1C3D5A' }}>{it.kcal} kcal</span>

    )}

    {/* ── MANUAL CAL TAB ── */}
    {activeTab==='manual' && (
      <div style={{ display:'flex',flexDirection:'column',gap:14 }}>
        <p style={{ fontSize:10,fontWeight:700,color:'#8A9BA8',
          textTransform:'uppercase',letterSpacing:1.5,margin:0 }}>

        </p>

        {/* ชื่ออาหาร */}
        <div>
          <label style={{ fontSize:11,fontWeight:700,color:'#6B7E8D',
            display:'block',marginBottom:6,letterSpacing:0.5 }}>

          </label>
          <input
            type="text"
            value={manualName}
            onChange={e=>setManualName(e.target.value)}
            placeholder="เช่น ข้าวมันไก่, ชาเย็น, ขนมปังทาเนย..."
            className={INP}
            style={{ fontSize:14 }}
          />
        </div>

        {/* แคลอรี */}
        <div>
          <label style={{ fontSize:11,fontWeight:700,color:'#6B7E8D',
            display:'block',marginBottom:6,letterSpacing:0.5 }}>

          <input
            type="number"

          {manualCal && +manualCal > 0 && (
            <div style={{ display:'flex',justifyContent:'center',marginTop:8 }}>

              </span>
            </div>
          )}

        {/* ปุ่มบันทึก */}
        <button
          onClick={()=>{
            const name = manualName.trim();
            const cal  = Math.round(+manualCal);
            if(!name){ toast('กรุณาใส่ชื่ออาหารด้วยค่ะ','#DC2626'); return; }
            if(!cal || cal<=0){ toast('กรุณาใส่แคลอรีด้วยค่ะ','#DC2626'); return; }
            const entry = {
              id:Date.now(), name, cal, meal,
              analysis:`✍️ ระบุเอง: ${cal} kcal`,
              date:todayTH(),
              isoDate:new Date().toISOString().slice(0,10),
              fromManual:true,
            };
            const up = [entry,...foods].slice(0,60);
            setFoods(up); db.set({foods:up});
            setManualName(''); setManualCal('');
            toast(`บันทึก "${name}" ${cal} kcal แล้ว ✓`,'#1A5C35');
          }}
          style={{ padding:'14px 0',borderRadius:16,fontWeight:900,fontSize:15,
            cursor:'pointer',border:'none',fontFamily:'inherit',color:'#fff',
            background: manualName.trim()&&+manualCal>0
              ? 'linear-gradient(145deg,#B45309,#92400E)'

    {/* ── PHOTO TAB ── */}
    {activeTab==='photo' && (
      <div style={{ display:'flex',flexDirection:'column',gap:12 }}>
        <p style={{ fontSize:10,fontWeight:700,color:'#8A9BA8',textTransform:'uppercase',

              {/* Change photo overlay */}
              <div style={{ position:'absolute',bottom:8,right:8,

              <div style={{ width:56,height:56,borderRadius:16,margin:'0 auto 10px',
                background:'linear-gradient(145deg,#A83240,#8B2635)',
                boxShadow:'var(--shadow-btn)',
                display:'flex',alignItems:'center',justifyContent:'center' }}>
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none"
                  stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                  <circle cx="12" cy="13" r="4"/>
                </svg>
              </div>
              <p style={{ fontSize:13,fontWeight:700,color:'#1C2C3A',margin:'0 0 4px' }}>

              </p>

        </div>

          style={{ display:'none' }} onChange={pickPhoto}/>

        <button onClick={analyzePhoto}
          disabled={!photoFile || photoLoading}

            <>
              <span style={{ display:'inline-block',animation:'spin 1s linear infinite',fontSize:16 }}>⏳</span>

        </button>
        <style>{`@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}`}</style>

        {/* Photo result */}

          <div style={{ borderRadius:20,overflow:'hidden',

              <div style={{ display:'flex',alignItems:'center',justifyContent:'center',gap:6,marginBottom:4 }}>

                {photoResult.total}

              <div style={{ marginTop:12,padding:'8px 16px',borderRadius:14,display:'inline-block',

    {/* ── IF TIMER TAB ── */}
    {activeTab==='if' && (() => {
      const now = ifNow;
      const startTs = ifData?.startTs ? new Date(ifData.startTs) : null;
      const elapsedMs = startTs ? (now - startTs) : 0;
      const elapsedH  = elapsedMs / 3600000;
      const fastH     = ifData?.fastHours || 16;
      const feedH     = ifData?.feedHours || 8;
      const totalH    = fastH + feedH;
      const pct       = (ifData?.active && startTs) ? clamp(Math.round(elapsedH/fastH*100),0,100) : 0;
      const inFeed    = elapsedH >= fastH && elapsedH < totalH;
      const hh=Math.floor(elapsedH);
      const mm=Math.floor((elapsedH-hh)*60);
      const ss=Math.floor(((elapsedH-hh)*60-mm)*60);
      const elapsed=`${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
      const remFastMs = startTs ? Math.max(0,(startTs.getTime()+fastH*3600000)-now) : 0;
      const remH=Math.floor(remFastMs/3600000), remM=Math.floor((remFastMs%3600000)/60000);
      const endFastTime = startTs ? new Date(startTs.getTime()+fastH*3600000).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}) : '--:--';
      const endFeedTime = startTs ? new Date(startTs.getTime()+totalH*3600000).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}) : '--:--';
      return (
        <div style={{ display:'flex',flexDirection:'column',gap:14 }}>
          {/* Protocol picker */}
          {!ifData?.active && (
            <>
              <div style={{ background:'var(--clay-inset)',borderRadius:16,padding:'14px 16px',
                boxShadow:'var(--shadow-in)',border:'1px solid var(--clay-border)' }}>
                <p style={{ fontSize:11,fontWeight:700,color:'#6B7E8D',textTransform:'uppercase',

                      <div style={{ flex:1,minWidth:0 }}>
                        <p style={{ fontSize:11,fontWeight:800,color:'#1C2C3A',margin:0 }}>

                      <span style={{ fontSize:10,fontWeight:800,flexShrink:0,

                        background:h.status==='completed'?'#E8F5EE':'#FFF0F0',
                        padding:'2px 8px',borderRadius:20 }}>
                        {h.status==='completed'?'สำเร็จ':'ยกเลิก'}
                      </span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      );
    })()}

try { 
const session = await sbGetSession(); 
if (!session) { console.warn('[ProfileImg] Not logged in, skipping Supabase upload'); return; } 
const ext  = file.name.split('.').pop() || 'jpg'; 
const path = `${session.id}/avatar.${ext}`; 
console.log('[ProfileImg] Uploading to Supabase Storage path:', path); 
const { data, error } = await supabase.storage 
.from('avatars') 
.upload(path, file, { upsert: true, contentType: file.type }); 
if (error) { 
console.error('[ProfileImg] Upload error:', error.message, error); 
// Keep local base64 preview — user still sees their pic 
} else { 
console.log('[ProfileImg] Upload success:', data); 
const { data: urlData } = supabase.storage.from('avatars').getPublicUrl(path); 
const publicUrl = urlData?.publicUrl; 
console.log('[ProfileImg] Public URL:', publicUrl); 
if (publicUrl) setImg(publicUrl); // use CDN URL instead of base64 
} 
} catch(err) { 
console.error('[ProfileImg] Exception during upload:', err); 
} 
};
