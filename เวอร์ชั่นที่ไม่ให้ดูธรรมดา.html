setPdfLoading(row.date); 
try { 
const { jsPDF } = window.jspdf; 
const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' }); 
const thDate = row.date || '-'; // use ISO date (YYYY-MM-DD) for PDF font compatibility

  _pdfHeader(doc, 'Daily Financial & Health Statement', `Date: ${thDate}`);

  let y = 50;
  y = _pdfAccountBox(doc, y, user.name, user.email || '');
  y += 4;
  y = _pdfSection(doc, y, 'FINANCIAL SUMMARY');

  const net = (row.income||0) - (row.expense||0);
  y = _pdfRow(doc, y, 'Income',      `THB ${(row.income||0).toLocaleString('th-TH')}`, false, [26,92,53]);

            {d.dayIF.length>0 && (

                  textTransform:'uppercase',letterSpacing:1,margin:'0 0 6px' }}>⏱ IF Timer</p>
                {d.dayIF.map((h,i)=>{
                  const dur = h.endTs&&h.startTs
                    ? Math.round((new Date(h.endTs)-new Date(h.startTs))/3600000*10)/10 : null;
                  const ok = h.status==='completed';
                  return (
                    <div key={i} style={{ display:'flex',alignItems:'center',gap:8,
                      padding:'7px 10px',borderRadius:10,marginBottom:4,
                      background:ok?'#ECFDF5':'#FEF2F2' }}>
                      <span style={{ fontSize:14 }}>{ok?'✅':'❌'}</span>
                      <div style={{ flex:1 }}>
                        <p style={{ fontSize:11,fontWeight:700,
                          color:ok?'#065F46':'#991B1B',margin:0 }}>
                          {ok?'สำเร็จ':'ยกเลิก'} · อด {h.fastH||0} ชม. / กิน {h.feedH||0} ชม.
                        </p>
                        {dur && (
                          <p style={{ fontSize:10,color:'#6B7E8D',margin:'2px 0 0' }}>
                            อดจริง {dur} ชม.
                            {h.startTs&&` · เริ่ม ${new Date(h.startTs).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})}`}
                          </p>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {d.txnCount===0&&d.cal===0&&d.dayIF.length===0&&(
              <p style={{ fontSize:11,color:'#CBD5E1',textAlign:'center',
                margin:'4px 0 0',fontStyle:'italic' }}>ไม่มีข้อมูลวันนี้</p>
            )}
          </div>
        ))}

        <div style={{ textAlign:'center',padding:'8px 0 80px' }}>
          <p style={{ fontSize:10,color:'#94A3B8',margin:0 }}>
            Cal & Cash · สร้างเมื่อ {new Date().toLocaleString('th-TH')}
          </p>
        </div>
      </div>
    </div>
  );
})()}

</>
); 
}

// phase: 'enter' → 'show' → 'exit' → unmounted 
const [phase, setPhase] = useState('enter'); 
const onCloseRef = useRef(onClose); 
useEffect(() => { onCloseRef.current = onClose; }, [onClose]);

useEffect(() => { 
// Small delay so browser paints the element before animation starts 
const t1 = setTimeout(() => setPhase('show'), 30); 
// Auto-dismiss after 4.5s 
const t2 = setTimeout(() => { 
setPhase('exit'); 
setTimeout(() => onCloseRef.current(), 380); 
}, 4500); 
return () => { clearTimeout(t1); clearTimeout(t2); }; 
}, []); // ← empty deps: run once on mount only

const handleClose = () => { 
setPhase('exit'); 
setTimeout(() => onCloseRef.current(), 380); 
};

// Don't render at all during initial 'enter' phase until we flip to 'show' 
const animName = phase === 'show' ? 'buddyIn' : phase === 'exit' ? 'buddyOut' : 'buddyIn'; 
const opacity  = phase === 'enter' ? 0 : 1;

return ( 
<> 
<style>{`@keyframes buddyIn { 0%  { transform: translateX(-50%) scale(0.6) translateY(40px); opacity: 0; } 60% { transform: translateX(-50%) scale(1.06) translateY(-6px); opacity: 1; } 80% { transform: translateX(-50%) scale(0.97) translateY(2px); } 100%{ transform: translateX(-50%) scale(1) translateY(0); opacity: 1; } } @keyframes buddyOut { 0%  { transform: translateX(-50%) scale(1) translateY(0); opacity: 1; } 100%{ transform: translateX(-50%) scale(0.75) translateY(28px); opacity: 0; } } @keyframes buddyFloat { 0%,100%{ transform: translateY(0px); } 50%    { transform: translateY(-6px); } } @keyframes buddySparkle { 0%,100%{ opacity:1; transform:scale(1) rotate(0deg); } 50%    { opacity:0.6; transform:scale(1.3) rotate(20deg); } }`}</style>




















  {/* Backdrop — only interactive when showing */}
  {phase !== 'enter' && (
    <div onClick={handleClose} style={{
      position:'fixed', inset:0, zIndex:9990,
      background: phase==='show' ? 'rgba(0,0,0,0.18)' : 'rgba(0,0,0,0)',
      transition: 'background .3s',
      backdropFilter: phase==='show' ? 'blur(2px)' : 'none',
      WebkitBackdropFilter: phase==='show' ? 'blur(2px)' : 'none',
    }}/>

  {/* Popup card — positioned fixed, translateX in animation */}
  <div style={{

// AI Smart Advisor: calls Claude API for context-aware messages 
async function getAIAdvice(type, context) { 
try { 
const prompts = { 
food: `อาหารที่เพิ่งบันทึก: ${context} วิเคราะห์แล้วให้คำแนะนำด้านโภชนาการ 1 ประโยค ภาษาไทย อบอุ่น เป็นโค้ชส่วนตัว ไม่เกิน 35 คำ เช่น "เมนูนี้แคลอรีสูงนิดนึงนะคะ แนะนำทานคู่ผักเพิ่มเติมจะดีมากเลย! 🥗"`, 
expense: `รายการที่บันทึก: ${context} วิเคราะห์แล้วให้คำแนะนำด้านการเงิน 1 ประโยค ภาษาไทย อบอุ่น เป็นที่ปรึกษาการเงินส่วนตัว ไม่เกิน 35 คำ เช่น "ใช้จ่ายในหมวดนี้สูงขึ้นนะคะ ลองวางแผนงบประมาณเพื่อความมั่นคงทางการเงินด้วยนะคะ! 💰"`, 
income: `รายรับที่บันทึก: ${context} ให้กำลังใจและแนะนำการออม 1 ประโยค ภาษาไทย อบอุ่น ไม่เกิน 30 คำ`, 
}; 
const prompt = prompts[type] || prompts.expense; 
const res = await fetch('https://api.anthropic.com/v1/messages', { 
method:'POST', 
headers:{'Content-Type':'application/json'}, 
body: JSON.stringify({ 
model:'claude-sonnet-4-6', max_tokens:100, 
messages:[{role:'user', content: prompt}] 
}) 
}); 
if (!res.ok) return null; 
const d = await res.json(); 
return d.content?.[0]?.text?.trim() || null; 
} catch(e) { return null; } 
}






function useBuddy() { 
const [buddy, setBuddy] = useState(null); 
const show = useCallback(async (type, customMsg, context) => { 
// Show default msg immediately, then upgrade with AI if context provided 
const defaultMsg = customMsg || rndMsg(type); 
const id = Date.now(); 
setBuddy({ message: defaultMsg, type, id }); 
// If context given → fetch AI advice and swap message 
if (context) { 
const aiMsg = await getAIAdvice(type, context); 
if (aiMsg) { 
setBuddy(prev => prev?.id === id ? {...prev, message: aiMsg} : prev); 
} 
} 
}, []); 
const close = useCallback(() => setBuddy(null), []); 
const comp = buddy 
? <AiBuddyPopup key={buddy.id} message={buddy.message} onClose={close}/> 
: null; 
return [show, comp]; 
}

          : <div style={{ width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center' }}>
              <Icons.User size={14} color="#B0B8C4"/>
            </div>}
      </button>
    </div>
  </header>



  <div style={{ flex:1,overflowY:'auto',WebkitOverflowScrolling:'touch' }}>
  <div style={{ padding:'8px 16px',maxWidth:672,margin:'0 auto',paddingBottom:'16px' }}>
    {tab==='home'     && <HomeScreen     user={user} loans={loans} txns={txns} foods={foods} debtPayments={debtPayments} setTab={setTab} emergencyFund={emergencyFund} setEmergencyFund={setEmergencyFund} accountsMgr={accountsMgr}/>}
    {tab==='debt'     && <DebtScreen     user={user} loans={loans} setLoans={setLoans} debtPayments={debtPayments} setDebtPayments={setDebtPayments} toast={showToast} mockUser={mockUser} invitations={invitations}/> }
    {tab==='analytics' && <SummaryScreen txns={txns} foods={foods} user={user} ifHistory={rootIfHistory}/>}
    {tab==='money'    && <MoneyScreen    txns={txns} setTxns={setTxns} toast={showToast} showBuddy={showBuddy} accountsMgr={accountsMgr}/>}
    {tab==='food'     && <FoodScreen     user={user} setUser={setUser} foods={foods} setFoods={setFoods} toast={showToast} showBuddy={showBuddy}/>}
    {tab==='admin'    && isAdmin && <AdminPanelScreen loans={loans} setLoans={setLoans} toast={showToast} invitations={invitations} setInvitations={setInvitations}/>}
    {tab==='settings' && <SettingsScreen user={user} role={role} sbUser={sbUser}
      onChangePin={()=>setShowChangePin(true)}
      onLogout={()=>{ setAuthenticated(false); setRole('user'); setTab('home'); clearSession(); }}/>}
  </div>
  </div>

  <BottomNav tab={tab} setTab={setTab} isAdmin={isAdmin}/>
</div>

); 
}

//  
// ERROR BOUNDARY — prevents blank white screen on runtime errors 
//  
class ErrorBoundary extends React.Component { 
constructor(props) { super(props); this.state = { error: null }; } 
static getDerivedStateFromError(err) { return { error: err }; } 
render() { 
if (this.state.error) { 
return ( 
<div style={{ minHeight:'100vh', display:'flex', flexDirection:'column', 
alignItems:'center', justifyContent:'center', padding:24, 
background:'#0A0F1E', color:'#fff', fontFamily:'Inter,sans-serif' }}> 
<div style={{ fontSize:40, marginBottom:16 }}>⚠️</div> 
<h2 style={{ fontWeight:900, fontSize:20, margin:'0 0 8px' }}>เกิดข้อผิดพลาด</h2> 
<p style={{ color:'#94A3B8', fontSize:13, textAlign:'center', maxWidth:320 }}> 
{String(this.state.error.message)} 
</p> 
<button onClick={()=>this.setState({error:null})} 
style={{ marginTop:24, padding:'10px 24px', borderRadius:16, fontWeight:700, 
background:'#10B981', color:'#fff', border:'none', cursor:'pointer', fontSize:14 }}> 
ลองใหม่ 
</button> 
</div> 
); 
} 
return this.props.children; 
} 
}

const root = ReactDOM.createRoot(document.getElementById('root')); 
root.render( 
<ErrorBoundary> 
<CalCashSuperApp/> 
</ErrorBoundary> 
); 
</script>
