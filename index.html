<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cal & Cash Super App</title>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Inter',sans-serif;
      background:#F4F7FB;
      color:#1C2C3A;
      overflow-x:hidden;
    }

    #root{
      min-height:100vh;
    }

    button{
      font-family:'Inter',sans-serif;
      outline:none;
    }

    .card{
      background:#fff;
      border:1px solid #E5E7EB;
      border-radius:20px;
    }

    .nav-btn{
      border:none;
      background:transparent;
      font-size:13px;
      font-weight:700;
      cursor:pointer;
      transition:0.2s;
    }

    .nav-btn:hover{
      transform:translateY(-1px);
    }

  </style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const { useState } = React;

// ======================================================
// SAFE ICONS
// ======================================================

const Icons = {

  Shield: ({size=18}) => (
    <span style={{
      fontSize:size,
      lineHeight:1
    }}>
      🛡️
    </span>
  ),

  User: ({size=18}) => (
    <span style={{
      fontSize:size,
      lineHeight:1
    }}>
      👤
    </span>
  )

};

// ======================================================
// PROGRESS BAR
// ======================================================

function Progress({
  pct=50,
  color='#10B981',
  height=8
}){

  return(
    <div style={{
      width:'100%',
      height,
      background:'#E5E7EB',
      borderRadius:999,
      overflow:'hidden'
    }}>

      <div style={{
        width:`${pct}%`,
        height:'100%',
        background:color,
        borderRadius:999,
        transition:'0.3s ease'
      }}/>

    </div>
  );
}

// ======================================================
// HOME SCREEN
// ======================================================

function HomeScreen(){

  return(
    <div className="card" style={{
      padding:24
    }}>

      <h2 style={{
        fontSize:24,
        fontWeight:900,
        marginBottom:10
      }}>
        Dashboard
      </h2>

      <p style={{
        color:'#64748B',
        lineHeight:1.6
      }}>
        ระบบ Cal & Cash พร้อมใช้งานแล้ว
      </p>

    </div>
  );
}

// ======================================================
// MONEY SCREEN
// ======================================================

function MoneyScreen(){

  return(
    <div className="card" style={{
      padding:24
    }}>

      <h2 style={{
        fontSize:24,
        fontWeight:900,
        marginBottom:12
      }}>
        Money Manager
      </h2>

      <div style={{
        display:'grid',
        gap:12
      }}>

        <div style={{
          padding:16,
          background:'#F8FAFC',
          borderRadius:14
        }}>
          💸 รายรับวันนี้: 0 บาท
        </div>

        <div style={{
          padding:16,
          background:'#F8FAFC',
          borderRadius:14
        }}>
          💳 รายจ่ายวันนี้: 0 บาท
        </div>

      </div>

    </div>
  );
}

// ======================================================
// FOOD SCREEN
// ======================================================

function FoodScreen(){

  return(
    <div className="card" style={{
      padding:24
    }}>

      <h2 style={{
        fontSize:24,
        fontWeight:900,
        marginBottom:12
      }}>
        Calories Tracker
      </h2>

      <p style={{
        color:'#64748B'
      }}>
        ติดตามอาหารและแคลอรี่
      </p>

    </div>
  );
}

// ======================================================
// ANALYTICS
// ======================================================

function AnalyticsScreen(){

  return(
    <div className="card" style={{
      padding:24
    }}>

      <h2 style={{
        fontSize:24,
        fontWeight:900,
        marginBottom:12
      }}>
        Analytics
      </h2>

      <p style={{
        color:'#64748B'
      }}>
        ระบบวิเคราะห์ข้อมูล
      </p>

    </div>
  );
}

// ======================================================
// SETTINGS
// ======================================================

function SettingsScreen(){

  return(
    <div className="card" style={{
      padding:24
    }}>

      <h2 style={{
        fontSize:24,
        fontWeight:900,
        marginBottom:12
      }}>
        Settings
      </h2>

      <p style={{
        color:'#64748B'
      }}>
        ตั้งค่าระบบ
      </p>

    </div>
  );
}

// ======================================================
// BOTTOM NAV
// ======================================================

function BottomNav({tab,setTab}){

  const menus = [
    'home',
    'money',
    'food',
    'analytics',
    'settings'
  ];

  return(

    <div style={{
      position:'fixed',
      bottom:0,
      left:0,
      right:0,
      background:'#fff',
      borderTop:'1px solid #E5E7EB',
      padding:'12px 8px',
      display:'flex',
      justifyContent:'space-around',
      zIndex:999
    }}>

      {menus.map(menu=>(

        <button
          key={menu}
          className="nav-btn"
          onClick={()=>setTab(menu)}
          style={{
            color:tab===menu ? '#2563EB' : '#94A3B8'
          }}
        >
          {menu}
        </button>

      ))}

    </div>

  );
}

// ======================================================
// MAIN APP
// ======================================================

function CalCashSuperApp(){

  const [tab,setTab] = useState('home');

  const user = {
    img:''
  };

  const isAdmin = false;

  const creditScore = 82;
  const creditColor = '#10B981';
  const creditLabel = 'GOOD';

  const renderScreen = () => {

    switch(tab){

      case 'home':
        return <HomeScreen/>;

      case 'money':
        return <MoneyScreen/>;

      case 'food':
        return <FoodScreen/>;

      case 'analytics':
        return <AnalyticsScreen/>;

      case 'settings':
        return <SettingsScreen/>;

      default:
        return <HomeScreen/>;
    }

  };

  return(

    <div style={{
      paddingBottom:90
    }}>

      {/* HEADER */}

      <header style={{
        background:'#fff',
        borderBottom:'1px solid #E5E7EB',
        padding:'12px 16px',
        display:'flex',
        alignItems:'center',
        justifyContent:'space-between',
        position:'sticky',
        top:0,
        zIndex:100
      }}>

        {/* LEFT */}

        <div style={{
          display:'flex',
          alignItems:'center',
          gap:10
        }}>

          <div style={{
            width:36,
            height:36,
            borderRadius:12,
            background:'linear-gradient(135deg,#1C3D5A,#2B5278)',
            display:'flex',
            alignItems:'center',
            justifyContent:'center'
          }}>

            <Icons.Shield size={18}/>

          </div>

          <div>

            <p style={{
              fontSize:15,
              fontWeight:900,
              color:'#1C2C3A'
            }}>
              Cal & Cash
            </p>

            <p style={{
              fontSize:10,
              color:'#94A3B8'
            }}>
              Super App
            </p>

          </div>

        </div>

        {/* RIGHT */}

        <div style={{
          display:'flex',
          alignItems:'center',
          gap:8
        }}>

          {isAdmin ? (

            <button style={{
              padding:'6px 12px',
              borderRadius:999,
              border:'none',
              background:'linear-gradient(145deg,#2B5278,#1C3D5A)',
              color:'#fff',
              fontWeight:800,
              cursor:'pointer'
            }}>
              👑 Admin
            </button>

          ) : (

            <button style={{
              padding:'6px 12px',
              borderRadius:999,
              border:'1px solid #E5E7EB',
              background:'#fff',
              cursor:'pointer'
            }}>
              Admin
            </button>

          )}

          <button style={{
            width:36,
            height:36,
            borderRadius:'50%',
            border:'2px solid #E5E7EB',
            background:'#F1F5F9',
            display:'flex',
            alignItems:'center',
            justifyContent:'center',
            cursor:'pointer'
          }}>

            {user.img ? (

              <img
                src={user.img}
                alt="avatar"
                style={{
                  width:'100%',
                  height:'100%',
                  objectFit:'cover',
                  borderRadius:'50%'
                }}
              />

            ) : (

              <Icons.User size={16}/>

            )}

          </button>

        </div>

      </header>

      {/* CREDIT SCORE */}

      <div style={{
        padding:'16px',
        maxWidth:700,
        margin:'0 auto'
      }}>

        <div className="card" style={{
          padding:18,
          display:'flex',
          alignItems:'center',
          gap:16
        }}>

          <div style={{
            flex:1
          }}>

            <div style={{
              display:'flex',
              justifyContent:'space-between',
              marginBottom:8
            }}>

              <p style={{
                fontSize:10,
                fontWeight:700,
                letterSpacing:2,
                color:'#94A3B8'
              }}>
                AI CREDIT SCORE
              </p>

              <span style={{
                fontSize:12,
                fontWeight:900,
                padding:'3px 10px',
                borderRadius:999,
                background:'#DCFCE7',
                color:creditColor
              }}>
                {creditLabel}
              </span>

            </div>

            <Progress
              pct={creditScore}
              color={creditColor}
            />

          </div>

          <div style={{
            textAlign:'right'
          }}>

            <p style={{
              fontSize:30,
              fontWeight:900,
              color:creditColor
            }}>
              {creditScore}
            </p>

            <p style={{
              fontSize:10,
              color:'#94A3B8'
            }}>
              /100
            </p>

          </div>

        </div>

      </div>

      {/* CONTENT */}

      <div style={{
        padding:'0 16px',
        maxWidth:700,
        margin:'0 auto'
      }}>

        {renderScreen()}

      </div>

      {/* NAVBAR */}

      <BottomNav
        tab={tab}
        setTab={setTab}
      />

    </div>

  );
}

// ======================================================
// ERROR BOUNDARY
// ======================================================

class ErrorBoundary extends React.Component{

  constructor(props){

    super(props);

    this.state = {
      error:null
    };

  }

  static getDerivedStateFromError(error){

    return {
      error
    };

  }

  render(){

    if(this.state.error){

      return(

        <div style={{
          minHeight:'100vh',
          background:'#0F172A',
          color:'#fff',
          display:'flex',
          flexDirection:'column',
          justifyContent:'center',
          alignItems:'center',
          padding:24
        }}>

          <div style={{
            fontSize:48,
            marginBottom:16
          }}>
            ⚠️
          </div>

          <h1 style={{
            fontSize:24,
            marginBottom:12
          }}>
            แอปเกิดข้อผิดพลาด
          </h1>

          <p style={{
            color:'#CBD5E1',
            textAlign:'center',
            maxWidth:400,
            lineHeight:1.6
          }}>
            {String(this.state.error.message)}
          </p>

          <button
            onClick={()=>{
              window.location.reload();
            }}
            style={{
              marginTop:24,
              padding:'12px 20px',
              border:'none',
              borderRadius:14,
              background:'#10B981',
              color:'#fff',
              fontWeight:700,
              cursor:'pointer'
            }}
          >
            Reload App
          </button>

        </div>

      );

    }

    return this.props.children;

  }

}

// ======================================================
// SAFE ROOT RENDER
// ======================================================

const rootElement = document.getElementById('root');

if(rootElement){

  const root = ReactDOM.createRoot(rootElement);

  root.render(

    <ErrorBoundary>
      <CalCashSuperApp/>
    </ErrorBoundary>

  );

}else{

  document.body.innerHTML = `
    <div style="
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:Arial;
    ">
      Root element not found
    </div>
  `;

}

</script>

</body>
</html>
