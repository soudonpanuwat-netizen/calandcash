<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cal & Cash</title>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial,sans-serif;
      background:#F4F7FB;
    }

    button{
      cursor:pointer;
    }
  </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">

const { useState } = React;

// ======================
// Progress Bar
// ======================
function Progress({ pct, color }) {
  return (
    <div style={{
      width:'100%',
      height:8,
      background:'#E5E7EB',
      borderRadius:999
    }}>
      <div style={{
        width:pct + '%',
        height:'100%',
        background:color,
        borderRadius:999
      }} />
    </div>
  );
}

// ======================
// Bottom Nav
// ======================
function BottomNav({ tab, setTab }) {

  const menus = ['home','money','food','settings'];

  return (
    <div style={{
      position:'fixed',
      bottom:0,
      left:0,
      right:0,
      background:'#fff',
      borderTop:'1px solid #ddd',
      display:'flex',
      justifyContent:'space-around',
      padding:12
    }}>
      {menus.map(menu => (
        <button
          key={menu}
          onClick={() => setTab(menu)}
          style={{
            border:'none',
            background:'transparent',
            fontWeight:'bold',
            color:tab === menu ? '#2563EB' : '#94A3B8'
          }}
        >
          {menu}
        </button>
      ))}
    </div>
  );
}

// ======================
// Main App
// ======================
function CalCashSuperApp() {

  const [tab, setTab] = useState('home');

  const creditScore = 82;
  const creditColor = '#10B981';
  const creditLabel = 'GOOD';

  return (
    <div style={{ paddingBottom:80 }}>

      {/* Header */}
      <header style={{
        background:'#fff',
        padding:'12px 16px',
        display:'flex',
        justifyContent:'space-between',
        alignItems:'center',
        borderBottom:'1px solid #eee'
      }}>

        <div style={{
          display:'flex',
          alignItems:'center',
          gap:10
        }}>
          <div style={{
            width:36,
            height:36,
            borderRadius:10,
            background:'linear-gradient(135deg,#1C3D5A,#2B5278)',
            display:'flex',
            justifyContent:'center',
            alignItems:'center',
            color:'#fff'
          }}>
            🛡️
          </div>

          <div>
            <div style={{
              fontWeight:900,
              fontSize:15
            }}>
              Cal & Cash
            </div>

            <div style={{
              fontSize:10,
              color:'#94A3B8'
            }}>
              Super App
            </div>
          </div>
        </div>

        <button style={{
          width:36,
          height:36,
          borderRadius:'50%',
          border:'none',
          background:'#E2E8F0'
        }}>
          👤
        </button>

      </header>

      {/* Credit Score */}
      <div style={{
        padding:16,
        maxWidth:700,
        margin:'0 auto'
      }}>

        <div style={{
          background:'#fff',
          borderRadius:20,
          padding:20,
          border:'1px solid #eee'
        }}>

          <div style={{
            display:'flex',
            justifyContent:'space-between',
            marginBottom:10
          }}>

            <div>
              <div style={{
                fontSize:11,
                color:'#94A3B8',
                fontWeight:'bold'
              }}>
                AI CREDIT SCORE
              </div>

              <div style={{
                marginTop:8,
                width:220
              }}>
                <Progress
                  pct={creditScore}
                  color={creditColor}
                />
              </div>
            </div>

            <div style={{
              textAlign:'right'
            }}>
              <div style={{
                fontSize:32,
                fontWeight:900,
                color:creditColor
              }}>
                {creditScore}
              </div>

              <div style={{
                fontSize:12,
                color:'#94A3B8'
              }}>
                {creditLabel}
              </div>
            </div>

          </div>

        </div>

      </div>

      {/* Content */}
      <div style={{
        padding:16,
        maxWidth:700,
        margin:'0 auto'
      }}>
        <div style={{
          background:'#fff',
          borderRadius:20,
          padding:30,
          border:'1px solid #eee'
        }}>
          <h1>{tab.toUpperCase()}</h1>

          <p style={{
            marginTop:10,
            color:'#64748B'
          }}>
            ระบบทำงานปกติแล้ว
          </p>
        </div>
      </div>

      <BottomNav tab={tab} setTab={setTab} />

    </div>
  );
}

// ======================
// Error Boundary
// ======================
class ErrorBoundary extends React.Component {

  constructor(props){
    super(props);
    this.state = {
      error:null
    };
  }

  static getDerivedStateFromError(error){
    return { error };
  }

  render(){

    if(this.state.error){
      return (
        <div style={{
          minHeight:'100vh',
          display:'flex',
          justifyContent:'center',
          alignItems:'center',
          flexDirection:'column'
        }}>
          <h2>เกิดข้อผิดพลาด</h2>

          <p>{String(this.state.error.message)}</p>
        </div>
      );
    }

    return this.props.children;
  }
}

// ======================
// Render
// ======================
const root = ReactDOM.createRoot(
  document.getElementById('root')
);

root.render(
  <ErrorBoundary>
    <CalCashSuperApp />
  </ErrorBoundary>
);

</script>

</body>
</html>
