function Toast({ msg, color='#059669', onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2200); return () => clearTimeout(t); }, [onDone]);
  return (
    <div style={{ position:'fixed',top:20,left:'50%',transform:'translateX(-50%)',zIndex:999,
      background:color,color:'#fff',padding:'12px 24px',borderRadius:16,fontSize:14,
      fontWeight:700,boxShadow:'0 8px 32px rgba(0,0,0,0.25)',minWidth:220,textAlign:'center' }}>
      {msg}
    </div>
  );
}

function useToast() {
  const [toasts, setToasts] = useState([]);
  const show = useCallback((msg, color='#059669') => {
    setToasts(t => [...t, { id: Date.now(), msg, color }]);
  }, []);
  const comp = (
    <>
      {toasts.map(t => (
        <Toast key={t.id} msg={t.msg} color={t.color} onDone={() => setToasts(ts => ts.filter(x => x.id !== t.id))}/>
      ))}
    </>
  );
  return [show, comp];
}

function Keypad({ onTap, onDel }) {
  const keys = ['1','2','3','4','5','6','7','8','9','','0','X'];
  return (
    <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:12, width:288, margin:'0 auto' }}>
      {keys.map((k,i) => k===''
        ? <div key={i}/>
        : (
          <button key={i} onClick={() => k==='X' ? onDel() : onTap(k)}
            style={{
              height:56, borderRadius:16, fontWeight:700, fontSize:20, cursor:'pointer',
              background: k==='X'?'rgba(239,68,68,0.15)':'rgba(255,255,255,0.08)',
              color: k==='X'?'#F87171':'#F1F5F9',
              border:'1px solid rgba(255,255,255,0.1)',
              transition:'transform .1s'
            }}
            onMouseDown={e=>e.currentTarget.style.transform='scale(0.9)'}
            onMouseUp={e=>e.currentTarget.style.transform='scale(1)'}
            onTouchStart={e=>e.currentTarget.style.transform='scale(0.9)'}
            onTouchEnd={e=>e.currentTarget.style.transform='scale(1)'}>
            {k==='X'?'⌫':k}
          </button>
        )
      )}
    </div>
  );
}

function PinLoginScreen({ onSuccess }) {
  const [pin,   setPin]   = useState('');
  const [shake, setShake] = useState(false);
  const [tries, setTries] = useState(0);

  const attempt = useCallback((p) => {
    const stored  = db.get();
    const userPin = stored.userPin || DEFAULT_USER_PIN;
    if (p===ADMIN_PIN) { onSuccess('admin'); return; }
    if (p===userPin)   { onSuccess('user');  return; }
    setShake(true); setTries(t=>t+1);
    setTimeout(() => { setShake(false); setPin(''); }, 700);
  }, [onSuccess]);

  useEffect(() => { if (pin.length===6) attempt(pin); }, [pin, attempt]);

  return (
    <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column', alignItems:'center',
      justifyContent:'center', padding:24, background:'linear-gradient(160deg,#0A1628 0%,#0F2537 100%)' }}>
      <div style={{ width:80,height:80,borderRadius:'50%',display:'flex',alignItems:'center',
        justifyContent:'center',marginBottom:20,background:'linear-gradient(135deg,#1C3D5A,#2B5278)' }}>
        <Icons.Shield size={36} color="white"/>
      </div>
      <h1 style={{ fontSize:36,fontWeight:900,color:'#fff',margin:'0 0 4px',letterSpacing:'-1px' }}>Cal & Cash</h1>
      <p style={{ color:'#64748B',fontSize:13,marginBottom:40 }}>Super App · Finance & Health</p>
      <PinDots value={pin} shake={shake} error={shake}/>
      <p style={{ color:'#4B5563',fontSize:12,margin:'12px 0 32px' }}>
        {tries>0?`PIN ไม่ถูกต้อง (${tries}/3)`:'กรอกรหัส PIN 6 หลัก'}
      </p>
      <Keypad onTap={d=>setPin(p=>p.length<6?p+d:p)} onDel={()=>setPin(p=>p.slice(0,-1))}/>
      <p style={{ color:'#374151',fontSize:12,marginTop:32 }}>PIN เริ่มต้น: {DEFAULT_USER_PIN}</p>
    </div>
  );
}

// ============================================================
// CHANGE PIN
// ============================================================
function ChangePinScreen({ role, onDone, onBack }) {
  const [step,    setStep]    = useState('verify');
  const [verify,  setVerify]  = useState('');
  const [newPin,  setNewPin]  = useState('');
  const [confirm, setConfirm] = useState('');
  const [shake,   setShake]   = useState(false);
  const [err,     setErr]     = useState('');
  const userPin = db.get().userPin || DEFAULT_USER_PIN;

  const fail = (msg, setter) => {
    setShake(true); setErr(msg);
    setTimeout(()=>{ setShake(false); setErr(''); setter(''); },800);
  };
  const doVerify  = useCallback((p) => { if(p===(role==='admin'?ADMIN_PIN:userPin)){setStep('newpin');return;} fail('PIN ปัจจุบันไม่ถูกต้อง',setVerify); },[role,userPin]);
  const doNew     = useCallback((p) => { if(p===ADMIN_PIN&&role!=='admin'){fail('ไม่สามารถใช้ PIN นี้ได้',setNewPin);return;} setNewPin(p); setStep('confirm'); },[role]);
  const doConfirm = useCallback((p) => { if(p!==newPin){fail('PIN ไม่ตรงกัน',setConfirm);return;} db.set({userPin:newPin}); onDone(); },[newPin,onDone]);

  useEffect(()=>{ if(verify.length===6)  doVerify(verify);  },[verify,  doVerify]);
  useEffect(()=>{ if(newPin.length===6)  doNew(newPin);     },[newPin,  doNew]);
  useEffect(()=>{ if(confirm.length===6) doConfirm(confirm); },[confirm, doConfirm]);

  const labels = {verify:'ยืนยัน PIN ปัจจุบัน',newpin:'ตั้ง PIN ใหม่',confirm:'ยืนยัน PIN ใหม่อีกครั้ง'};
  const cur  = step==='verify'?verify:step==='newpin'?newPin:confirm;
  const setter = step==='verify'?setVerify:step==='newpin'?setNewPin:setConfirm;

  return (
    <div style={{ minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',
      justifyContent:'center',padding:24,background:'linear-gradient(160deg,#0A1628 0%,#0F2537 100%)' }}>
      <h2 style={{ fontSize:24,fontWeight:900,color:'#fff',marginBottom:4 }}>🔐 เปลี่ยน PIN</h2>
      <p style={{ color:'#64748B',fontSize:13,marginBottom:32 }}>{labels[step]}</p>
      <PinDots value={cur} shake={shake} error={shake}/>
      {err && <p style={{ color:'#F87171',fontSize:12,marginTop:12 }}>{err}</p>}
      <div style={{ marginTop:32 }}>
        <Keypad onTap={d=>setter(p=>p.length<6?p+d:p)} onDel={()=>setter(p=>p.slice(0,-1))}/>
      </div>
      <button onClick={onBack} style={{ color:'#64748B',fontSize:14,marginTop:32,background:'none',border:'none',cursor:'pointer' }}>← กลับ</button>
    </div>
  );
}

            style={{ flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2,
              padding:'11px 4px 10px',
              background:'none',border:'none',cursor:'pointer',
              color:tab===it.id?'#1C3D5A':'#8A9BA8',minWidth:0 }}>
            <span style={{ transform:tab===it.id?'scale(1.15)':'scale(1)',transition:'transform .15s',display:'flex' }}>
              {it.icon}
            </span>
            <span style={{ fontSize:9,fontWeight:700,whiteSpace:'nowrap' }}>{it.label}</span>
          </button>
        ))}
      </div>
    </nav>
  );
}

// ============================================================
// EMERGENCY FUND CARD (reusable)
// ============================================================
function EmergencyFundCard({ emergencyFund, setEmergencyFund }) {
  const [editing,  setEditing]  = useState(false);
  const [inputVal, setInputVal] = useState('');

  const amount = emergencyFund.amount || 0;
  const locked = emergencyFund.locked || false;

  const startEdit  = () => { if (locked) return; setInputVal(String(amount)); setEditing(true); };
  const saveEdit   = () => { const v=+inputVal; if(!isNaN(v)&&v>=0) setEmergencyFund(f=>({...f,amount:v})); setEditing(false); };
  const toggleLock = () => setEmergencyFund(f=>({...f,locked:!f.locked}));

  return (
    <Card className="p-5">
      {/* Header */}
      <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4 }}>
        <div style={{ display:'flex',alignItems:'center',gap:10 }}>
          {/* Bank SVG icon */}
          <div style={{ width:40,height:40,borderRadius:12,background:'linear-gradient(135deg,#2B5278,#1C3D5A)',
            display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0 }}>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M3 22h18M6 18V9M10 18V9M14 18V9M18 18V9M12 2L2 7h20L12 2z"/>
            </svg>
          </div>
          <div>
            <p style={{ fontSize:10,fontWeight:700,color:'#9CA3AF',textTransform:'uppercase',letterSpacing:1,margin:0 }}>Emergency Fund</p>
            <p style={{ fontSize:13,fontWeight:900,color:'#1E293B',margin:0 }}>เงินเก็บสำรอง</p>
          </div>
        </div>
        <button onClick={toggleLock}
          style={{ display:'flex',alignItems:'center',gap:5,padding:'6px 14px',borderRadius:12,border:'none',
            cursor:'pointer',fontWeight:700,fontSize:12,
            background:locked?'#FEF2F2':'#F0FDF4',color:locked?'#DC2626':'#059669' }}>
          {locked?'🔒 ล็อก':'🔓 ไม่ล็อก'}
        </button>
      </div>

      {/* Amount */}
      <div style={{ textAlign:'center',padding:'20px 0 16px' }}>
        {editing ? (
          <div style={{ display:'flex',gap:8,alignItems:'center',justifyContent:'center' }}>
            <input type="number" value={inputVal} onChange={e=>setInputVal(e.target.value)}
              onKeyDown={e=>{ if(e.key==='Enter')saveEdit(); if(e.key==='Escape')setEditing(false); }}
              autoFocus
              style={{ fontSize:30,fontWeight:900,textAlign:'center',width:190,padding:'8px 12px',
                borderRadius:16,border:'2px solid #2B5278',outline:'none',color:'#0284C7' }}/>
            <button onClick={saveEdit}
              style={{ padding:'10px 18px',borderRadius:14,background:'#2B5278',color:'#fff',
                border:'none',cursor:'pointer',fontWeight:800,fontSize:14 }}>
              บันทึก
            </button>
          </div>
        ) : (
          <div>
            <p style={{ fontSize:11,fontWeight:700,color:'#94A3B8',marginBottom:4,letterSpacing:1 }}>ยอดเงินสำรองปัจจุบัน</p>
            <p style={{ fontSize:42,fontWeight:900,color:'#1C3D5A',margin:0,letterSpacing:'-2px',lineHeight:1.1 }}>
              ฿{fmt(amount)}
            </p>
          </div>
        )}
      </div>

      {/* Actions */}
      {!locked ? (
        <button onClick={startEdit}
          style={{ width:'100%',padding:'12px 0',borderRadius:16,fontWeight:800,fontSize:14,border:'none',
            cursor:'pointer',color:'#fff',background:'linear-gradient(90deg,#2B5278,#1C3D5A)',
            display:'flex',alignItems:'center',justifyContent:'center',gap:8 }}>
          ✏️ ปรับยอดเงิน
        </button>
      ) : (
        <div style={{ padding:10,borderRadius:14,background:'#F5EBEB',textAlign:'center' }}>
          <p style={{ fontSize:12,fontWeight:700,color:'#B94040',margin:0 }}>🔒 ล็อกอยู่ — กดปลดล็อกเพื่อแก้ไข</p>
        </div>
      )}
    </Card>
  );
}

// HOME SCREEN
// ============================================================
function HomeScreen({ user, loans, txns, foods, debtPayments, setTab, emergencyFund, setEmergencyFund }) {
  const myApp      = loans.find(l=>l.userId===user.name);
  const loanAmount = myApp?.amount || 0;
  const interest   = Math.round(loanAmount * INTEREST_RATE / 100);
  const totalDebt  = loanAmount + interest;
  const paidAmount = (debtPayments[myApp?.id] || 0);
  const remaining  = Math.max(0, totalDebt - paidAmount);
  const debtPct    = totalDebt > 0 ? Math.round(paidAmount/totalDebt*100) : 0;
  const totalIn    = txns.filter(t=>t.type==='income').reduce((a,t)=>a+t.amount,0);
  const totalOut   = txns.filter(t=>t.type==='expense').reduce((a,t)=>a+t.amount,0);
  const balance    = totalIn - totalOut;
  const totalCal   = foods.reduce((a,f)=>a+f.cal,0);
  const targetCal  = user.targetCal || 2000;
  const calPct     = clamp(Math.round(totalCal/targetCal*100),0,100);

  const risk = totalIn === 0 ? 0 :
    totalOut > totalIn ? 80 :
    debtPct < 30 && totalDebt > 0 ? 55 :
    totalOut / totalIn > 0.7 ? 45 : 20;
  const riskLabel = risk >= 70 ? 'สูงมาก' : risk >= 50 ? 'สูง' : risk >= 35 ? 'ปานกลาง' : 'ต่ำ';
  const riskColor = risk >= 70 ? '#DC2626' : risk >= 50 ? '#F97316' : risk >= 35 ? '#EAB308' : '#059669';

  const lineData = txns.slice(0,12).reverse().map((t,i) => ({ name:i+1, value:t.amount, type:t.type }));
  const pieData = [{name:'รายรับ',value:totalIn},{name:'รายจ่าย',value:totalOut}].filter(d=>d.value>0);
  const PIE_COLORS = ['#10B981','#EF4444'];

  return (
    <div className="space-y-4">
      {/* Hero */}
      <div style={{ borderRadius:24,padding:24,color:'#fff',background:'linear-gradient(135deg,#0F2537,#1C3D5A,#2B5278)' }}>
        <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16 }}>
          <div>
            <p style={{ fontSize:10,fontWeight:700,opacity:.6,textTransform:'uppercase',letterSpacing:2 }}>ยินดีต้อนรับ</p>
            <p style={{ fontSize:22,fontWeight:900,marginTop:2 }}>{user.name}</p>
          </div>
          <div style={{ width:48,height:48,borderRadius:16,overflow:'hidden',background:'rgba(255,255,255,0.2)' }}>
            {user.img
              ? <img src={user.img} style={{ width:'100%',height:'100%',objectFit:'cover' }} alt="avatar"/>
              : <div style={{ width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center' }}><Icons.User size={22} color="white"/></div>}
          </div>
        </div>
        <div style={{ display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,paddingTop:16,borderTop:'1px solid rgba(255,255,255,0.2)' }}>
          <div><p style={{ fontSize:10,opacity:.6 }}>ยอดสุทธิ</p><p style={{ fontSize:18,fontWeight:900 }}>{balance>=0?'+':''}{fmtM(balance)}</p></div>
          <div><p style={{ fontSize:10,opacity:.6 }}>หนี้คงเหลือ</p><p style={{ fontSize:18,fontWeight:900,color:'#FCD34D' }}>{remaining>0?`฿${fmtM(remaining)}`:`หมด`}</p></div>
          <div><p style={{ fontSize:10,opacity:.6 }}>แคลอรี</p><p style={{ fontSize:18,fontWeight:900 }}>{fmt(totalCal)} kcal</p></div>
        </div>
      </div>

      {/* Quick cards */}
      <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:12 }}>
        {/* เงินคงเหลือ */}
        <Card className="p-4" style={{ cursor:'pointer',overflow:'hidden',position:'relative' }} onClick={()=>setTab('money')}>
          <div style={{ position:'absolute',top:-8,right:-8,opacity:.08,pointerEvents:'none' }}>
            <svg width="72" height="72" viewBox="0 0 24 24" fill="#2B5278"><circle cx="12" cy="12" r="10"/><path fill="white" d="M12 6v2M12 16v2M8.5 9.5a3.5 3.5 0 0 1 7 0c0 1.5-1 2.5-2.5 3s-2.5 1.5-2.5 3a3.5 3.5 0 0 0 7 0"/></svg>
          </div>
          <div style={{ display:'flex',alignItems:'center',gap:6,marginBottom:8 }}>
            <div style={{ width:28,height:28,borderRadius:8,background:'#E8F2EE',display:'flex',alignItems:'center',justifyContent:'center' }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#2B5278" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 12V7H5a2 2 0 0 1 0-4h14v4M3 5v14a2 2 0 0 0 2 2h16v-5M18 12a2 2 0 0 0 0 4h4v-4z"/>
              </svg>
            </div>
            <p style={{ fontSize:10,fontWeight:700,color:'#9CA3AF',textTransform:'uppercase',margin:0 }}>เงินคงเหลือ</p>
          </div>
          <p style={{ fontSize:22,fontWeight:900,color:balance>=0?'#059669':'#DC2626',margin:0 }}>{balance>=0?'+':''}{fmtM(balance)}</p>
          <p style={{ fontSize:10,color:'#94A3B8',marginTop:3 }}>฿</p>
        </Card>
        {/* หนี้คงเหลือ */}
        <Card className="p-4" style={{ cursor:'pointer',overflow:'hidden',position:'relative' }} onClick={()=>setTab('debt')}>
          <div style={{ position:'absolute',top:-8,right:-8,opacity:.07,pointerEvents:'none' }}>
            <svg width="72" height="72" viewBox="0 0 24 24" fill="#F97316"><circle cx="12" cy="12" r="10"/></svg>
          </div>
          <div style={{ display:'flex',alignItems:'center',gap:6,marginBottom:8 }}>
            <div style={{ width:28,height:28,borderRadius:8,background:'#F5EDDF',display:'flex',alignItems:'center',justifyContent:'center' }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#C4622D" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/>
              </svg>
            </div>
            <p style={{ fontSize:10,fontWeight:700,color:'#9CA3AF',textTransform:'uppercase',margin:0 }}>หนี้คงเหลือ</p>
          </div>
          <p style={{ fontSize:22,fontWeight:900,color:'#F97316',margin:0 }}>{remaining>0?`฿${fmtM(remaining)}`:`ไม่มีหนี้ 🎉`}</p>
          <p style={{ fontSize:10,color:'#94A3B8',marginTop:3 }}>฿</p>
        </Card>
      </div>

      {/* Risk Meter */}
      <Card className="p-4" style={{ overflow:'hidden',position:'relative' }}>
        <div style={{ position:'absolute',right:-10,top:'50%',transform:'translateY(-50%)',opacity:.05,pointerEvents:'none' }}>
          <svg width="90" height="90" viewBox="0 0 24 24" fill={riskColor}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
        <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10 }}>

      </Card>

      {/* Charts */}
      <Card className="p-4">
        <div style={{ display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:16 }}>
          {[['💰','รายรับ',`+${fmtM(totalIn)}`,'#F0FDF4','#059669'],
            ['💸','รายจ่าย',`-${fmtM(totalOut)}`,'#FFF5F5','#DC2626'],
            ['⚡','ความเสี่ยง',`${risk}/100`,riskColor+'18',riskColor]].map(([ic,l,v,bg,c])=>(

            </div>

        </div>
        {lineData.length > 1 && (
          <div style={{ marginBottom:16 }}>
            <p style={{ fontSize:11,fontWeight:700,color:'#9CA3AF',textTransform:'uppercase',letterSpacing:1,marginBottom:8 }}>รายการล่าสุด</p>
            <ResponsiveContainer width="100%" height={140}>
              <LineChart data={lineData}>
                <XAxis dataKey="name" tick={{fontSize:10}}/>
                <YAxis tick={{fontSize:10}} width={40}/>
                <Tooltip formatter={(v,n,p)=>[`฿${fmt(v)}`,p.payload.type==='income'?'รายรับ':'รายจ่าย']} contentStyle={{borderRadius:12,fontSize:12}}/>

              <PieChart>
                <Pie data={pieData} dataKey="value" cx="50%" cy="50%" innerRadius={45} outerRadius={70} paddingAngle={3}>
                  {pieData.map((_,i)=><Cell key={i} fill={PIE_COLORS[i%PIE_COLORS.length]}/>)}

                <Tooltip formatter={(v)=>`฿${fmt(v)}`} contentStyle={{borderRadius:12,fontSize:12}}/>

              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#059669" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">

              </svg>

            <span style={{ fontSize:13,fontWeight:900,color:'#374151',flex:1 }}>ความคืบหน้าชำระหนี้</span>
            <span style={{ fontSize:14,fontWeight:900,color:'#10B981' }}>{debtPct}%</span>
          </div>
          <Progress pct={debtPct} color="#2B5278"/>
          <div style={{ display:'flex',justifyContent:'space-between',marginTop:8 }}>
            <span style={{ fontSize:11,color:'#94A3B8' }}>✅ ชำระแล้ว ฿{fmt(paidAmount)}</span>

          </div>
        </Card>

          </div>
          <span style={{ fontSize:22 }}>🤖</span>
        </div>
        <div style={{ display:'flex',flexDirection:'column',gap:8 }}>
          {risk>=70&&<div style={{ display:'flex',alignItems:'flex-start',gap:8,padding:12,borderRadius:12,background:'#F5EBEB' }}><span>⚠️</span><p style={{ fontSize:12,fontWeight:600,color:'#B91C1C',margin:0 }}>คุณมีความเสี่ยงใช้เงินเกินปกติ ควรทบทวนรายจ่าย</p></div>}

          {myApp&&debtPct<30&&<div style={{ display:'flex',alignItems:'flex-start',gap:8,padding:12,borderRadius:12,background:'#F5EDDF' }}><span>🧾</span><p style={{ fontSize:12,fontWeight:600,color:'#B45309',margin:0 }}>หนี้ยังชำระได้น้อย ({debtPct}%) — ควรเร่งจัดการก่อนดอกเบี้ยพอกพูน</p></div>}
          {totalCal>targetCal&&<div style={{ display:'flex',alignItems:'flex-start',gap:8,padding:12,borderRadius:12,background:'#F5EBEB' }}><span>🍽️</span><p style={{ fontSize:12,fontWeight:600,color:'#B91C1C',margin:0 }}>แคลอรีวันนี้เกินเป้าหมาย {fmt(totalCal-targetCal)} kcal</p></div>}
          {calPct>=80&&calPct<100&&<div style={{ display:'flex',alignItems:'flex-start',gap:8,padding:12,borderRadius:12,background:'#F5EDDF' }}><span>🔔</span><p style={{ fontSize:12,fontWeight:600,color:'#B45309',margin:0 }}>ใกล้ถึงเป้าแคลอรีแล้ว — ระวังของว่างช่วงเย็น</p></div>}
          {risk<=30&&totalCal<=targetCal&&(!myApp||debtPct>=30)&&<div style={{ display:'flex',alignItems:'flex-start',gap:8,padding:12,borderRadius:12,background:'#EBF2EE' }}><span>🟢</span><p style={{ fontSize:12,fontWeight:600,color:'#065F46',margin:0 }}>พฤติกรรมวันนี้อยู่ในเกณฑ์ดี ทั้งการเงินและสุขภาพ ✓</p></div>}
          {txns.length===0&&foods.length===0&&<p style={{ fontSize:12,color:'#94A3B8',textAlign:'center',padding:8 }}>เริ่มบันทึกข้อมูลเพื่อรับ Insight จาก AI</p>}
        </div>
      </Card>

      {/* Emergency Fund */}
      <EmergencyFundCard emergencyFund={emergencyFund} setEmergencyFund={setEmergencyFund}/>
    </div>
  );
}

// ============================================================
// DEBT SCREEN
// ============================================================
function DebtScreen({ user, loans, setLoans, debtPayments, setDebtPayments, toast }) {
  const myApp = loans.find(l=>l.userId===user.name);
  const [debts,         setDebts]         = useState(()=>{ try{return JSON.parse(localStorage.getItem('calcash_localDebts')||'[]');}catch{return[];} });
  const [debtName,      setDebtName]      = useState('');
  const [debtAmount,    setDebtAmount]    = useState('');
  const [paymentInputs, setPaymentInputs] = useState({});
  const saveDebts = (d) => { setDebts(d); try{localStorage.setItem('calcash_localDebts',JSON.stringify(d));}catch{} };
  const addDebt = () => {
    if(!debtName.trim()||!debtAmount||+debtAmount<=0){toast('กรอกชื่อและจำนวนหนี้ด้วย','#DC2626');return;}
    const nd={id:Date.now(),name:debtName.trim(),total:+debtAmount,paid:0};
    saveDebts([...debts,nd]); setDebtName(''); setDebtAmount(''); toast(`เพิ่มหนี้ "${nd.name}" แล้ว ✓`);
  };
  const payDebt = (id) => {
    const amt=+(paymentInputs[id]||0);
    if(!amt||amt<=0){toast('กรอกยอดชำระด้วย','#DC2626');return;}
    saveDebts(debts.map(d=>d.id===id?{...d,paid:Math.min(d.paid+amt,d.total)}:d));
    setPaymentInputs(p=>({...p,[id]:''})); toast(`ชำระ ฿${fmt(amt)} สำเร็จ ✓`);
  };
  const removeDebt=(id)=>saveDebts(debts.filter(d=>d.id!==id));
  const debtTotal   = debts.reduce((a,d)=>a+d.total,0);
  const debtPaidSum = debts.reduce((a,d)=>a+d.paid, 0);
  const overallPct  = debtTotal>0?Math.round(debtPaidSum/debtTotal*100):0;

  const [showForm,      setShowForm]      = useState(false);
  const [showLoanModal, setShowLoanModal] = useState(false);
  const [loanUnlocked,  setLoanUnlocked]  = useState(()=>{ try{ return JSON.parse(localStorage.getItem('calcash_loanUnlocked')||'false'); }catch{ return false; } });
  const [loanName,   setLoanName]   = useState('');
  const [loanPmtInputs, setLoanPmtInputs] = useState({});
  const [form, setForm] = useState({amount:'',bank:'KBANK',purpose:'',occupation:'',income:'',phone:'',idcard:''});
  const sf=(k)=>(e)=>setForm(f=>({...f,[k]:e.target.value}));

  const loanAmount = myApp?.amount||0;
  const interest   = Math.round(loanAmount*INTEREST_RATE/100);
  const totalLoan  = loanAmount+interest;
  const loanPaid   = debtPayments[myApp?.id]||0;
  const loanRem    = Math.max(0,totalLoan-loanPaid);
  const loanPct    = totalLoan>0?Math.round(loanPaid/totalLoan*100):0;

  const copy=()=>{ navigator.clipboard.writeText(PROMPTPAY_NUMBER).catch(()=>{}); toast('คัดลอกเลขพร้อมเพย์แล้ว ✓'); };

  const submitLoan=(e)=>{
    e.preventDefault();
    const bank=THAI_BANKS.find(b=>b.id===form.bank)||THAI_BANKS[0];
    const app={id:Date.now(),userId:user.name,userName:user.name,userImg:user.img||null,
      debtName:loanName.trim()||null,amount:+form.amount,bankId:form.bank,bankName:bank.name,
      purpose:form.purpose,occupation:form.occupation,income:+form.income,
      phone:form.phone,idcard:form.idcard,
      interest:Math.round(+form.amount*INTEREST_RATE/100),
      total:+form.amount+Math.round(+form.amount*INTEREST_RATE/100),
      status:'pending',submittedAt:todayTH()};
    const up=[...loans,app]; setLoans(up); db.set({loans:up}); setShowForm(false); toast('ส่งใบสมัครสินเชื่อแล้ว ✓');
  };

  const sc=(s)=>s==='approved'?'#059669':s==='rejected'?'#DC2626':'#D97706';
  const sb=(s)=>s==='approved'?'#ECFDF5':s==='rejected'?'#FEF2F2':'#FFFBEB';
  const si=(s)=>s==='approved'?<Icons.CheckCircle size={44} color="#059669"/>:s==='rejected'?<Icons.XCircle size={44} color="#DC2626"/>:<Icons.Clock size={44} color="#D97706"/>;
  const sl=(s)=>s==='approved'?'🎉 อนุมัติแล้ว!':s==='rejected'?'ไม่ผ่านการอนุมัติ':'รอการพิจารณา 1–3 วัน';

  // persist loanUnlocked
  useEffect(()=>{ try{ localStorage.setItem('calcash_loanUnlocked', JSON.stringify(loanUnlocked)); }catch{} }, [loanUnlocked]);

  return (
    <div className="space-y-5">
      {/* Loan password modal */}
      {showLoanModal&&(
        <DebtPasswordModal
          onSuccess={()=>{ setLoanUnlocked(true); setShowLoanModal(false); setShowForm(true); }}
          onClose={()=>setShowLoanModal(false)}/>
      )}
      <h2 style={{ fontSize:22,fontWeight:900,color:"#0F172A",margin:0,background:"none",letterSpacing:"-0.3px" }}>🧾 ระบบหนี้</h2>

      {debts.length>0&&(
        <Card className="p-5">
          <div style={{ display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8 }}>
            <span style={{ fontSize:13,fontWeight:900,color:'#374151' }}>ภาพรวมหนี้ทั้งหมด</span>
            <span style={{ fontSize:13,fontWeight:900,color:overallPct>=100?'#059669':'#F97316' }}>{overallPct}%</span>
          </div>
          <Progress pct={overallPct} color={overallPct>=100?'#10B981':'#F97316'} height={10}/>
          <div style={{ display:'flex',justifyContent:'space-between',marginTop:8 }}>
            <span style={{ fontSize:11,color:'#94A3B8' }}>ชำระแล้ว ฿{fmt(debtPaidSum)}</span>
            <span style={{ fontSize:11,color:'#94A3B8' }}>รวม ฿{fmt(debtTotal)}</span>
          </div>
        </Card>
      )}

      <Card className="p-5">
        <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12 }}>
          <h3 style={{ fontWeight:900,color:'#1E293B',margin:0 }}>➕ เพิ่มรายการหนี้</h3>
          <span style={{ fontSize:11,color:'#94A3B8' }}>Debt Manager</span>
        </div>
        <div style={{ display:'flex',flexDirection:'column',gap:10 }}>
          <input value={debtName} onChange={e=>setDebtName(e.target.value)} placeholder="ชื่อหนี้ เช่น บัตรเครดิต KTC" className={INP}/>
          <input type="number" value={debtAmount} onChange={e=>setDebtAmount(e.target.value)} placeholder="จำนวนหนี้ (บาท)" className={INP}/>
          <button onClick={addDebt} style={{ width:'100%',padding:'12px 0',borderRadius:16,fontWeight:900,color:'#fff',border:'none',cursor:'pointer',background:'linear-gradient(90deg,#4A7FA5,#2B5278)' }}>➕ เพิ่มหนี้</button>
        </div>
      </Card>

      {debts.length===0
        ?<Card className="p-8" style={{ textAlign:'center' }}>
          {/* Fuji + cloud SVG */}
          <svg width="140" height="110" viewBox="0 0 140 110" fill="none" xmlns="http://www.w3.org/2000/svg" style={{ margin:'0 auto 12px', display:'block' }}>
            {/* Sky bg */}
            <rect width="140" height="110" rx="16" fill="#EBF2F8"/>
            {/* Far clouds */}
            <ellipse cx="22" cy="30" rx="16" ry="8" fill="white" opacity="0.9"/>
            <ellipse cx="34" cy="26" rx="12" ry="7" fill="white" opacity="0.9"/>
            <ellipse cx="110" cy="24" rx="18" ry="8" fill="white" opacity="0.85"/>
            <ellipse cx="124" cy="20" rx="12" ry="7" fill="white" opacity="0.85"/>
            <ellipse cx="98" cy="28" rx="10" ry="6" fill="white" opacity="0.8"/>
            {/* Sun */}
            <circle cx="70" cy="20" r="10" fill="#F5DFA0" opacity="0.9"/>
            <circle cx="70" cy="20" r="7"  fill="#F0C040" opacity="0.95"/>
            {/* Mt Fuji body */}
            <path d="M70 15 L22 90 L118 90 Z" fill="#2B5278"/>
            {/* Snow cap */}
            <path d="M70 15 L58 42 Q64 38 70 40 Q76 38 82 42 Z" fill="white" opacity="0.95"/>
            {/* Snow shading */}
            <path d="M70 15 L62 38 Q66 36 70 37 Z" fill="#D8EAF5" opacity="0.7"/>
            {/* Fuji mid-tone */}
            <path d="M70 40 L32 90 L108 90 Z" fill="#1C3D5A"/>
            {/* Tree line */}
            <path d="M38 90 Q55 76 70 73 Q85 76 102 90 Z" fill="#2B6B45" opacity="0.7"/>
            {/* Lake reflection */}
            <ellipse cx="70" cy="100" rx="45" ry="8" fill="#A3C4D8" opacity="0.55"/>
            <path d="M35 100 Q52 97 70 98 Q88 97 105 100" stroke="white" strokeWidth="1" opacity="0.6" fill="none"/>
            {/* Front cloud */}
            <ellipse cx="28" cy="72" rx="20" ry="10" fill="white" opacity="0.88"/>
            <ellipse cx="44" cy="68" rx="16" ry="9" fill="white" opacity="0.88"/>
            <ellipse cx="108" cy="70" rx="18" ry="10" fill="white" opacity="0.82"/>
            <ellipse cx="120" cy="66" rx="14" ry="8" fill="white" opacity="0.82"/>
          </svg>
          <p style={{ fontSize:13,fontWeight:700,color:'#6B7E8D',margin:0 }}>ยังไม่มีรายการหนี้สิน</p>
          <p style={{ fontSize:11,color:'#A3B4BE',marginTop:4 }}>静かな山のように — สงบนิ่ง ไร้หนี้สิน</p>
        </Card>
        :debts.map(d=>{
          const pct=d.total>0?(d.paid/d.total)*100:0;
          return (
            <Card key={d.id} className="p-5">
              <div style={{ display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:8,marginBottom:12 }}>
                <div>
                  <h3 style={{ fontSize:15,fontWeight:900,color:'#1E293B',margin:0 }}>{d.name}</h3>
                  <p style={{ fontSize:11,color:'#94A3B8',marginTop:2 }}>ชำระแล้ว ฿{fmt(d.paid)} / ฿{fmt(d.total)}</p>
                </div>
                <div style={{ display:'flex',alignItems:'center',gap:8,flexShrink:0 }}>
                  <span style={{ fontSize:18,fontWeight:900,color:pct>=100?'#059669':'#F97316' }}>{pct.toFixed(1)}%</span>
                  <button onClick={()=>removeDebt(d.id)} style={{ background:'none',border:'none',cursor:'pointer',color:'#D1D5DB' }}><Icons.Trash2 size={15}/></button>
                </div>
              </div>
              <Progress pct={pct} color={pct>=100?'#10B981':'#F97316'} height={10}/>
              {pct<100&&(
                <div style={{ display:'flex',gap:8,marginTop:12 }}>
                  <input type="number" placeholder="ยอดชำระ" value={paymentInputs[d.id]||''} onChange={e=>setPaymentInputs(p=>({...p,[d.id]:e.target.value}))} className={INP} onKeyDown={e=>e.key==='Enter'&&payDebt(d.id)}/>
                  <button onClick={()=>payDebt(d.id)} style={{ padding:'10px 20px',borderRadius:16,fontWeight:900,color:'#fff',border:'none',cursor:'pointer',background:'#1C3D5A',flexShrink:0 }}>💸 ชำระ</button>
                </div>
              )}
              {pct>=100&&<div style={{ marginTop:12,padding:8,borderRadius:12,textAlign:'center',background:'#E8F2EE' }}><span style={{ fontSize:12,fontWeight:900,color:'#1C3D5A' }}>🎉 ชำระครบแล้ว!</span></div>}
            </Card>
          );
        })}

      <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:8 }}>
        <h3 style={{ fontSize:15,fontWeight:900,color:"#475569",margin:0,background:"transparent",letterSpacing:"-0.2px" }}>📋 ขอสินเชื่อจากระบบ</h3>
        {!myApp&&(
          <button
            onClick={()=>{
              if (showForm) { setShowForm(false); return; }
              if (loanUnlocked) { setShowForm(true); return; }
              setShowLoanModal(true);
            }}
            style={{ fontSize:12,fontWeight:700,padding:'6px 14px',borderRadius:12,color:'#fff',
              border:'none',cursor:'pointer',
              background:showForm?'#DC2626':'#059669',
              display:'flex',alignItems:'center',gap:5 }}>
            {showForm ? 'ยกเลิก' : <><span>{loanUnlocked?'🔓':'🔒'}</span><span>+ สมัครสินเชื่อ</span></>}
          </button>
        )}
      </div>

      {myApp&&(
        <div style={{ borderRadius:24,padding:20,textAlign:'center',background:sb(myApp.status) }}>
          <div style={{ display:'flex',justifyContent:'center',marginBottom:8 }}>{si(myApp.status)}</div>
          <p style={{ fontWeight:900,fontSize:15,color:sc(myApp.status),margin:0 }}>{sl(myApp.status)}</p>
          <p style={{ fontSize:13,color:'#6B7280',marginTop:4 }}>
            {myApp.debtName&&<span style={{ fontWeight:700,color:'#374151' }}>"{myApp.debtName}" · </span>}
            วงเงิน ฿{fmt(myApp.amount)} · {myApp.bankName}
          </p>
          {myApp.status==='rejected'&&myApp.adminNote&&<p style={{ fontSize:12,color:'#B94040',marginTop:8,fontWeight:700 }}>เหตุผล: {myApp.adminNote}</p>}
        </div>
      )}

      {myApp?.status==='approved'&&(
        <Card className="p-5">
          <h3 style={{ fontWeight:900,color:'#1E293B',marginBottom:16 }}>📊 สรุปสินเชื่อ</h3>
          {[['เงินต้น',`฿${fmt(myApp.amount)}`,'#374151'],
            [`ดอกเบี้ย ${INTEREST_RATE}%`,`฿${fmt(interest)}`,'#F97316'],
            ['ยอดรวม',`฿${fmt(totalLoan)}`,'#0F172A'],
            ['ชำระแล้ว',`฿${fmt(loanPaid)}`,'#059669'],
            ['คงเหลือ',`฿${fmt(loanRem)}`,loanRem<=0?'#059669':'#F97316']].map(([l,v,c])=>(
            <div key={l} style={{ display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid #F8FAFC' }}>
              <span style={{ fontSize:13,color:'#6B7280' }}>{l}</span>
              <span style={{ fontSize:13,fontWeight:700,color:c }}>{v}</span>
            </div>
          ))}
          <div style={{ marginTop:16 }}><Progress pct={loanPct} color={loanPct>=100?'#10B981':'#F97316'} height={12}/></div>
          {loanRem>0&&(
            <div style={{ display:'flex',gap:8,marginTop:16 }}>
              <input type="number" value={loanPmtInputs[myApp.id]||''} onChange={e=>setLoanPmtInputs(p=>({...p,[myApp.id]:e.target.value}))} placeholder="กรอกยอดชำระ (บาท)" className={INP}/>
              <button onClick={()=>{
                const amt=+(loanPmtInputs[myApp.id]||0);
                if(!amt||amt<=0){toast('กรุณากรอกยอด','#DC2626');return;}
                if(amt>loanRem){toast('ยอดเกินหนี้คงเหลือ','#DC2626');return;}
                const updated={...debtPayments,[myApp.id]:loanPaid+amt};
                setDebtPayments(updated); db.set({debtPayments:updated});
                setLoanPmtInputs(p=>({...p,[myApp.id]:''}));
                toast(`ชำระ ฿${fmt(amt)} สำเร็จ ✓`);
              }} style={{ padding:'10px 20px',borderRadius:16,fontWeight:900,color:'#fff',border:'none',cursor:'pointer',background:'#1C3D5A',flexShrink:0 }}>ชำระ</button>
            </div>
          )}
          {loanRem<=0&&<div style={{ textAlign:'center',padding:12,borderRadius:16,background:'#E8F2EE',marginTop:12 }}><p style={{ fontWeight:900,color:'#1C3D5A',margin:0 }}>🎉 ชำระหนี้ครบแล้ว!</p></div>}
        </Card>
      )}

      {myApp?.status==='approved'&&(
        <Card className="p-5">
          <p style={{ fontSize:13,color:'#94A3B8',marginBottom:12 }}>ข้อมูลชำระเงิน</p>
          <div style={{ borderRadius:24,padding:24,color:'#fff',background:'linear-gradient(135deg,#0F2537,#1C3D5A)' }}>
            <p style={{ fontSize:13,opacity:.8,margin:'0 0 4px' }}>พร้อมเพย์</p>
            <h1 style={{ fontSize:30,fontWeight:900,letterSpacing:4,margin:'8px 0 24px' }}>{PROMPTPAY_NUMBER}</h1>
            <div style={{ borderTop:'1px solid rgba(255,255,255,0.2)',paddingTop:16,display:'flex',justifyContent:'space-between',alignItems:'flex-end' }}>
              <div><p style={{ fontSize:13,opacity:.7,margin:0 }}>ชื่อบัญชี</p><p style={{ fontSize:18,fontWeight:700,margin:'4px 0 0' }}>{ACCOUNT_NAME}</p></div>
              <button onClick={copy} style={{ padding:10,borderRadius:16,background:'rgba(255,255,255,0.15)',border:'none',cursor:'pointer',color:'#fff' }}><Icons.Copy size={18} color="#fff"/></button>
            </div>
          </div>
          {loanRem>0&&<div style={{ padding:16,borderRadius:16,marginTop:16,background:'#F5EDDF',border:'1px solid #FED7AA' }}>
            <p style={{ fontSize:13,fontWeight:700,color:'#C2410C',margin:'0 0 4px' }}>ยอดคงเหลือ</p>
            <p style={{ fontSize:28,fontWeight:900,color:'#9A3412',margin:0 }}>฿{fmt(loanRem)}</p>
          </div>}
          <button onClick={copy} style={{ width:'100%',padding:'14px 0',borderRadius:16,fontWeight:900,color:'#fff',border:'none',cursor:'pointer',marginTop:16,background:'linear-gradient(90deg,#1C3D5A,#0F2537)' }}>คัดลอกเลขพร้อมเพย์</button>
        </Card>
      )}

      {showForm&&!myApp&&(
        <form onSubmit={submitLoan} style={{ display:'flex',flexDirection:'column',gap:16 }}>
          <Card className="p-5">
            <h3 style={{ fontWeight:900,color:'#1E293B',marginBottom:16 }}>กรอกใบสมัครสินเชื่อ</h3>
            {[
              ['ชื่อสินเชื่อ / ฉลากหนี้',<input type="text" value={loanName} onChange={e=>setLoanName(e.target.value)} placeholder="เช่น สินเชื่อฉุกเฉิน" className={INP}/>],
            ].map(([l,inp])=>(
              <div key={l} style={{ marginBottom:12 }}>
                <label style={{ fontSize:11,fontWeight:700,color:'#64748B',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:6 }}>{l}</label>
                {inp}
              </div>
            ))}
            <div style={{ marginBottom:12 }}>
              <label style={{ fontSize:11,fontWeight:700,color:'#64748B',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:6 }}>จำนวนเงินกู้ (บาท)</label>
              <input type="number" required value={form.amount} onChange={sf('amount')} placeholder="เช่น 10000" className={INP} style={{ fontSize:22,fontWeight:900 }}/>
              {form.amount>0&&<div style={{ marginTop:8,padding:12,borderRadius:12,background:'#F5EDDF',border:'1px solid #FEF08A' }}><p style={{ fontSize:12,color:'#B45309',margin:0 }}>ดอกเบี้ย {INTEREST_RATE}% = ฿{fmt(Math.round(+form.amount*INTEREST_RATE/100))} · รวม ฿{fmt(+form.amount+Math.round(+form.amount*INTEREST_RATE/100))}</p></div>}
            </div>
            {[
              ['ธนาคารรับเงิน',<select required value={form.bank} onChange={sf('bank')} className={INP}>{THAI_BANKS.map(b=><option key={b.id} value={b.id}>{b.name}</option>)}</select>],
              ['วัตถุประสงค์',<select required value={form.purpose} onChange={sf('purpose')} className={INP}><option value="">เลือก...</option>{LOAN_PURPOSES.map(p=><option key={p} value={p}>{p}</option>)}</select>],
              ['อาชีพ',<select required value={form.occupation} onChange={sf('occupation')} className={INP}><option value="">เลือก...</option>{LOAN_OCCUPATIONS.map(o=><option key={o} value={o}>{o}</option>)}</select>],
              ['รายได้ต่อเดือน (บาท)',<input type="number" required value={form.income} onChange={sf('income')} placeholder="20000" className={INP}/>],
              ['เบอร์โทรศัพท์',<input type="tel" required maxLength={10} value={form.phone} onChange={sf('phone')} placeholder="0812345678" className={INP}/>],
              ['เลขบัตรประชาชน (13 หลัก)',<input required maxLength={13} value={form.idcard} onChange={sf('idcard')} placeholder="1234567890123" className={INP}/>],
            ].map(([l,inp])=>(
              <div key={l} style={{ marginBottom:12 }}>
                <label style={{ fontSize:11,fontWeight:700,color:'#64748B',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:6 }}>{l}</label>
                {inp}

  'มะม่วง':{kcal:45,type:'ผลไม้'},'แตงโม':{kcal:25,type:'ผลไม้'},'มังคุด':{kcal:35,type:'ผลไม้'},
};

function ruleBasedCal(input) {
  if(input.includes('ทอด')) return{kcal:500,type:'อาหารทอด'};
  if(input.includes('ย่าง')) return{kcal:350,type:'อาหารปิ้งย่าง'};
  if(input.includes('ชา'))  return{kcal:250,type:'เครื่องดื่มชา'};
  if(input.includes('น้ำ')) return{kcal:150,type:'เครื่องดื่ม'};
  if(input.includes('แกง')) return{kcal:280,type:'แกงทั่วไป'};
  if(input.includes('ข้าว')) return{kcal:450,type:'อาหารข้าว'};
  return{kcal:300,type:'ไม่พบในฐานข้อมูล (ค่าประมาณ)'};
}

function analyzeInput(raw) {
  const input=raw.toLowerCase().trim();
  const matched=[];
  const keys=Object.keys(FOOD_CALORIES).sort((a,b)=>b.length-a.length);
  const used=new Set();
  for(const key of keys){
    if(input.includes(key.toLowerCase())&&!used.has(key)){
      matched.push({name:key,...FOOD_CALORIES[key]});
      used.add(key);
    }
  }
  if(matched.length>0) return{items:matched,fallback:false};
  const rule=ruleBasedCal(input);
  return{items:[{name:raw.trim(),...rule}],fallback:true};
}

function FoodScreen({ user, foods, setFoods, toast }) {
  const [foodInput, setFoodInput] = useState('');

  const [meal,      setMeal]      = useState('🌅 เช้า');
  const [analyzing, setAnalyzing] = useState(false);
  const target   = user.targetCal||2000;
  const totalCal = foods.reduce((a,f)=>a+f.cal,0);
  const calPct   = clamp(Math.round(totalCal/target*100),0,100);
  const remaining= target-totalCal;

  const analyze=()=>{
    if(!foodInput.trim()){toast('กรุณาพิมพ์ชื่ออาหาร','#DC2626');return;}
    setAnalyzing(true);
    setTimeout(()=>{
      const{items,fallback}=analyzeInput(foodInput);
      const total=items.reduce((a,it)=>a+it.kcal,0);
      const analysis=fallback?`🤖 AI วิเคราะห์: ไม่พบในฐานข้อมูล (ค่าประมาณทั่วไป)`
        :'🤖 AI ตรวจพบอาหาร:\n'+items.map(f=>`• ${f.name} (${f.type}) ~${f.kcal} kcal`).join('\n');
      setCalResult({total,items,analysis,fallback});
      setAnalyzing(false); toast('AI วิเคราะห์เสร็จแล้ว ✓');
    },350);
  };

    if(!calResult) return;
    const name=foodInput.trim()||calResult.items.map(i=>i.name).join(', ');

    <div className="space-y-4">

function AdminPanelScreen({ loans, setLoans, toast }) {
  const [filter, setFilter] = useState('pending');
  const [notes,  setNotes]  = useState({});
  const filtered = loans.filter(l=>filter==='all'||l.status===filter);
  const counts   = {pending:loans.filter(l=>l.status==='pending').length,approved:loans.filter(l=>l.status==='approved').length,rejected:loans.filter(l=>l.status==='rejected').length};
  const decide=(id,status)=>{
    const up=loans.map(l=>l.id===id?{...l,status,adminNote:notes[id]||'',decidedAt:todayTH()}:l);
    setLoans(up); db.set({loans:up}); toast(status==='approved'?'อนุมัติสินเชื่อแล้ว ✓':'ปฏิเสธสินเชื่อแล้ว',status==='approved'?'#059669':'#DC2626');
  };
  const sc=(s)=>s==='approved'?'#059669':s==='rejected'?'#DC2626':'#D97706';
  const sb=(s)=>s==='approved'?'#ECFDF5':s==='rejected'?'#FEF2F2':'#FFFBEB';
  return (
    <div className="space-y-4">
      <div style={{ display:'flex',alignItems:'center',gap:8 }}>
        <Icons.Lock size={18} color="#1D4ED8"/>
        <h2 style={{ fontSize:20,fontWeight:900,color:'#0F172A',margin:0 }}>Admin Panel</h2>
      </div>
      <div style={{ display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8 }}>
        {[['รอ',counts.pending,'#FFFBEB','#D97706'],['อนุมัติ',counts.approved,'#ECFDF5','#059669'],['ปฏิเสธ',counts.rejected,'#FEF2F2','#DC2626']].map(([l,v,bg,c])=>(
          <div key={l} style={{ borderRadius:16,padding:12,textAlign:'center',background:bg,border:'1px solid #F1F5F9' }}>
            <p style={{ fontSize:10,fontWeight:700,color:'#9CA3AF',textTransform:'uppercase',margin:'0 0 4px' }}>{l}</p>
            <p style={{ fontSize:24,fontWeight:900,color:c,margin:0 }}>{v}</p>
          </div>
        ))}
      </div>
      <div style={{ display:'flex',gap:8,flexWrap:'wrap' }}>
        {[['all','ทั้งหมด'],['pending','รอ'],['approved','อนุมัติ'],['rejected','ปฏิเสธ']].map(([v,l])=>(
          <button key={v} onClick={()=>setFilter(v)} style={{ padding:'6px 14px',borderRadius:12,fontSize:12,fontWeight:700,cursor:'pointer',border:'none',background:filter===v?'#10B981':'#F1F5F9',color:filter===v?'#fff':'#64748B' }}>{l}</button>
        ))}
      </div>
      {filtered.length===0
        ?<Card className="p-10" style={{ textAlign:'center' }}><p style={{ fontSize:24,margin:'0 0 8px' }}>📭</p><p style={{ fontSize:13,color:'#9CA3AF' }}>ไม่มีรายการ</p></Card>
        :filtered.map(l=>(
          <Card key={l.id} className="p-5">
            <div style={{ display:'flex',alignItems:'center',gap:12,marginBottom:16,paddingBottom:16,borderBottom:'1px solid #F1F5F9' }}>
              <div style={{ width:44,height:44,borderRadius:'50%',overflow:'hidden',background:'#F1F5F9',flexShrink:0 }}>
                {l.userImg?<img src={l.userImg} style={{ width:'100%',height:'100%',objectFit:'cover' }} alt="u"/>:<div style={{ width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center' }}><Icons.User size={18} color="#94A3B8"/></div>}
              </div>
              <div style={{ flex:1,minWidth:0 }}>
                <p style={{ fontWeight:900,color:'#1E293B',margin:0 }}>{l.userName}</p>
                <p style={{ fontSize:12,color:'#94A3B8',margin:'2px 0 0' }}>{l.occupation} · รายได้ ฿{fmt(l.income)}/เดือน</p>
              </div>
              <span style={{ fontSize:11,fontWeight:900,padding:'4px 10px',borderRadius:12,flexShrink:0,background:sb(l.status),color:sc(l.status) }}>
                {l.status==='approved'?'อนุมัติ':l.status==='rejected'?'ปฏิเสธ':'รอ'}
              </span>
            </div>
            <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px 16px',marginBottom:16 }}>
              {[['วงเงิน',`฿${fmt(l.amount)}`],['ยอดรวม+ดอกเบี้ย',`฿${fmt(l.total)}`],
                ['ธนาคาร',l.bankName],['วัตถุประสงค์',l.purpose],
                ['เบอร์โทร',l.phone],['บัตรประชาชน',(l.idcard||'').replace(/(\d{1})(\d{4})(\d{5})(\d{2})(\d{1})/,'$1-$2-$3-$4-$5')],
                ['ยื่นสมัคร',l.submittedAt]].map(([k,v])=>(
                <div key={k}>
                  <p style={{ fontSize:11,color:'#9CA3AF',margin:'0 0 2px' }}>{k}</p>
                  <p style={{ fontSize:12,fontWeight:700,color:'#374151',margin:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap' }}>{v}</p>
                </div>
              ))}
            </div>
            {l.status==='pending'&&(
              <div style={{ display:'flex',flexDirection:'column',gap:8 }}>
                <input value={notes[l.id]||''} onChange={e=>setNotes(n=>({...n,[l.id]:e.target.value}))} placeholder="หมายเหตุการตัดสินใจ" className={INP}/>
                <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:8 }}>
                  <button onClick={()=>decide(l.id,'approved')} style={{ padding:'12px 0',borderRadius:16,fontSize:13,fontWeight:900,color:'#fff',border:'none',cursor:'pointer',background:'#1C3D5A' }}>✓ อนุมัติ</button>
                  <button onClick={()=>decide(l.id,'rejected')} style={{ padding:'12px 0',borderRadius:16,fontSize:13,fontWeight:900,color:'#fff',border:'none',cursor:'pointer',background:'#DC2626' }}>✕ ปฏิเสธ</button>
                </div>
              </div>
            )}
            {l.decidedAt&&<p style={{ fontSize:10,color:'#9CA3AF',textAlign:'right',margin:'8px 0 0' }}>ตัดสินใจ: {l.decidedAt}</p>}
          </Card>
        ))}
    </div>
  );
}

// DEBT PASSWORD MODAL

function DebtPasswordModal({ onSuccess, onClose }) {
  const [val,   setVal]   = useState('');
  const [err,   setErr]   = useState('');
  const [shake, setShake] = useState(false);
  const submit = () => {
    if (val === LOAN_ADMIN_PASS) { onSuccess(); return; }
    setErr('รหัสผ่านไม่ถูกต้อง เฉพาะผู้พัฒนาหรือแอดมินเท่านั้นที่สามารถเข้าถึงส่วนนี้ได้');
    setShake(true); setTimeout(()=>{ setShake(false); setVal(''); setErr(''); },900);
  };
  return (
    <div style={{ position:'fixed',inset:0,zIndex:800,display:'flex',alignItems:'center',
      justifyContent:'center',padding:24,background:'rgba(0,0,0,0.7)' }}
      onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
      <div style={{ background:'#fff',borderRadius:28,padding:32,width:'100%',maxWidth:360,
        transform:shake?'translateX(-8px)':'none',transition:'transform .15s' }}>
        {/* icon */}
        <div style={{ width:56,height:56,borderRadius:16,background:'linear-gradient(135deg,#1C3D5A,#4A7FA5)',
          display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px' }}>
          <Icons.Lock size={26} color="#fff"/>
        </div>
        <h2 style={{ fontSize:18,fontWeight:900,color:'#1E293B',textAlign:'center',margin:'0 0 4px' }}>
          🔐 ยืนยันตัวตนแอดมิน
        </h2>
        <p style={{ fontSize:13,color:'#64748B',textAlign:'center',margin:'0 0 24px' }}>
          กรอกรหัสผ่านเพื่อเข้าถึงระบบสมัครสินเชื่อ
        </p>
        <input
          type="password"
          value={val}
          onChange={e=>setVal(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&submit()}
          placeholder="รหัสผ่าน..."
          autoFocus
          style={{ width:'100%',padding:'12px 16px',borderRadius:14,border:'2px solid #E2E8F0',
            fontSize:15,outline:'none',boxSizing:'border-box',marginBottom:8,
            borderColor:err?'#EF4444':'#E2E8F0' }}
        />
        {err && <p style={{ color:'#B94040',fontSize:12,fontWeight:700,margin:'0 0 12px',textAlign:'center' }}>{err}</p>}
        <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:err?0:8 }}>
          <button onClick={onClose}
            style={{ padding:'12px 0',borderRadius:14,fontWeight:700,fontSize:14,border:'none',
              cursor:'pointer',background:'#F1F5F9',color:'#475569' }}>
            ยกเลิก
          </button>
          <button onClick={submit}
            style={{ padding:'12px 0',borderRadius:14,fontWeight:700,fontSize:14,border:'none',
              cursor:'pointer',background:'linear-gradient(90deg,#1E3A8A,#3B82F6)',color:'#fff' }}>
            เข้าสู่ระบบ
          </button>
        </div>
        <p style={{ fontSize:11,color:'#CBD5E0',textAlign:'center',marginTop:16 }}>
          เฉพาะผู้ดูแลระบบ / Developer เท่านั้น
        </p>
      </div>
    </div>
  );
}

// ANALYTICS SCREEN  (Financial + Debt + Calorie)

function AnalyticsScreen({ txns, loans, debtPayments, foods, user, workouts, setWorkouts, toast }) {
  const [activeChart, setActiveChart] = useState('finance');
  const [woDate,  setWoDate]  = useState(()=>new Date().toISOString().slice(0,10));
  const [woCal,   setWoCal]   = useState('');
  const [woLabel, setWoLabel] = useState('วิ่ง 1 ชั่วโมง');
  const WO_PRESETS = [
    {label:'วิ่ง 1 ชั่วโมง',cal:610},{label:'ว่ายน้ำ 1 ชั่วโมง',cal:500},
    {label:'ปั่นจักรยาน',cal:450},{label:'โยคะ',cal:250},{label:'ยกเวท',cal:350},
  ];

  // ── Financial data ──
  const totalIn   = txns.filter(t=>t.type==='income').reduce((a,t)=>a+t.amount,0);
  const totalOut  = txns.filter(t=>t.type==='expense').reduce((a,t)=>a+t.amount,0);
  const efAmount  = 0; // will be passed later via props if needed
  const saving    = Math.max(0, totalIn - totalOut);

  const finPie = [
    {name:'รายรับ',   value:totalIn,  color:'#10B981'},
    {name:'รายจ่าย',  value:totalOut, color:'#B94040'},
    {name:'ออม/เหลือ',value:saving,   color:'#3B82F6'},
  ].filter(d=>d.value>0);

  // Monthly txn bar (last 6 months label)
  const monthlyMap = {};
  txns.forEach(t=>{
    const d = t.date || '';
    // thai locale date — extract just a label key from id
    const key = t.id ? new Date(t.id).toLocaleDateString('th-TH',{month:'short',year:'2-digit'}) : '?';
    if (!monthlyMap[key]) monthlyMap[key] = {name:key,income:0,expense:0};
    if (t.type==='income')  monthlyMap[key].income  += t.amount;
    if (t.type==='expense') monthlyMap[key].expense += t.amount;
  });
  const monthlyData = Object.values(monthlyMap).slice(-6);

  // ── Debt data ──
  const localDebts = (() => { try { return JSON.parse(localStorage.getItem('calcash_localDebts')||'[]'); } catch { return []; } })();
  const allDebts = [
    ...localDebts.map(d=>({ name:d.name, total:d.total, paid:d.paid, pct:d.total>0?Math.round(d.paid/d.total*100):0 })),
  ];
  const myApp = loans.find(l=>l.userId===user.name);
  if (myApp) {
    const lTotal = myApp.amount + Math.round(myApp.amount*20/100);
    const lPaid  = debtPayments[myApp.id]||0;
    allDebts.unshift({ name: myApp.debtName||'สินเชื่อระบบ', total:lTotal, paid:lPaid,
      pct:lTotal>0?Math.round(lPaid/lTotal*100):0 });
  }

  // ── Calorie / Workout data ──
  const calorieChartData = workouts.slice(-14).map(w=>({
    date: new Date(w.date+'T00:00').toLocaleDateString('th-TH',{day:'numeric',month:'short'}),
    เผาผลาญ: w.cal,
  }));
  const totalBurned = workouts.reduce((a,w)=>a+w.cal,0);
  const avgBurned   = workouts.length>0?Math.round(totalBurned/workouts.length):0;

  const addWorkout = () => {
    const c = +woCal;
    if (!c||c<=0) { toast('กรอกแคลอรีที่เผาผลาญ','#DC2626'); return; }
    const entry = { id:Date.now(), date:woDate, label:woLabel, cal:c };
    const up = [...workouts, entry].sort((a,b)=>a.date.localeCompare(b.date));
    setWorkouts(up); toast(`บันทึก ${woLabel} ${fmt(c)} kcal ✓`);
    setWoCal('');

  const delWorkout = (id) => setWorkouts(workouts.filter(w=>w.id!==id));

    {id:'finance', label:'💰 การเงิน'},

              background:activeChart===t.id?'#1C3D5A':'#EDE6D8',

          ) : (
            <>
              {/* Horizontal bar per debt */}
              <Card className="p-4">
                <p style={{ fontSize:11,fontWeight:700,color:'#9CA3AF',textTransform:'uppercase',letterSpacing:1,marginBottom:12 }}>
                  ความคืบหน้าชำระหนี้แต่ละรายการ
                </p>
                <ResponsiveContainer width="100%" height={Math.max(120, allDebts.length*52)}>
                  <BarChart data={allDebts} layout="vertical" barSize={16}>
                    <XAxis type="number" domain={[0,100]} tickFormatter={v=>`${v}%`} tick={{fontSize:10}}/>
                    <YAxis type="category" dataKey="name" width={90} tick={{fontSize:10}}/>
                    <Tooltip formatter={(v)=>`${v}%`} contentStyle={{borderRadius:12,fontSize:12}}/>
                    <Bar dataKey="pct" fill="#2B5278" radius={[0,8,8,0]} name="ชำระแล้ว"/>
                  </BarChart>
                </ResponsiveContainer>
              </Card>

              {/* Debt summary cards */}
              {allDebts.map((d,i)=>(
                <Card key={i} className="p-4">
                  <div style={{ display:'flex',justifyContent:'space-between',marginBottom:8 }}>
                    <span style={{ fontSize:13,fontWeight:900,color:'#1E293B' }}>{d.name}</span>
                    <span style={{ fontSize:13,fontWeight:900,color:d.pct>=100?'#059669':'#F97316' }}>{d.pct}%</span>
                  </div>
                  <Progress pct={d.pct} color={d.pct>=100?'#10B981':'#F97316'} height={10}/>
                  <div style={{ display:'flex',justifyContent:'space-between',marginTop:6 }}>
                    <span style={{ fontSize:11,color:'#94A3B8' }}>ชำระแล้ว ฿{fmt(d.paid)}</span>
                    <span style={{ fontSize:11,color:'#94A3B8' }}>รวม ฿{fmt(d.total)}</span>
                  </div>
                </Card>
              ))}
            </>
          )}
        </div>
      )}

      {/* ── CALORIE / WORKOUT CHARTS ── */}
      {activeChart==='calorie' && (
        <div className="space-y-4">
          {/* Summary */}
          <div style={{ display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8 }}>
            {[['รวมเผาผลาญ',`${fmt(totalBurned)} kcal`,'#FFF7ED','#F97316'],
              ['เฉลี่ย/ครั้ง',`${fmt(avgBurned)} kcal`,'#FFFBEB','#D97706'],
              ['จำนวนครั้ง',`${workouts.length} ครั้ง`,'#F0FDF4','#059669']].map(([l,v,bg,c])=>(
              <div key={l} style={{ background:bg,borderRadius:16,padding:'12px 8px',textAlign:'center' }}>
                <p style={{ fontSize:9,fontWeight:700,color:'#9CA3AF',textTransform:'uppercase',margin:'0 0 4px' }}>{l}</p>
                <p style={{ fontSize:12,fontWeight:900,color:c,margin:0 }}>{v}</p>
              </div>
            ))}
          </div>

          {/* Line chart */}
          {calorieChartData.length>1 && (
            <Card className="p-4">
              <p style={{ fontSize:11,fontWeight:700,color:'#9CA3AF',textTransform:'uppercase',letterSpacing:1,marginBottom:12 }}>
                แคลอรีที่เผาผลาญ (14 วันล่าสุด)
              </p>
              <ResponsiveContainer width="100%" height={180}>
                <LineChart data={calorieChartData}>
                  <XAxis dataKey="date" tick={{fontSize:9}}/>
                  <YAxis tick={{fontSize:10}} width={40}/>
                  <Tooltip formatter={(v)=>[`${fmt(v)} kcal`,'เผาผลาญ']} contentStyle={{borderRadius:12,fontSize:12}}/>
                  <Line type="monotone" dataKey="เผาผลาญ" stroke="#C4622D" strokeWidth={2.5}
                    dot={{r:4,fill:'#F97316'}} activeDot={{r:6}}/>
                </LineChart>
              </ResponsiveContainer>
            </Card>
          )}

          {/* Add workout */}
          <Card className="p-5">
            <h3 style={{ fontWeight:900,color:'#1E293B',marginBottom:12,fontSize:14 }}>➕ บันทึกการออกกำลังกาย</h3>
            {/* Preset chips */}
            <div style={{ display:'flex',flexWrap:'wrap',gap:6,marginBottom:12 }}>
              {WO_PRESETS.map(p=>(
                <button key={p.label} onClick={()=>{ setWoLabel(p.label); setWoCal(String(p.cal)); }}
                  style={{ fontSize:11,fontWeight:600,padding:'4px 12px',borderRadius:12,border:'none',cursor:'pointer',
                    background:woLabel===p.label?'#F97316':'#F1F5F9',
                    color:woLabel===p.label?'#fff':'#475569' }}>
                  {p.label} ~{p.cal}
                </button>
              ))}
            </div>
            <div style={{ display:'flex',flexDirection:'column',gap:8 }}>
              <input type="date" value={woDate} onChange={e=>setWoDate(e.target.value)}
                style={{ width:'100%',border:'1px solid #E2E8F0',background:'#F8FAFC',borderRadius:14,
                  padding:'10px 14px',fontSize:14,outline:'none',boxSizing:'border-box' }}/>
              <input value={woLabel} onChange={e=>setWoLabel(e.target.value)}
                placeholder="ประเภทออกกำลังกาย" 
                style={{ width:'100%',border:'1px solid #E2E8F0',background:'#F8FAFC',borderRadius:14,
                  padding:'10px 14px',fontSize:14,outline:'none',boxSizing:'border-box',color:'#374151' }}/>
              <input type="number" value={woCal} onChange={e=>setWoCal(e.target.value)}
                placeholder="แคลอรีที่เผาผลาญ (kcal)"
                style={{ width:'100%',border:'1px solid #E2E8F0',background:'#F8FAFC',borderRadius:14,
                  padding:'10px 14px',fontSize:14,outline:'none',boxSizing:'border-box',color:'#374151' }}
                onKeyDown={e=>e.key==='Enter'&&addWorkout()}/>
              <button onClick={addWorkout}
                style={{ width:'100%',padding:'12px 0',borderRadius:14,fontWeight:900,fontSize:14,border:'none',
                  cursor:'pointer',color:'#fff',background:'linear-gradient(90deg,#4A7FA5,#2B5278)' }}>
                🔥 บันทึก
              </button>
            </div>
          </Card>

          {/* Workout history */}
          {workouts.length===0 ? (
            <Card className="p-10" style={{ textAlign:'center' }}>
              <p style={{ fontSize:28,margin:'0 0 8px' }}>🏃</p>
              <p style={{ fontSize:13,color:'#9CA3AF' }}>ยังไม่มีข้อมูลการออกกำลังกาย</p>
            </Card>
          ) : [...workouts].reverse().map(w=>(
            <Card key={w.id} className="p-4">
              <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between' }}>
                <div>
                  <p style={{ fontSize:13,fontWeight:700,color:'#1E293B',margin:0 }}>{w.label}</p>
                  <p style={{ fontSize:11,color:'#94A3B8',margin:'2px 0 0' }}>{w.date}</p>
                </div>
                <div style={{ display:'flex',alignItems:'center',gap:12 }}>
                  <p style={{ fontSize:14,fontWeight:900,color:'#F97316',margin:0 }}>🔥 {fmt(w.cal)} kcal</p>
                  <button onClick={()=>delWorkout(w.id)}
                    style={{ background:'none',border:'none',cursor:'pointer',color:'#D1D5DB' }}>
                    <Icons.Trash2 size={14}/>
                  </button>
                </div>
              </div>
            </Card>
          ))}
        </div>
      )}
    </div>
  );
}

// ============================================================
// ROOT APP
// ============================================================
function CalCashSuperApp() {
  // lazy initialisers — read from localStorage exactly once on mount
  const [user,          setUser]          = useState(()=>db.get().user||null);
  const [authenticated, setAuthenticated] = useState(false);
  const [role,          setRole]          = useState('user');
  const [showChangePin, setShowChangePin] = useState(false);
  const [showAdminLogin,setShowAdminLogin]= useState(false);
  const [loans,         setLoans]         = useState(()=>db.get().loans||[]);
  const [txns,          setTxns]          = useState(()=>db.get().txns||[]);
  const [foods,         setFoods]         = useState(()=>db.get().foods||[]);
  const [debtPayments,  setDebtPayments]  = useState(()=>db.get().debtPayments||{});
  const [tab,           setTab]           = useState('home');
  const [emergencyFund, setEmergencyFund] = useState(()=>db.get().emergencyFund||{amount:0,locked:false,target:50000});
  const [workouts,      setWorkouts]      = useState(()=>db.get().workouts||[]);
  const [darkMode,      setDarkMode]      = useState(()=>{
    try{ return JSON.parse(localStorage.getItem('calcash_darkMode')||'false'); }catch{ return false; }
  });
  const [showToast, toastComp]            = useToast();
  const isAdmin = role==='admin';

  // persist every key piece of state automatically whenever it changes
  useEffect(()=>{ if(user)  db.set({user}); },           [user]);
  useEffect(()=>{ db.set({loans}); },                    [loans]);
  useEffect(()=>{ db.set({txns}); },                     [txns]);
  useEffect(()=>{ db.set({foods}); },                    [foods]);
  useEffect(()=>{ db.set({debtPayments}); },             [debtPayments]);
  useEffect(()=>{ try{ localStorage.setItem('calcash_darkMode', JSON.stringify(darkMode)); }catch{} }, [darkMode]);
  useEffect(()=>{ db.set({emergencyFund}); }, [emergencyFund]);
  useEffect(()=>{ db.set({workouts}); }, [workouts]);

  const totalIn  = txns.filter(t=>t.type==='income').reduce((a,t)=>a+t.amount,0);
  const totalOut = txns.filter(t=>t.type==='expense').reduce((a,t)=>a+t.amount,0);
  const totalCal = foods.reduce((a,f)=>a+f.cal,0);
  const balance  = totalIn-totalOut;
  const creditScore = Math.min(100,Math.max(0,
    80+(balance>5000?10:0)-(totalOut>totalIn?25:0)-(balance<0?20:0)-(totalCal>3000?5:0)
  ));
  const creditLabel = creditScore>=80?'ดีเยี่ยม':creditScore>=60?'ดี':creditScore>=40?'พอใช้':'ต้องปรับปรุง';
  const creditColor = creditScore>=80?'#2B5278':creditScore>=60?'#4A7FA5':creditScore>=40?'#C4622D':'#B94040';

  const themeBg    = darkMode?'#0D1117':'#F4EFE6';
  const themeCard  = darkMode?'#161B22':'#FFFDF8';
  const themeBorder= darkMode?'#21262D':'#E8DFD0';
  const themeText  = darkMode?'#E6EDF3':'#1C2C3A';
  const themeSubText=darkMode?'#8B949E':'#6B7E8D';

  if(!user) return <FirstSetup onDone={(u)=>{ db.set({user:u}); setUser(u); setAuthenticated(true); }}/>;
  if(showChangePin) return <ChangePinScreen role={role} onDone={()=>{ setShowChangePin(false); showToast('เปลี่ยน PIN สำเร็จ ✓'); }} onBack={()=>setShowChangePin(false)}/>;
  if(!authenticated) return <PinLoginScreen onSuccess={(r)=>{ setRole(r); setAuthenticated(true); }}/>;

  return (
    <div style={{ minHeight:'100vh',paddingBottom:'calc(96px + env(safe-area-inset-bottom,0px))',background:themeBg,transition:'background .3s',color:themeText }}>
      {toastComp}
      {showAdminLogin&&<AdminOverlay onBack={()=>setShowAdminLogin(false)} onSuccess={()=>{ setRole('admin'); setShowAdminLogin(false); setTab('admin'); }}/>}

      {/* Header */}
      <header style={{ position:'sticky',top:0,zIndex:40,borderBottom:`1px solid ${themeBorder}`,
        padding:'12px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',
        background:themeCard,boxShadow:'0 1px 4px rgba(0,0,0,0.04)',transition:'background .3s' }}>
        <div style={{ display:'flex',alignItems:'center',gap:10 }}>
          <div style={{ width:36,height:36,borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(135deg,#1C3D5A,#2B5278)' }}>
            <Icons.Shield size={18} color="white"/>
          </div>
          <div>
            <p style={{ fontSize:13,fontWeight:900,margin:0,color:themeText }}>Cal & Cash</p>
            <p style={{ fontSize:9,margin:0,color:themeSubText }}>Super App</p>
          </div>
        </div>
        <div style={{ display:'flex',alignItems:'center',gap:8 }}>
          <button onClick={()=>setDarkMode(d=>!d)} style={{ fontSize:11,fontWeight:700,padding:'4px 10px',borderRadius:12,cursor:'pointer',
            background:darkMode?'#27272A':'#F8FAFC',color:darkMode?'#FCD34D':'#475569',border:`1px solid ${themeBorder}` }}>
            {darkMode?'☀️ Light':'🌙 Dark'}
          </button>
          {isAdmin
            ?<span style={{ fontSize:11,fontWeight:700,padding:'4px 10px',borderRadius:12,background:'#E8EFF5',color:'#1D4ED8' }}>👑 Admin</span>
            :<button onClick={()=>setShowAdminLogin(true)} style={{ fontSize:11,fontWeight:700,padding:'4px 10px',borderRadius:12,cursor:'pointer',background:themeCard,border:`1px solid ${themeBorder}`,color:themeSubText }}>Admin</button>}
          <button onClick={()=>setTab('settings')} style={{ width:36,height:36,borderRadius:'50%',overflow:'hidden',border:`2px solid ${themeBorder}`,background:darkMode?'#27272A':'#F1F5F9',cursor:'pointer',padding:0 }}>
            {user.img?<img src={user.img} style={{ width:'100%',height:'100%',objectFit:'cover' }} alt="avatar"/>
              :<div style={{ width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center' }}><Icons.User size={16} color={themeSubText}/></div>}
          </button>
        </div>
      </header>

      {/* Credit Score bar */}
      <div style={{ padding:'12px 16px 0',maxWidth:672,margin:'0 auto' }}>
        <div style={{ borderRadius:16,padding:16,marginBottom:4,display:'flex',alignItems:'center',gap:16,background:themeCard,border:`1px solid ${themeBorder}`,transition:'background .3s' }}>
          <div style={{ flex:1 }}>
            <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6 }}>
              <p style={{ fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:2,margin:0,color:themeSubText }}>AI Credit Score</p>
              <span style={{ fontSize:12,fontWeight:900,padding:'2px 8px',borderRadius:10,background:creditColor+'20',color:creditColor }}>{creditLabel}</span>
            </div>
            <Progress pct={creditScore} color={creditColor} height={8}/>
          </div>
          <div style={{ textAlign:'right',flexShrink:0 }}>
            <p style={{ fontSize:28,fontWeight:900,margin:0,color:creditColor }}>{creditScore}</p>
            <p style={{ fontSize:9,margin:0,color:themeSubText }}>/100</p>
          </div>
        </div>
      </div>

      <div style={{ padding:'8px 16px',maxWidth:672,margin:'0 auto' }}>
        {tab==='home'     && <HomeScreen     user={user} loans={loans} txns={txns} foods={foods} debtPayments={debtPayments} setTab={setTab} emergencyFund={emergencyFund} setEmergencyFund={setEmergencyFund}/>}
        {tab==='debt'     && <DebtScreen     user={user} loans={loans} setLoans={setLoans} debtPayments={debtPayments} setDebtPayments={setDebtPayments} toast={showToast}/>}
        {tab==='analytics' && <AnalyticsScreen txns={txns} loans={loans} debtPayments={debtPayments} foods={foods} user={user} workouts={workouts} setWorkouts={setWorkouts} toast={showToast}/>}
        {tab==='money'    && <MoneyScreen    txns={txns} setTxns={setTxns} toast={showToast}/>}
        {tab==='food'     && <FoodScreen     user={user} foods={foods} setFoods={setFoods} toast={showToast}/>}
        {tab==='admin'    && isAdmin && <AdminPanelScreen loans={loans} setLoans={setLoans} toast={showToast}/>}
        {tab==='settings' && <SettingsScreen user={user} role={role}
          onChangePin={()=>setShowChangePin(true)}
          onLogout={()=>{ setAuthenticated(false); setRole('user'); setTab('home'); }}/>}
      </div>

      <BottomNav tab={tab} setTab={setTab} isAdmin={isAdmin}/>
    </div>
  );
}

// ============================================================
// ERROR BOUNDARY — prevents blank white screen on runtime errors
// ============================================================
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(err) { return { error: err }; }
  render() {
    if (this.state.error) {
      return (
        <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column',
          alignItems:'center', justifyContent:'center', padding:24,
          background:'#0A0F1E', color:'#fff', fontFamily:'Inter,sans-serif' }}>
          <div style={{ fontSize:40, marginBottom:16 }}>⚠️</div>
          <h2 style={{ fontWeight:900, fontSize:20, margin:'0 0 8px' }}>เกิดข้อผิดพลาด</h2>
          <p style={{ color:'#94A3B8', fontSize:13, textAlign:'center', maxWidth:320 }}>
            {String(this.state.error.message)}
          </p>
          <button onClick={()=>this.setState({error:null})}
            style={{ marginTop:24, padding:'10px 24px', borderRadius:16, fontWeight:700,
              background:'#10B981', color:'#fff', border:'none', cursor:'pointer', fontSize:14 }}>
            ลองใหม่
          </button>
        </div>
      );
    }
    return this.props.children;
  }
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(
  <ErrorBoundary>
    <CalCashSuperApp/>
  </ErrorBoundary>
);
</script>
</body>
</html>
