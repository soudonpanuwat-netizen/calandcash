// ─────────────────────────────────────────────────────────────
// LENDING SCREEN — ให้คนอื่นยืมเงิน
// ─────────────────────────────────────────────────────────────
const LEND_KEY = 'calcash_lendings';
function loadLendings() {
  try { return JSON.parse(localStorage.getItem(LEND_KEY)||'[]'); } catch { return []; }
}
function saveLendings(arr) {
  try { localStorage.setItem(LEND_KEY, JSON.stringify(arr)); } catch {}
}

function LendingScreen({ toast, accountsMgr, emergencyFund, setEmergencyFund }) {
  const [lendings, setLendings] = useState(loadLendings);
  const [showForm, setShowForm] = useState(false);
  // form fields
  const [fName,     setFName]     = useState('');
  const [fAmount,   setFAmount]   = useState('');
  const [fDate,     setFDate]     = useState(() => new Date().toISOString().slice(0,10));
  const [fDue,      setFDue]      = useState('');
  const [fRate,     setFRate]     = useState('0');
  const [fNote,     setFNote]     = useState('');
  const [fRateType, setFRateType] = useState('flat'); // 'flat' | 'compound'
  const [fSource,   setFSource]   = useState('emergency');
  const [fCustomSource, setFCustomSource] = useState('');
  const [fUseInstallments, setFUseInstallments] = useState(false);
  const [fInstallCount,    setFInstallCount]    = useState(2);
  const [fInstallOverrides, setFInstallOverrides] = useState({}); // {idx: {amount?, due?}} แก้ไขเองรายงวด

  // ── แหล่งเงินที่สามารถเลือกนำไปให้ยืมได้: เงินเก็บสำรอง + บัญชีทั้งหมด ──
  const sourceOptions = [
    { id:'emergency', emoji:'💰', name:'เงินเก็บสำรอง', balance: emergencyFund?.amount||0 },
    ...((accountsMgr?.accounts)||[]).map(a=>({ id:a.id, emoji:a.emoji||'🏦', name:a.name, balance:a.balance||0 })),
  ];
  const findSource = (id) => sourceOptions.find(s=>s.id===id);

  // ── คำนวณดอกเบี้ย (ใช้ทั้งตอนพรีวิวก่อนบันทึก และตอนแสดงรายการที่บันทึกแล้ว) ──
  // เศษของเดือนคิดเป็นเต็มเดือน: ยืมแม้แค่ 1 วันก็คิดดอกเบี้ยเท่ากับยืมเต็มเดือน
  // (ตามที่ตกลงกันไว้ — ไม่ลดดอกเบี้ยตามสัดส่วนวันที่ยืมจริงอีกต่อไป)
  const calcInterestRaw = (amount, rate, rateType, dateStr, endStr) => {
    if (!rate || rate===0 || !dateStr || !endStr) return 0;
    const start = new Date(dateStr);
    const end   = new Date(endStr);
    const days  = Math.max(0, Math.round((end-start)/(1000*60*60*24)));
    if (days <= 0) return 0;
    const months = Math.max(1, Math.ceil(days/30));
    if (rateType==='compound') {
      return Math.round(amount * (Math.pow(1+rate/100, months)-1));
    }
    return Math.round(amount * (rate/100) * months);
  };

  // ── คำนวณแผนการคืนเงินเป็นงวด: แบ่งยอด (รวมดอกเบี้ย) + วันที่เท่าๆกัน ตั้งแต่วันที่ให้ยืม ไปจนถึงวันครบกำหนด ──
  const computeInstallments = (startStr, endStr, total, count) => {
    const start = new Date(startStr).getTime();
    const end   = new Date(endStr).getTime();
    const n     = Math.max(2, Math.round(+count||2));
    if (!startStr || !endStr || !total || isNaN(start) || isNaN(end) || end<=start) return [];
    const per = Math.floor(total / n);
    const out = [];
    for (let i=1; i<=n; i++) {
      const t = start + (end-start)*i/n;
      const due = new Date(t).toISOString().slice(0,10);
      const amount = i<n ? per : (total - per*(n-1)); // งวดสุดท้ายรับเศษที่เหลือ ป้องกันยอดขาด/เกิน
      out.push({ idx:i-1, due, amount, paid:false });
    }
    return out;
  };
  const previewInterest = calcInterestRaw(+fAmount||0, +fRate||0, fRateType, fDate, fDue);
  const previewTotalWithInterest = (+fAmount||0) + previewInterest;
  const baseInstallments = fUseInstallments
    ? computeInstallments(fDate, fDue, previewTotalWithInterest, fInstallCount) : [];
  const installmentPreview = baseInstallments.map((b,i)=> fInstallOverrides[i] ? {...b, ...fInstallOverrides[i]} : b);
  const installmentTotal = installmentPreview.reduce((s,x)=>s+(+x.amount||0),0);
  const setInstallOverride = (i, field, value) => {
    setFInstallOverrides(prev => ({...prev, [i]: {...(prev[i]||{}), [field]: field==='amount' ? (+value||0) : value }}));
  };
  const resetInstallOverrides = () => setFInstallOverrides({});

  // ── ปรับยอดเงินต้นทาง: type 'expense' = หักออก (ให้ยืม), 'income' = เพิ่มกลับ (รับคืน) ──
  const applySourceDelta = (sourceId, amount, type) => {
    if (!sourceId || !amount || sourceId === 'custom') return; // แหล่งกำหนดเองไม่มียอดให้ปรับ
    if (sourceId === 'emergency') {
      setEmergencyFund && setEmergencyFund(prev => {
        const base = prev || {amount:0,locked:false,target:50000};
        const delta = type==='income' ? +amount : -(+amount);
        return { ...base, amount: Math.round((base.amount + delta)*100)/100 };
      });
    } else if (accountsMgr) {
      accountsMgr.updateBalance(sourceId, amount, type);
    }
  };

  const resetForm = () => {
    setFName(''); setFAmount(''); setFDate(new Date().toISOString().slice(0,10));
    setFDue(''); setFRate('0'); setFNote(''); setFRateType('flat'); setFSource('emergency');
    setFCustomSource(''); setFUseInstallments(false); setFInstallCount(2); setFInstallOverrides({});
  };

  const addLending = () => {
    if (!fName.trim())          { toast('กรุณากรอกชื่อผู้ยืม','#DC2626'); return; }
    if (!fAmount || +fAmount<=0){ toast('กรุณากรอกจำนวนเงิน','#DC2626'); return; }
    if (!fDue)                  { toast('กรุณาเลือกวันครบกำหนด','#DC2626'); return; }
    let src;
    if (fSource === 'custom') {
      if (!fCustomSource.trim()) { toast('กรุณาระบุชื่อแหล่งเงิน','#DC2626'); return; }
      src = { id:'custom', name: fCustomSource.trim(), balance: Infinity };
    } else {
      src = findSource(fSource);
      if (!src)                   { toast('กรุณาเลือกแหล่งเงินที่นำไปให้ยืม','#DC2626'); return; }
      if (+fAmount > src.balance) { toast(`${src.name} มีเงินไม่พอ (เหลือ ฿${fmt(src.balance)})`,'#DC2626'); return; }
    }
    const rec = {
      id:       Date.now(),
      name:     fName.trim(),
      amount:   +fAmount,
      date:     fDate,
      due:      fDue,
      rate:     +fRate || 0,
      rateType: fRateType,
      note:     fNote.trim(),
      source:   src.id,
      sourceName: src.name,
      status:   'pending', // 'pending' | 'returned'
      paid:     0,
      returnedAt: null,
      installments: fUseInstallments ? installmentPreview.map(({idx,due,amount})=>({idx,due,amount,paid:false})) : null,
    };
    applySourceDelta(src.id, rec.amount, 'expense'); // หักเงินออกจากแหล่งที่เลือก
    const next = [rec, ...lendings];
    setLendings(next); saveLendings(next);
    toast(`บันทึกการยืมเงินของ "${rec.name}" แล้ว ✓ (หักจาก ${src.name})`);
    resetForm(); setShowForm(false);
  };

  // helper: ยอดที่คืนแล้วของรายการ (รองรับข้อมูลเก่าที่ไม่มีฟิลด์ paid)
  const paidOf = (l) => (l.paid!=null) ? l.paid : (l.status==='returned' ? l.amount : 0);

  // ── คืนเงินบางส่วน/เต็มจำนวน ── 
  const [repayInputs, setRepayInputs] = useState({});
  const addRepayment = (id, amt) => {
    const l = lendings.find(x=>x.id===id);
    if (!l) return;
    const curPaid = paidOf(l);
    const a = +amt;
    if (!a || a<=0) { toast('กรุณากรอกยอดคืนเงินให้ถูกต้อง','#DC2626'); return; }
    const outstanding = Math.max(0, l.amount - curPaid);
    const applyAmt = Math.min(a, outstanding);
    if (applyAmt<=0) { toast('รายการนี้คืนครบแล้ว','#059669'); return; }
    const newPaid = curPaid + applyAmt;
    const fullyReturned = newPaid >= l.amount;
    const next = lendings.map(x=>x.id===id ? {
      ...x, paid:newPaid, status: fullyReturned?'returned':'pending',
      returnedAt: fullyReturned ? new Date().toISOString() : null,
    } : x);
    setLendings(next); saveLendings(next);
    applySourceDelta(l.source, applyAmt, 'income'); // เงินคืนกลับเข้าแหล่งเดิม
    setRepayInputs(p=>({...p,[id]:''}));
    toast(`บันทึกคืนเงิน ฿${fmt(applyAmt)} แล้ว ✓${fullyReturned?' (คืนครบแล้ว 🎉)':''}`, '#059669');
  };
  const markFullyReturned = (id) => {
    const l = lendings.find(x=>x.id===id);
    if (!l) return;
    const outstanding = Math.max(0, l.amount - paidOf(l));
    if (outstanding<=0) return;
    addRepayment(id, outstanding);
  };
  // ── ติ๊กถูก/ยกเลิก แต่ละงวดในแผนการคืนเงิน ──
  const toggleInstallment = (lendId, idx) => {
    const l = lendings.find(x=>x.id===lendId);
    if (!l || !l.installments || !l.installments[idx]) return;
    const inst = l.installments[idx];
    const amt = inst.amount;
    const willPay = !inst.paid;
    const newInstallments = l.installments.map((ins,i)=> i===idx ? {...ins, paid:willPay} : ins);
    const newPaid = Math.max(0, Math.min(l.amount, paidOf(l) + (willPay ? amt : -amt)));
    const fullyReturned = newPaid >= l.amount;
    const next = lendings.map(x=>x.id===lendId ? {
      ...x, installments:newInstallments, paid:newPaid,
      status: fullyReturned?'returned':'pending',
      returnedAt: fullyReturned ? new Date().toISOString() : null,
    } : x);
    setLendings(next); saveLendings(next);
    applySourceDelta(l.source, amt, willPay ? 'income' : 'expense');
    toast(willPay ? `บันทึกคืนงวดที่ ${idx+1} ฿${fmt(amt)} แล้ว ✓` : `ยกเลิกงวดที่ ${idx+1}`);
  };
  const undoReturn = (id) => {
    const l = lendings.find(x=>x.id===id);
    if (!l) return;
    const curPaid = paidOf(l);
    if (curPaid>0) applySourceDelta(l.source, curPaid, 'expense'); // หักเงินที่เคยคืนกลับออกอีกครั้ง
    const next = lendings.map(x=>x.id===id ? {...x, paid:0, status:'pending', returnedAt:null} : x);
    setLendings(next); saveLendings(next);
    toast('เปลี่ยนเป็นยังไม่ได้คืน — หักเงินออกจากแหล่งอีกครั้งแล้ว');
  };

  const removeLending = (id) => {
    const rec = lendings.find(l=>l.id===id);
    // คืนยอดที่ยังค้างอยู่ (ยังไม่ได้คืน) กลับไปที่แหล่งเดิมก่อนลบ (ถือว่ายกเลิกการให้ยืม)
    if (rec) {
      const outstanding = Math.max(0, rec.amount - paidOf(rec));
      if (outstanding>0) applySourceDelta(rec.source, outstanding, 'income');
    }
    const next = lendings.filter(l=>l.id!==id);
    setLendings(next); saveLendings(next);
    toast('ลบรายการแล้ว');
  };

  // ── แก้ไขรายการที่ยังไม่ได้คืน (เผื่อใส่ยอดผิด) ── 
  const [editingLendId, setEditingLendId] = useState(null);
  const [editLName,     setEditLName]     = useState('');
  const [editLAmount,   setEditLAmount]   = useState('');
  const [editLPaid,     setEditLPaid]     = useState('');
  const [editLRate,     setEditLRate]     = useState('0');
  const [editLRateType, setEditLRateType] = useState('flat');
  const [editLDate,     setEditLDate]     = useState('');
  const [editLDue,      setEditLDue]      = useState('');
  const [editLNote,     setEditLNote]     = useState('');
  const [editLSource,   setEditLSource]   = useState('emergency');
  const [editLCustomSource, setEditLCustomSource] = useState('');

  const startEditLending = (l) => {
    setEditingLendId(l.id);
    setEditLName(l.name);
    setEditLAmount(String(l.amount));
    setEditLPaid(String(paidOf(l)));
    setEditLRate(String(l.rate||0));
    setEditLRateType(l.rateType||'flat');
    setEditLDate(l.date||'');
    setEditLDue(l.due||'');
    setEditLNote(l.note||'');
    setEditLSource(l.source||'emergency');
    setEditLCustomSource(l.source==='custom' ? (l.sourceName||'') : '');
  };
  const cancelEditLending = () => setEditingLendId(null);
  const saveEditLending = () => {
    const l = lendings.find(x=>x.id===editingLendId);
    if (!l) return;
    const newAmount = +editLAmount;
    const newPaid   = +editLPaid;
    if (!editLName.trim() || !newAmount || newAmount<=0) { toast('กรอกชื่อและจำนวนเงินให้ถูกต้อง','#DC2626'); return; }
    if (newPaid<0 || newPaid>newAmount) { toast('ยอดที่คืนแล้วต้องไม่เกินยอดที่ให้ยืม','#DC2626'); return; }
    if (!editLDue) { toast('กรุณาเลือกวันครบกำหนด','#DC2626'); return; }
    let newSrc;
    if (editLSource === 'custom') {
      if (!editLCustomSource.trim()) { toast('กรุณาระบุชื่อแหล่งเงิน','#DC2626'); return; }
      newSrc = { id:'custom', name: editLCustomSource.trim() };
    } else {
      newSrc = findSource(editLSource);
      if (!newSrc) { toast('กรุณาเลือกแหล่งเงิน','#DC2626'); return; }
    }

    const oldOutstanding = Math.max(0, l.amount - paidOf(l));
    const newOutstanding = Math.max(0, newAmount - newPaid);
    // คืนยอดเก่าที่ยังค้างอยู่กลับแหล่งเดิมก่อน แล้วหักยอดใหม่ออกจากแหล่งที่เลือกใหม่
    if (oldOutstanding>0) applySourceDelta(l.source, oldOutstanding, 'income');
    if (newOutstanding>0) applySourceDelta(newSrc.id, newOutstanding, 'expense');

    const fullyReturned = newPaid >= newAmount;
    const next = lendings.map(x=>x.id===editingLendId ? {
      ...x,
      name: editLName.trim(),
      amount: newAmount,
      paid: newPaid,
      rate: +editLRate||0,
      rateType: editLRateType,
      date: editLDate,
      due: editLDue,
      note: editLNote.trim(),
      source: newSrc.id,
      sourceName: newSrc.name,
      status: fullyReturned ? 'returned' : 'pending',
      returnedAt: fullyReturned ? (x.returnedAt || new Date().toISOString()) : null,
    } : x);
    setLendings(next); saveLendings(next);
    toast(`แก้ไขรายการ "${editLName.trim()}" แล้ว ✓`);
    setEditingLendId(null);
  };

  // คำนวณดอกเบี้ยของรายการที่บันทึกแล้ว
  const calcInterest = (l) => {
    const end = (l.status==='returned' && l.returnedAt) ? l.returnedAt : l.due;
    return calcInterestRaw(l.amount, l.rate, l.rateType, l.date, end);
  };

  const pending   = lendings.filter(l=>l.status==='pending');
  const returned  = lendings.filter(l=>l.status==='returned');
  const totalOut  = pending.reduce((s,l)=>s+(l.amount-paidOf(l)),0);
  const totalInt  = pending.reduce((s,l)=>s+calcInterest(l),0);

  const INP2 = 'clay-input';

  return (
    <div className="space-y-4">
      {/* Summary banner */}
      {pending.length > 0 && (
        <div style={{ background:'linear-gradient(135deg,#0C4A6E,#0284C7)',
          borderRadius:16, padding:'14px 16px', color:'#fff' }}>
          <p style={{ fontSize:10,opacity:.65,margin:'0 0 4px',textTransform:'uppercase',letterSpacing:1 }}>ยอดค้างรับทั้งหมด</p>
          <p style={{ fontSize:28,fontWeight:900,margin:'0 0 4px',letterSpacing:'-1px' }}>฿{fmt(totalOut)}</p>
          <div style={{ display:'flex',gap:16 }}>
            <div>
              <p style={{ fontSize:9,opacity:.6,margin:'0 0 2px' }}>ดอกเบี้ยสะสม</p>
              <p style={{ fontSize:14,fontWeight:800,color:'#FDE68A',margin:0 }}>+฿{fmt(totalInt)}</p>
            </div>
            <div>
              <p style={{ fontSize:9,opacity:.6,margin:'0 0 2px' }}>รวมทั้งสิ้น</p>
              <p style={{ fontSize:14,fontWeight:800,color:'#A7F3D0',margin:0 }}>฿{fmt(totalOut+totalInt)}</p>
            </div>
          </div>
        </div>
      )}

      {/* Add button */}
      <button onClick={()=>setShowForm(v=>!v)}
        style={{ width:'100%',padding:'13px 0',borderRadius:16,fontWeight:900,fontSize:14,
          border:'none',cursor:'pointer',color:'#fff',display:'flex',alignItems:'center',
          justifyContent:'center',gap:8,
          background: showForm
            ? 'linear-gradient(145deg,#6B7E8D,#4A5568)'
            : 'linear-gradient(145deg,#0284C7,#0C4A6E)',
          boxShadow:'var(--shadow-btn)' }}>
        {showForm ? '✕ ยกเลิก' : '➕ บันทึกการให้ยืม'}
      </button>

      {/* Form */}
      {showForm && (
        <div style={{ background:'var(--clay-card)',borderRadius:20,padding:'18px 16px',
          boxShadow:'var(--shadow-out)',border:'1px solid var(--clay-border)' }}>
          <p style={{ fontSize:13,fontWeight:900,color:'#1C2C3A',margin:'0 0 14px' }}>📋 รายละเอียดการยืม</p>
          <div style={{ display:'flex',flexDirection:'column',gap:10 }}>
            {/* ชื่อผู้ยืม */}
            <div>
              <label style={{ fontSize:10,fontWeight:700,color:'#6B7E8D',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:5 }}>ชื่อผู้ยืม *</label>
              <input value={fName} onChange={e=>setFName(e.target.value)}
                placeholder="เช่น คุณสมชาย" className={INP2}/>
            </div>
            {/* จำนวนเงิน */}
            <div>
              <label style={{ fontSize:10,fontWeight:700,color:'#6B7E8D',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:5 }}>จำนวนเงิน (฿) *</label>
              <input type="number" value={fAmount} onChange={e=>setFAmount(e.target.value)}
                placeholder="0" className={INP2}/>
            </div>
            {/* แหล่งเงินที่นำไปให้ยืม */}
            <div>
              <label style={{ fontSize:10,fontWeight:700,color:'#6B7E8D',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:5 }}>หักเงินจาก *</label>
              <select value={fSource} onChange={e=>setFSource(e.target.value)} className={INP2}>
                {sourceOptions.map(s=>(
                  <option key={s.id} value={s.id}>{s.emoji} {s.name} (เหลือ ฿{fmt(s.balance)})</option>
                ))}
                <option value="custom">✏️ อื่นๆ (ระบุเอง)</option>
              </select>
              {fSource==='custom' && (
                <input value={fCustomSource} onChange={e=>setFCustomSource(e.target.value)}
                  placeholder="เช่น บัตรกดเงินสด KTC" className={INP2} style={{ marginTop:8 }}/>
              )}
            </div>
            {/* วันที่ให้ยืม / ครบกำหนด */}
            <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:8 }}>
              <div>
                <label style={{ fontSize:10,fontWeight:700,color:'#6B7E8D',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:5 }}>วันที่ให้ยืม</label>
                <div style={{ position:'relative' }}>
                  <input type="date" value={fDate} onChange={e=>setFDate(e.target.value)} 
                    className={INP2} style={{ fontSize:12, padding:'10px 8px' }}/>
                  {!fDate && (
                    <span style={{ position:'absolute',left:9,top:'50%',transform:'translateY(-50%)',
                      fontSize:12,color:'#A09080',pointerEvents:'none' }}>เลือกวันที่</span>
                  )}
                </div>
              </div>
              <div>
                <label style={{ fontSize:10,fontWeight:700,color:'#6B7E8D',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:5 }}>ครบกำหนดคืน *</label>
                <div style={{ position:'relative' }}>
                  <input type="date" value={fDue} onChange={e=>setFDue(e.target.value)} 
                    className={INP2} style={{ fontSize:12, padding:'10px 8px' }}/>
                  {!fDue && (
                    <span style={{ position:'absolute',left:9,top:'50%',transform:'translateY(-50%)',
                      fontSize:12,color:'#A09080',pointerEvents:'none' }}>เลือกวันที่</span>
                  )}
                </div>
              </div>
            </div>
            {/* แบ่งคืนเป็นงวด */}
            <div style={{ background:'var(--clay-inset)',borderRadius:14,padding:'12px 14px' }}>
              <label style={{ display:'flex',alignItems:'center',gap:8,cursor:'pointer' }}>
                <input type="checkbox" checked={fUseInstallments}
                  onChange={e=>setFUseInstallments(e.target.checked)}
                  style={{ width:18,height:18,accentColor:'#0284C7' }}/>
                <span style={{ fontSize:12,fontWeight:800,color:'#1C2C3A' }}>📅 แบ่งคืนเป็นงวด (ถ้าจะทยอยคืน)</span>
              </label>
              {fUseInstallments && (
                <div style={{ marginTop:10 }}>
                  <label style={{ fontSize:10,fontWeight:700,color:'#6B7E8D',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:5 }}>จำนวนงวด</label>
                  <input type="number" min="2" max="24" value={fInstallCount}
                    onChange={e=>{ setFInstallCount(e.target.value); setFInstallOverrides({}); }}
                    className={INP2} style={{ marginBottom:10 }}/>
                  {previewInterest>0 && (
                    <p style={{ fontSize:11,color:'#F97316',fontWeight:700,margin:'0 0 8px' }}>
                      + รวมดอกเบี้ยประมาณ ฿{fmt(previewInterest)} แล้ว (ยอดทั้งหมด ฿{fmt(previewTotalWithInterest)})
                    </p>
                  )}
                  {installmentPreview.length>0 ? (
                    <>
                      <div style={{ display:'flex',flexDirection:'column',gap:6 }}>
                        {installmentPreview.map((inst,i)=>(
                          <div key={i} style={{ display:'flex',alignItems:'center',gap:6,
                            background:'var(--clay-card)',borderRadius:10,padding:'6px 8px' }}>
                            <span style={{ fontSize:11,color:'#6B7E8D',flexShrink:0,width:48 }}>งวด {i+1}</span>
                            <input type="date" value={inst.due}
                              onChange={e=>setInstallOverride(i,'due',e.target.value)}
                              style={{ flex:1,fontSize:11,padding:'6px 6px',borderRadius:8,
                                border:'1px solid var(--clay-border)',background:'var(--clay-inset)',
                                color:'var(--clay-ink)',outline:'none',minWidth:0 }}/>
                            <span style={{ fontSize:11,color:'#9CA3AF',flexShrink:0 }}>฿</span>
                            <input type="number" value={inst.amount}
                              onChange={e=>setInstallOverride(i,'amount',e.target.value)}
                              style={{ width:72,fontSize:11,fontWeight:800,color:'#0284C7',padding:'6px 6px',
                                borderRadius:8,border:'1px solid var(--clay-border)',
                                background:'var(--clay-inset)',outline:'none',flexShrink:0 }}/>
                          </div>
                        ))}
                      </div>
                      <div style={{ display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:8 }}>
                        <span style={{ fontSize:11,color: installmentTotal===previewTotalWithInterest?'#059669':'#F97316',fontWeight:700 }}>
                          รวมที่ตั้งไว้ ฿{fmt(installmentTotal)} {installmentTotal!==previewTotalWithInterest?`(เป้าหมาย ฿${fmt(previewTotalWithInterest)})`:'✓'}
                        </span>
                        <button onClick={resetInstallOverrides} type="button"
                          style={{ fontSize:10,fontWeight:700,color:'#0284C7',background:'none',
                            border:'none',cursor:'pointer',textDecoration:'underline' }}>
                          🔄 คำนวณใหม่อัตโนมัติ
                        </button>
                      </div>
                      <p style={{ fontSize:10,color:'#9CA3AF',margin:'6px 0 0' }}>แก้ไขวันที่/ยอดแต่ละงวดได้ตามต้องการ</p>
                    </>
                  ) : (
                    <p style={{ fontSize:11,color:'#9CA3AF',margin:0 }}>กรอกจำนวนเงิน วันที่ให้ยืม และวันครบกำหนดให้ครบ เพื่อดูตัวอย่างแผนการคืนเงิน</p>
                  )}
                </div>
              )}
            </div>
            <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:8 }}>
              <div>
                <label style={{ fontSize:10,fontWeight:700,color:'#6B7E8D',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:5 }}>ดอกเบี้ย (%/เดือน)</label>
                <input type="number" value={fRate} onChange={e=>setFRate(e.target.value)}
                  placeholder="0" step="0.1" className={INP2}/>
              </div>
              <div>
                <label style={{ fontSize:10,fontWeight:700,color:'#6B7E8D',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:5 }}>ประเภทดอก</label>
                <select value={fRateType} onChange={e=>setFRateType(e.target.value)} className={INP2}>
                  <option value="flat">คงที่ (Flat)</option>
                  <option value="compound">ทบต้น (Compound)</option>
                </select>
              </div>
            </div>
            {/* หมายเหตุ */}
            <div>
              <label style={{ fontSize:10,fontWeight:700,color:'#6B7E8D',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:5 }}>หมายเหตุ</label>
              <textarea value={fNote} onChange={e=>setFNote(e.target.value)}
                placeholder="เช่น ยืมซื้อของ ตกลงคืนวันเงินเดือนออก..."
                rows={2}
                style={{ background:'var(--clay-inset)',boxShadow:'var(--shadow-in)',
                  border:'1px solid #D4C9B8',borderRadius:14,color:'var(--clay-ink)',
                  padding:'12px 16px',fontSize:14,width:'100%',outline:'none',
                  fontFamily:'Inter,sans-serif',boxSizing:'border-box',resize:'none' }}/>
            </div>
            <button onClick={addLending} className="clay-btn-navy" style={{ marginTop:4 }}>💾 บันทึก</button>
          </div>
        </div>
      )}

      {/* Pending list */}
      {pending.length === 0 && returned.length === 0 && (
        <div style={{ textAlign:'center',padding:'32px 16px' }}>
          <div style={{ fontSize:56,marginBottom:12 }}>🤝</div>
          <p style={{ fontSize:13,fontWeight:700,color:'#6B7E8D',margin:0 }}>ยังไม่มีรายการให้ยืม</p>
          <p style={{ fontSize:11,color:'#A3B4BE',marginTop:4 }}>กดปุ่มด้านบนเพื่อบันทึกรายการ</p>
        </div>
      )}

      {pending.length > 0 && (
        <div>

function MoneyScreen({ txns, setTxns, toast, showBuddy, accountsMgr }) { 
const [type,        setType]       = useState('expense'); 
const [cat,         setCat]        = useState(''); 
const [amount,      setAmount]     = useState(''); 
const [note,        setNote]       = useState(''); 
const [bank, setBank] = useState(() => { 
try { 
const accs = JSON.parse(localStorage.getItem('calcash_accounts') || '[]'); 
return accs?.[0]?.id || 'cash'; 
} catch { return 'cash'; } 
});

// Sync bank → first account whenever accountsMgr loads 
useEffect(() => { 
if (!accountsMgr) return; 
const accs = accountsMgr.accounts; 
if (accs.length > 0 && !accs.find(a => a.id === bank)) { 
setBank(accs[0].id); // auto-correct to first valid account 
} 
}, [accountsMgr?.accounts]); 
const [dailyBudget, setDailyBudget]= useState(()=>{ 
try{ return +localStorage.getItem('calcash_dailyBudget')||500; }catch{ return 500; } 
}); 
const [editingBudget, setEditingBudget] = useState(false); 
const [budgetInput,   setBudgetInput]   = useState('');

const cats = type==='income'?INCOME_CATS:EXPENSE_CATS; 
const totalIn  = txns.filter(t=>t.type==='income').reduce((a,t)=>a+t.amount,0); 
const totalOut = txns.filter(t=>t.type==='expense').reduce((a,t)=>a+t.amount,0); 
const net      = totalIn - totalOut;

// Daily stats — robust "today" check (tolerant of date string formatting) 
const todayExp = txns 
.filter(t=>t.type==='expense' && t.date && (t.isoDate ? t.isoDate===todayISO() : isSameThaiDay(t.date))) 
.reduce((a,t)=>a+t.amount, 0); 
const remaining = dailyBudget - todayExp; 
const budgetPct = dailyBudget>0 ? clamp(Math.round(todayExp/dailyBudget*100),0,100) : 0; 
const isOver    = remaining < 0;

useEffect(()=>{ try{ localStorage.setItem('calcash_dailyBudget', String(dailyBudget)); }catch{} }, [dailyBudget]);

const saveBudget = () => { 
const v = +budgetInput; 
if (!isNaN(v) && v > 0) { setDailyBudget(v); toast(`ตั้งเป้าหมายรายวัน ฿${fmt(v)} แล้ว ✓`); } 
setEditingBudget(false); 
};

const add = () => { 
// ── Validation ── 
if (!cat) { 
toast('กรุณาเลือกหมวดหมู่ก่อนนะครับ ✏️', '#C4622D'); return; 
} 
if (!amount || +amount <= 0) { 
toast('กรุณากรอกจำนวนเงินให้ถูกต้องครับ 💰', '#C4622D'); return; 
}

// ── หา account ที่เลือก ──
const accs = accountsMgr?.accounts || [];
let matchedAcc = accs.find(a => a.id === bank);
if (!matchedAcc) {
  // ไม่เจอบัญชีนี้ในรายการที่มี (เช่นเพิ่งเลือก "ธนาคารอื่น" ที่ยังไม่ถูกสร้างเป็นบัญชี)
  // ลงทะเบียนเป็นบัญชีใหม่ทันที แทนที่จะเด้งกลับไปใช้บัญชีแรกแบบเดิม
  const bankInfo = THAI_BANKS.find(b => b.id === bank) || BANK_ACCOUNTS.find(b => b.id === bank);
  if (accountsMgr && bankInfo) {
    accountsMgr.addAccount(bankInfo);
    matchedAcc = { ...bankInfo, balance: 0 };
  } else if (accs.length > 0) {
    // กันพังจริงๆ: ไม่รู้จัก id นี้เลย ค่อยใช้บัญชีแรกเป็นทางเลือกสุดท้าย
    matchedAcc = accs[0];
    setBank(accs[0].id);
  }
}

// ── snapshot ค่าปัจจุบัน ──
const snapCat    = cat;
const snapAmount = +amount;
const snapNote   = note.trim();
const snapType   = type;
const snapBank   = matchedAcc?.id || bank;

// ── สร้าง transaction ──
const t = {
  id:     Date.now(),
  type:   snapType,
  cat:    snapCat,
  amount: snapAmount,
  note:   snapNote,
  date:   todayTH(),
  isoDate: todayISO(),
  bank:   snapBank,
};

// ── Functional update — keep max 30, newest first ──
const TXN_LIMIT = 30;
setTxns(prev => {
  const next = [t, ...prev].slice(0, TXN_LIMIT);
  db.set({ txns: next });   // sync localStorage
  return next;
});

// ── Reset form ──
setAmount('');
setNote('');
setCat('');

// ── อัปเดตยอด Multi-Account ──
if (accountsMgr && matchedAcc) {
  accountsMgr.updateBalance(matchedAcc.id, snapAmount, snapType);
}

const accName = matchedAcc?.name || snapBank;
toast('บันทึกแล้ว ✓ (' + accName + ')');

// ── Scroll to list ──
setTimeout(() => {
  const el = document.getElementById('txn-list');
  if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
}, 150);

if (showBuddy) showBuddy(
  snapType === 'income' ? 'income' : 'expense',
  null,
  snapCat + ' ฿' + fmt(snapAmount) + ' ' + accName
);
sbGetSession().then(u => { if (u) sbInsertTxn(t, u.id); });

}; 
const del=(id)=>{ 
const up=txns.filter(t=>t.id !== id); setTxns(up); db.set({txns:up}); 
sbDeleteTxn(id); // fire-and-forget Supabase delete 
};

return (

<h2 className="text-2xl font-black text-slate-900">💰 รายรับ–รายจ่าย</h2>

  {/* ── OVERALL SUMMARY BANNER ── */}
  <div style={{ borderRadius:24,padding:20,background:'linear-gradient(145deg,#0F2537,#1C3D5A,#2B5278)',boxShadow:'var(--shadow-out)' }}>

      <div style={{ textAlign:'center' }}><p style={{ fontSize:9,opacity:.5,textTransform:'uppercase' }}>สุทธิ</p><p style={{ fontSize:15,fontWeight:900 }}>{net>=0?'+':''}{fmtM(net)}</p></div>
      <div style={{ textAlign:'right' }}><p style={{ fontSize:9,opacity:.5,textTransform:'uppercase' }}>รายจ่าย</p><p style={{ fontSize:15,fontWeight:900,color:'#FECACA' }}>-{fmtM(totalOut)}</p></div>
    </div>

// ── Rule-based fallback (more granular) ───────────────────── 
function ruleBasedCal(input) { 
if(input.includes('ไข่ต้ม')||input.includes('ไข่ลวก')) return{kcal:78,type:'ไข่'}; 
if(input.includes('ไข่ดาว')) return{kcal:120,type:'ไข่'}; 
if(input.includes('ไข่เจียว')) return{kcal:200,type:'ไข่'}; 
if(input.includes('ไข่')) return{kcal:100,type:'ไข่ (ประมาณ)'}; 
if(input.includes('ทอด')&&input.includes('ข้าว')) return{kcal:520,type:'อาหารจานเดียว'}; 
if(input.includes('ทอด')) return{kcal:350,type:'อาหารทอด'}; 
if(input.includes('นึ่ง')) return{kcal:160,type:'อาหารนึ่ง'}; 
if(input.includes('ย่าง')) return{kcal:280,type:'อาหารปิ้งย่าง'}; 
if(input.includes('ต้มยำ')) return{kcal:170,type:'แกง'}; 
if(input.includes('ต้ม')) return{kcal:180,type:'ต้ม'}; 
if(input.includes('แกง')) return{kcal:250,type:'แกงทั่วไป'}; 
if(input.includes('ผัด')&&input.includes('ข้าว')) return{kcal:520,type:'ข้าวผัด'}; 
if(input.includes('ข้าว')) return{kcal:400,type:'อาหารข้าว'}; 
if(input.includes('เส้น')||input.includes('ก๋วยเตี๋ยว')||input.includes('บะหมี่')) return{kcal:380,type:'เส้น'}; 
if(input.includes('สลัด')) return{kcal:120,type:'สลัด'}; 
if(input.includes('ซุป')||input.includes('น้ำซุป')) return{kcal:80,type:'ซุป'}; 
if(input.includes('ผัก')) return{kcal:50,type:'ผัก'}; 
if(input.includes('ชา')||input.includes('กาแฟ')) return{kcal:120,type:'เครื่องดื่ม'}; 
if(input.includes('น้ำ')) return{kcal:60,type:'เครื่องดื่ม'}; 
if(input.includes('นม')) return{kcal:150,type:'นม'}; 
return{kcal:350,type:'ไม่พบในฐานข้อมูล (ค่าประมาณ)'}; 
}

// ── analyzeInput: match ยาวก่อน + dedup ซ้ำ ───────────────── 
function analyzeInput(raw) { 
const input = raw.toLowerCase().trim(); 
// Split by common delimiters for multi-food input 
const segments = input.split(/[,+/\s]+(?=\S)/);

const matched = []; 
// Sort keys longest-first to prefer specific matches (e.g. 'ไข่เจียว' before 'ไข่') 
const keys = Object.keys(FOOD_CALORIES).sort((a,b)=>b.length-a.length);

// Track which part of input is already "consumed" 
let remaining = input; 
const usedKcal = new Set(); // dedup: skip key if a longer key already matched that substring

for (const key of keys) { 
const k = key.toLowerCase(); 
if (remaining.includes(k)) { 
// Check not already subsumed by a longer match 
const alreadyCovered = matched.some(m => m.name.toLowerCase().includes(k) && m.name.length > key.length); 
if (!alreadyCovered) { 
matched.push({ name: key, ...FOOD_CALORIES[key] }); 
// Remove matched text to prevent sub-key double-count 
remaining = remaining.replace(k, ''); 
} 
} 
}

if (matched.length > 0) return { items: matched, fallback: false }; 
// Full fallback 
const rule = ruleBasedCal(input); 
return { items: [{ name: raw.trim(), ...rule }], fallback: true }; 
}

// ── Live GPS map (วาดเส้นทางขณะวิ่ง/ปั่นแบบเรียลไทม์) ──
function LiveRunMap({ route }) {
  const elRef = useRef(null);
  const mapRef = useRef(null);
  const lineRef = useRef(null);
  const markRef = useRef(null);

  useEffect(() => {
    if (!elRef.current || mapRef.current || typeof L==='undefined') return;
    const map = L.map(elRef.current, { zoomControl:false, attributionControl:false }).setView([13.7563,100.5018], 16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:19 }).addTo(map);
    lineRef.current = L.polyline([], { color:'#C4622D', weight:5 }).addTo(map);
    mapRef.current = map;
    return () => { map.remove(); mapRef.current = null; };
  }, []);

  useEffect(() => {
    const map = mapRef.current;
    if (!map || !route || route.length===0) return;
    const latlngs = route.map(p=>[p.lat,p.lng]);
    lineRef.current.setLatLngs(latlngs);
    const last = latlngs[latlngs.length-1];
    map.setView(last, map.getZoom()||16);
    if (markRef.current) markRef.current.setLatLng(last);
    else markRef.current = L.circleMarker(last, { radius:7, color:'#fff', weight:3, fillColor:'#2E7D4E', fillOpacity:1 }).addTo(map);
  }, [route]);

  return <div ref={elRef} style={{ width:'100%',height:230,borderRadius:16,overflow:'hidden',marginBottom:12 }}/>;
}

// ── Static route map (ดูเส้นทางที่บันทึกไว้ย้อนหลัง) ──
function StaticRouteMap({ route }) {
  const elRef = useRef(null);
  useEffect(() => {
    if (!elRef.current || !route || route.length<2 || typeof L==='undefined') return;
    const map = L.map(elRef.current, { zoomControl:false, attributionControl:false, scrollWheelZoom:false });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:19 }).addTo(map);
    const latlngs = route.map(p=>[p.lat,p.lng]);
    const poly = L.polyline(latlngs, { color:'#C4622D', weight:5 }).addTo(map);
    map.fitBounds(poly.getBounds(), { padding:[24,24] });
    L.circleMarker(latlngs[0], { radius:6, color:'#fff', weight:2, fillColor:'#2E7D4E', fillOpacity:1 }).addTo(map);
    L.circleMarker(latlngs[latlngs.length-1], { radius:6, color:'#fff', weight:2, fillColor:'#A83240', fillOpacity:1 }).addTo(map);
    return () => map.remove();
  }, [route]);
  return <div ref={elRef} style={{ width:'100%',height:260,borderRadius:16,overflow:'hidden' }}/>;
}

// ── Run/ride tracker: GPS สด หรือ กรอกเอง ──
const RUN_TYPES = [['🏃 วิ่ง','run',1.036],['🚶 เดิน','walk',0.53],['🚴 ปั่นจักรยาน','bike',0.45]];
function RunTrackerCard({ addExercise, toast, weightKg, exercises, onViewMap, onDelete }) {
  const [mode, setMode] = useState('gps'); // 'gps' | 'manual'
  const [typeIdx, setTypeIdx] = useState(0);
  const [showHistory, setShowHistory] = useState(false);
  const runHistory = (exercises||[]).filter(x=>x.distance);

  // GPS state
  const [gpsState, setGpsState] = useState('idle'); // idle | tracking | paused | done
  const [route, setRoute] = useState([]);
  const [distanceM, setDistanceM] = useState(0);
  const [gpsAccum, setGpsAccum] = useState(0);
  const [gpsStart, setGpsStart] = useState(null);
  const [, setGpsTick] = useState(0);
  const watchIdRef = useRef(null);
  const lastPointRef = useRef(null);
  const distanceRef = useRef(0);

  useEffect(() => {
    if (gpsState!=='tracking') return;
    const id = setInterval(()=>setGpsTick(t=>t+1), 1000);
    return () => clearInterval(id);
  }, [gpsState]);

  useEffect(() => () => { if (watchIdRef.current!=null) navigator.geolocation.clearWatch(watchIdRef.current); }, []);

  const gpsElapsed = gpsAccum + (gpsState==='tracking' && gpsStart ? Math.floor((Date.now()-gpsStart)/1000) : 0);
  const distanceKmLive = distanceM/1000;
  const paceLiveSec = distanceKmLive>0.03 ? Math.round(gpsElapsed/distanceKmLive) : 0;

  const startGPS = () => {
    if (!navigator.geolocation) { toast('อุปกรณ์นี้ไม่รองรับ GPS ค่ะ','#DC2626'); return; }
    setRoute([]); setDistanceM(0); distanceRef.current=0; lastPointRef.current=null;
    setGpsAccum(0); setGpsStart(Date.now()); setGpsState('tracking');
    watchIdRef.current = navigator.geolocation.watchPosition(
      (pos) => {
        const { latitude:lat, longitude:lng, accuracy } = pos.coords;
        if (accuracy && accuracy>50) return; // กรองสัญญาณ GPS ที่แม่นยำต่ำเกินไป
        const pt = { lat, lng };
        if (lastPointRef.current) {
          const d = haversineM(lastPointRef.current, pt);
          if (d < 3) return; // กรอง noise การสั่นของพิกัดขณะอยู่นิ่ง
          distanceRef.current += d;
          setDistanceM(distanceRef.current);
        }
        lastPointRef.current = pt;
        setRoute(prev => [...prev, pt]);
      },
      () => { toast('ไม่สามารถเข้าถึงตำแหน่ง กรุณาอนุญาต GPS ในเบราว์เซอร์','#DC2626'); setGpsState('idle'); },
      { enableHighAccuracy:true, maximumAge:1000, timeout:15000 }
    );
  };
  const pauseGPS = () => {
    if (watchIdRef.current!=null) navigator.geolocation.clearWatch(watchIdRef.current);
    setGpsAccum(gpsElapsed); setGpsStart(null); setGpsState('paused');
  };
  const resumeGPS = () => {
    setGpsStart(Date.now()); setGpsState('tracking');
    watchIdRef.current = navigator.geolocation.watchPosition(
      (pos) => {
        const { latitude:lat, longitude:lng, accuracy } = pos.coords;
        if (accuracy && accuracy>50) return;
        const pt = { lat, lng };
        if (lastPointRef.current) {
          const d = haversineM(lastPointRef.current, pt);
          if (d < 3) return;
          distanceRef.current += d;
          setDistanceM(distanceRef.current);
        }
        lastPointRef.current = pt;
        setRoute(prev => [...prev, pt]);
      },
      () => { toast('ไม่สามารถเข้าถึงตำแหน่ง กรุณาอนุญาต GPS ในเบราว์เซอร์','#DC2626'); },
      { enableHighAccuracy:true, maximumAge:1000, timeout:15000 }
    );
  };
  const cancelGPS = () => {
    if (watchIdRef.current!=null) navigator.geolocation.clearWatch(watchIdRef.current);
    watchIdRef.current=null; lastPointRef.current=null; distanceRef.current=0;
    setRoute([]); setDistanceM(0); setGpsAccum(0); setGpsStart(null); setGpsState('idle');
  };
  const finishGPS = () => {
    if (watchIdRef.current!=null) navigator.geolocation.clearWatch(watchIdRef.current);

    if (distKm < 0.05) { toast('ระยะทางสั้นเกินไป ลองบันทึกอีกครั้งนะคะ','#C4622D'); cancelGPS(); return; }
    const sec = gpsElapsed;
    const [label, , rate] = RUN_TYPES[typeIdx];
    const cleanLabel = label.replace(/^[^\s]+\s/,'');
    const cal = Math.max(1, Math.round(distKm * (weightKg||60) * rate));

    addExercise(`${cleanLabel} (GPS ${distKm.toFixed(2)} กม.)`, cal, {
      distance: Math.round(distKm*100)/100, paceSec, duration: sec, route, source: 'gps',
    });
    watchIdRef.current=null; lastPointRef.current=null; distanceRef.current=0;
    setRoute([]); setDistanceM(0); setGpsAccum(0); setGpsStart(null); setGpsState('idle');
  };

    setManDist(''); setManMin('');
  };

  return (
    <Card className="p-5">

                    <div style={{ flex:1,textAlign:'center',background:'#fff',borderRadius:10,padding:'5px 2px' }}>
                      <p style={{ fontSize:8,color:'#94A3B8',fontWeight:700,margin:'0 0 1px' }}>ระยะทาง</p>
                      <p style={{ fontSize:11,fontWeight:900,color:'#1C2C3A',margin:0 }}>{x.distance} กม.</p>
                    </div>
                    <div style={{ flex:1,textAlign:'center',background:'#fff',borderRadius:10,padding:'5px 2px' }}>
                      <p style={{ fontSize:8,color:'#94A3B8',fontWeight:700,margin:'0 0 1px' }}>เวลา</p>
                      <p style={{ fontSize:11,fontWeight:900,color:'#1C2C3A',margin:0 }}>{x.duration?fmtClockG(x.duration):'-'}</p>
                    </div>
                    <div style={{ flex:1,textAlign:'center',background:'#fff',borderRadius:10,padding:'5px 2px' }}>
                      <p style={{ fontSize:8,color:'#94A3B8',fontWeight:700,margin:'0 0 1px' }}>เพซ</p>
                      <p style={{ fontSize:11,fontWeight:900,color:'#1C2C3A',margin:0 }}>{fmtPace(x.paceSec)}</p>
                    </div>
                    <div style={{ flex:1,textAlign:'center',background:'#fff',borderRadius:10,padding:'5px 2px' }}>
                      <p style={{ fontSize:8,color:'#94A3B8',fontWeight:700,margin:'0 0 1px' }}>kcal</p>
                      <p style={{ fontSize:11,fontWeight:900,color:'#1A5C35',margin:0 }}>-{fmt(x.cal)}</p>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </Card>
  );
}


function HealthScreen({ exercises, setExercises, weights, setWeights, toast }) {
const todayIsoH = todayISO();
const [viewRun, setViewRun] = useState(null);

// ── Exercise Mode ──
const [exName,  setExName]  = useState(''); 
const [exCal,   setExCal]   = useState(''); 
const EX_PRESETS=[['🚶 เดิน 30 นาที',150],['🏃 วิ่ง 30 นาที',300],['🚴 ปั่นจักรยาน 30 นาที',250],['🏊 ว่ายน้ำ 30 นาที',400],['🧘 โยคะ 30 นาที',120],['🏋️ เวทเทรนนิ่ง 45 นาที',280]];
const addExercise=(name,cal,extra)=>{
  const n = name && name.trim();
  const c = +cal;
  if(!n){ toast('กรุณาระบุชื่อกิจกรรม','#C4622D'); return; }
  if(!c || c<=0){ toast('กรุณาระบุแคลอรีที่เผาให้ถูกต้อง','#C4622D'); return; }
  const entry={ id:Date.now(), name:n, cal:c, date:todayTH(), isoDate:todayIsoH, ts:new Date().toISOString(), ...(extra||{}) };
  const up=[entry, ...(exercises||[])].slice(0,60);
  setExercises(up); db.set({exercises:up});
  setExName(''); setExCal('');
  toast(`บันทึกออกกำลังกาย ${n} -${fmt(c)} kcal ✓`, '#1A5C35');
};
const delExercise=(id)=>{ const up=(exercises||[]).filter(x=>x.id!==id); setExercises(up); db.set({exercises:up}); };
const todayExercises = (exercises||[]).filter(x=>x.isoDate===todayIsoH);
const todayBurnedH = todayExercises.reduce((a,x)=>a+x.cal,0);
const fmtExDT = (x) => {
  try {
    const d = x.ts ? new Date(x.ts) : new Date(x.isoDate+'T00:00');
    const datePart = d.toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric'});
    const timePart = x.ts ? d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}) : null;
    return timePart ? `${datePart} · ${timePart} น.` : datePart;
  } catch { return x.date || x.isoDate || '-'; }
};

// ── Workout Timer (จับเวลา + คำนวณแคลอรีตามเวลาที่ออกกำลังกายจริง) ──
const TIMER_RATES = [ // [label, kcal ต่อนาที]
  ['🚶 เดิน', 5.0],
  ['🏃 วิ่ง', 10.0],
  ['🚴 ปั่นจักรยาน', 8.3],
  ['🏊 ว่ายน้ำ', 13.3],
  ['🧘 โยคะ', 4.0],
  ['🏋️ เวทเทรนนิ่ง', 6.2],
];
const [timerIdx,     setTimerIdx]     = useState(0); // index ของ TIMER_RATES, -1 = กำหนดเอง
const [customRate,   setCustomRate]   = useState('');
const [timerRunning, setTimerRunning] = useState(false);
const [timerStart,   setTimerStart]   = useState(null); // timestamp ตอนเริ่ม/ทำต่อ
const [timerAccum,   setTimerAccum]   = useState(0);    // วินาทีที่สะสมไว้ก่อนหน้า (ตอนพัก)
const [, setTimerTick] = useState(0); // ใช้บังคับ re-render ทุกวินาทีตอนกำลังจับเวลา

useEffect(() => {
  if (!timerRunning) return;
  const id = setInterval(() => setTimerTick(t => t + 1), 1000);
  return () => clearInterval(id);
}, [timerRunning]);

const timerElapsed = timerAccum + (timerRunning && timerStart ? Math.floor((Date.now() - timerStart) / 1000) : 0);
const timerRateVal = timerIdx === -1 ? (+customRate || 0) : TIMER_RATES[timerIdx][1];
const timerCalLive = Math.round(timerElapsed / 60 * timerRateVal);
const fmtClock = (sec) => {
  const m = Math.floor(sec / 60).toString().padStart(2, '0');
  const s = Math.floor(sec % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
};
const startTimer = () => { setTimerStart(Date.now()); setTimerRunning(true); };
const pauseTimer = () => { setTimerAccum(timerElapsed); setTimerStart(null); setTimerRunning(false); };
const resetTimer = () => { setTimerAccum(0); setTimerStart(null); setTimerRunning(false); };
const finishTimer = () => {
  const sec = timerElapsed;
  if (sec < 10) { toast('จับเวลาน้อยเกินไป ลองออกกำลังกายต่ออีกนิดนะคะ','#C4622D'); return; }
  if (!timerRateVal || timerRateVal <= 0) { toast('กรุณาระบุอัตราการเผาแคลอรีให้ถูกต้อง','#DC2626'); return; }
  const cal = Math.max(1, Math.round(sec / 60 * timerRateVal));
  const label = timerIdx === -1 ? 'ออกกำลังกาย (กำหนดเอง)' : TIMER_RATES[timerIdx][0].replace(/^[^\s]+\s/,'');
  addExercise(`${label} (จับเวลา ${fmtClock(sec)})`, cal, { duration: sec, source: 'timer' });
  resetTimer();
};

// ── Weight tracking ── 
const [weightInput, setWeightInput] = useState('');
const sortedWeights = [...(weights||[])].sort((a,b)=>(a.ts||a.isoDate||'').localeCompare(b.ts||b.isoDate||''));
const todayWeightEntries = sortedWeights.filter(w=>w.isoDate===todayIsoH);
const todayWeightEntry = todayWeightEntries.length ? todayWeightEntries[todayWeightEntries.length-1] : null;
const latestWeight  = sortedWeights.length>0 ? sortedWeights[sortedWeights.length-1] : null;
const prevWeight    = sortedWeights.length>1 ? sortedWeights[sortedWeights.length-2] : null;
const weightDelta   = (latestWeight && prevWeight) ? Math.round((latestWeight.weight-prevWeight.weight)*10)/10 : null;
const weightChartData = sortedWeights.slice(-14).map(w=>({
  name: (()=>{ try{ return new Date(w.isoDate+'T00:00').toLocaleDateString('th-TH',{day:'numeric',month:'short'}); }catch{ return w.isoDate; } })(),
  value: w.weight,
}));
const fmtWeightDT = (w) => {
  try {
    const d = w.ts ? new Date(w.ts) : new Date(w.isoDate+'T00:00');
    const datePart = d.toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric'});
    const timePart = w.ts ? d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}) : null;
    return timePart ? `${datePart} · ${timePart} น.` : datePart;
  } catch { return w.date || w.isoDate || '-'; }
};
const addWeight = () => {
  const v = +weightInput;
  if (!v || v<=0 || v>500) { return; }
  const now = new Date();
  const entry = { id: Date.now(), isoDate: todayIsoH, ts: now.toISOString(), weight: Math.round(v*10)/10, date: todayTH() };
  setWeights(prev => {
    const up = [...(prev||[]), entry]
      .sort((a,b)=>(a.ts||a.isoDate||'').localeCompare(b.ts||b.isoDate||''))
      .slice(-14); // เก็บประวัติสูงสุด 14 รายการ — ทับรายการเก่าสุดเมื่อเกิน
    db.set({weights: up});
    return up;
  });
  setWeightInput('');
};
const delWeight = (id) => {
  setWeights(prev => {
    const up = (prev||[]).filter(w=>w.id!==id);
    db.set({weights: up});
    return up;
  });
};

return (
<div className="space-y-5">
  <h2 style={{ fontSize:22,fontWeight:900,color:"#0F172A",margin:0,letterSpacing:"-0.3px" }}>💪 สุขภาพ</h2>

  {/* ── RUN TRACKER (GPS + แผนที่) CARD ── */}
  <RunTrackerCard addExercise={addExercise} toast={toast} weightKg={latestWeight?.weight}
    exercises={exercises} onViewMap={setViewRun} onDelete={delExercise}/>

  {/* ── WORKOUT TIMER CARD ── */}
  <Card className="p-5">
    <div style={{ display:'flex',alignItems:'center',gap:8,marginBottom:14 }}>
      <div style={{ width:38,height:38,borderRadius:12,flexShrink:0,
        background:'linear-gradient(145deg,#C4622D,#A8481C)',
        boxShadow:'var(--shadow-btn)',
        display:'flex',alignItems:'center',justifyContent:'center',fontSize:18 }}>⏱️</div>
      <div>
        <p style={{ fontSize:10,fontWeight:700,color:'#8A9BA8',textTransform:'uppercase',letterSpacing:1.5,margin:0 }}>Workout Timer</p>
        <p style={{ fontSize:13,fontWeight:900,color:'#1C2C3A',margin:0 }}>จับเวลาออกกำลังกาย</p>
      </div>
    </div>

    <p style={{ fontSize:10,fontWeight:700,color:'#8A9BA8',textTransform:'uppercase',letterSpacing:1,margin:'0 0 8px' }}>เลือกชนิดกิจกรรม</p>
    <div style={{ display:'flex',flexWrap:'wrap',gap:6,marginBottom:10 }}>
      {TIMER_RATES.map(([label,rate],i)=>(
        <button key={label} disabled={timerElapsed>0}
          onClick={()=>setTimerIdx(i)}
          className='clay-pill' style={{ fontSize:11,
            opacity:timerElapsed>0 && timerIdx!==i ? 0.4 : 1,
            background:timerIdx===i?'linear-gradient(145deg,#C4622D,#A8481C)':undefined,
            color:timerIdx===i?'#fff':undefined,
            boxShadow:timerIdx===i?'var(--shadow-btn)':undefined }}>
          {label} · ~{rate} kcal/นาที
        </button>
      ))}
      <button disabled={timerElapsed>0} onClick={()=>setTimerIdx(-1)}
        className='clay-pill' style={{ fontSize:11,
          opacity:timerElapsed>0 && timerIdx!==-1 ? 0.4 : 1,
          background:timerIdx===-1?'linear-gradient(145deg,#C4622D,#A8481C)':undefined,
          color:timerIdx===-1?'#fff':undefined,
          boxShadow:timerIdx===-1?'var(--shadow-btn)':undefined }}>

      </button>
    </div>
    {timerIdx===-1 && (

    <div style={{ display:'flex',gap:8 }}>
      {!timerRunning && (

          background:'linear-gradient(145deg,#2E7D4E,#1A5C35)' }}>

  </Card>

        <button key={label} onClick={()=>addExercise(label.replace(/^[^\s]+\s/,''),cal)}

    <div style={{ display:'flex',gap:8,marginBottom:4 }}>

    {/* ── Weight recording history ── */}
    {sortedWeights.length>0 && (
      <div style={{ marginTop:16,paddingTop:14,borderTop:'1px solid var(--clay-border)' }}>

        <div style={{ display:'flex',flexDirection:'column',gap:6,maxHeight:260,overflowY:'auto' }}>
          {[...sortedWeights].reverse().map(w=>(
            <div key={w.id||w.ts||w.isoDate} style={{ display:'flex',alignItems:'center',justifyContent:'space-between',
              background:'var(--clay-inset)',borderRadius:12,padding:'8px 12px' }}>
              <div>
                <p style={{ fontSize:12,fontWeight:900,color:'#1C2C3A',margin:0 }}>{w.weight} กก.</p>
                <p style={{ fontSize:10,color:'#8A9BA8',margin:'2px 0 0' }}>{fmtWeightDT(w)}</p>
              </div>
              {w.id && (
                <button onClick={()=>delWeight(w.id)}
                  style={{ background:'none',border:'none',cursor:'pointer',color:'#D1D5DB',flexShrink:0 }}>
                  <Icons.Trash2 size={14}/>
                </button>
              )}
            </div>
          ))}
        </div>
      </div>
    )}
  </Card>
</div>
);
}

//  
// FOOD SCREEN 
//  
function FoodScreen({ user, setUser, foods, setFoods, exercises, setExercises, toast, showBuddy }) { 
const [foodInput,   setFoodInput]   = useState(''); 
const [calResult,   setCalResult]   = useState(null); 
const [meal,        setMeal]        = useState('🌅 เช้า'); 
const [analyzing,   setAnalyzing]   = useState(false); 
// Photo-AI states 
const [activeTab,   setActiveTab]   = useState('text');   // 'text' | 'photo' | 'if' 
const [editingTarget, setEditingTarget] = useState(false);
const [targetInput,   setTargetInput]   = useState('');
const [manualName,    setManualName]    = useState('');
const [manualCal,     setManualCal]     = useState('');
const [photoFile,   setPhotoFile]   = useState(null); 
const [photoPreview,setPhotoPreview]= useState(null); 
const [photoResult, setPhotoResult] = useState(null); 
const [photoLoading,setPhotoLoading]= useState(false); 
const photoInputRef = useRef(null);

// ── Intermittent Fasting (IF) state ────────────────────────── 
const IF_KEY      = 'calcash_if'; 
const IF_HIST_KEY = 'calcash_if_history'; 
const loadIF   = () => { try { return JSON.parse(localStorage.getItem(IF_KEY)||'null'); } catch(e){ return null; } }; 
const loadHist = () => { try { return JSON.parse(localStorage.getItem(IF_HIST_KEY)||'[]'); } catch(e){ return []; } }; 
const [ifData,    setIfData]    = useState(loadIF); 
const [ifHistory, setIfHistory] = useState(loadHist);  // [{id,date,startTs,endTs,fastH,feedH,status}] 
const [feedHours, setFeedHours] = useState(()=>ifData?.feedHours||8); 
const [fastHours, setFastHours] = useState(()=>ifData?.fastHours||16); 
const [ifNow,     setIfNow]     = useState(new Date()); 
const [ifNotified,setIfNotified]= useState(false);

const saveIFHist = (entry) => { 
const hist = [entry, ...ifHistory].slice(0, 60); // keep 60 records 
setIfHistory(hist); 
try { localStorage.setItem(IF_HIST_KEY, JSON.stringify(hist)); } catch(e){} 
};

// Real-time IF clock 
useEffect(()=>{ const id=setInterval(()=>setIfNow(new Date()),1000); return()=>clearInterval(id); },[]);

// IF alarm notification 
useEffect(()=>{ 
if(!ifData?.active||!ifData.startTs) return; 
const elapsed = (ifNow - new Date(ifData.startTs)) / 3600000; 
const fastDone = elapsed >= ifData.fastHours; 
const feedDone = elapsed >= (ifData.fastHours + ifData.feedHours); 
if (fastDone && !feedDone && !ifNotified) { 
setIfNotified(true); 
toast('🍽️ ครบเวลาอดแล้ว! ถึงเวลากินได้แล้วค่ะ 🎉', '#1A5C35'); 
if (showBuddy) showBuddy('calorie'); 
// Browser notification (if permitted) 
try { if(Notification.permission==='granted') new Notification('Cal & Cash IF Timer',{body:'ครบเวลาอด! ถึงเวลากินแล้วค่ะ 🍽️'}); } catch(e){} 
} 
if (feedDone && ifData.active) { 
const endTs = new Date().toISOString(); 
const done = {...ifData, active:false}; 
setIfData(done); localStorage.setItem(IF_KEY, JSON.stringify(done)); 
// Save completed entry to history 
if (ifData.startTs) { 
saveIFHist({ 
id: ifData.histId || Date.now(), 
date: new Date(ifData.startTs).toLocaleDateString('th-TH',{day:'2-digit',month:'2-digit',year:'numeric'}), 
startTs: ifData.startTs, endTs, 
fastH: ifData.fastHours, feedH: ifData.feedHours, 
status: 'completed', 
}); 
} 
toast('✅ IF รอบนี้เสร็จสมบูรณ์! ยอดเยี่ยมมากค่ะ 💪', '#2B5278'); 
} 
}, [ifNow]);

const startIF = () => { 
const startTs = new Date().toISOString(); 
const d = { startTs, feedHours:+feedHours, fastHours:+fastHours, active:true, histId: Date.now() }; 
setIfData(d); setIfNotified(false); localStorage.setItem(IF_KEY, JSON.stringify(d)); 
toast(`⏱ เริ่ม IF ${fastHours}:${feedHours} แล้วค่ะ!`, '#2B5278'); 
try { if(Notification.permission === 'default') Notification.requestPermission(); } catch(e){} 
}; 
const stopIF = () => { 
const endTs = new Date().toISOString(); 
const d = {...ifData, active:false}; 
setIfData(d); localStorage.setItem(IF_KEY, JSON.stringify(d)); 
if (ifData?.startTs) { 
saveIFHist({ 
id: ifData.histId || Date.now(), 
date: new Date(ifData.startTs).toLocaleDateString('th-TH',{day:'2-digit',month:'2-digit',year:'numeric'}), 
startTs: ifData.startTs, endTs, 
fastH: ifData.fastHours, feedH: ifData.feedHours, 
status: 'cancelled', 
}); 
} 
toast('IF หยุดแล้วค่ะ', '#8A9BA8'); 
}; 
const resetIF = () => { 
if (ifData?.startTs && !ifData.active) { 
// Already stopped — entry was saved; just clear 
} 
setIfData(null); localStorage.removeItem(IF_KEY); setIfNotified(false); 
};

// Live clock for this screen: ticks every second AND re-syncs the moment the
// app regains focus/visibility (phones pause timers while locked/backgrounded,
// which previously made "today" stay stuck on yesterday until something else
// happened to trigger a re-render — this is what caused the overnight non-reset).
const [clockNow, setClockNow] = useState(new Date());
useEffect(() => {
  const tick = () => setClockNow(new Date());
  const id = setInterval(tick, 1000);
  const onVisible = () => { if (document.visibilityState === 'visible') tick(); };
  document.addEventListener('visibilitychange', onVisible);
  window.addEventListener('focus', tick);
  return () => {
    clearInterval(id);
    document.removeEventListener('visibilitychange', onVisible);
    window.removeEventListener('focus', tick);
  };
}, []);
const dateStrTH = clockNow.toLocaleDateString('th-TH', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
const timeStrTH = clockNow.toLocaleTimeString('th-TH', { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false });

const target   = user.targetCal||2000; 
const todayIso = clockNow.toISOString().slice(0,10);
const totalCal = foods.filter(f=>f.isoDate===todayIso||(f.isoDate==null&&f.date&&f.date.startsWith(clockNow.toLocaleDateString('th-TH',{day:'2-digit',month:'2-digit',year:'numeric'}).slice(0,2)))).reduce((a,f)=>a+f.cal,0);
const todayBurned = (exercises||[]).filter(x=>x.isoDate===todayIso).reduce((a,x)=>a+x.cal,0);
const netCal   = Math.max(0, totalCal - todayBurned);
const calPct   = clamp(Math.round(netCal/target*100),0,100); 
const remaining= target-netCal;

// ── Text analyze: ใช้ Gemini จริงผ่าน Supabase Edge Function ──
// ถ้าเชื่อมต่อ AI ไม่ได้ (เช่น ยังไม่ deploy function) จะใช้ฐานข้อมูลในเครื่องแทนอัตโนมัติ
const analyze=async()=>{ 
if(!foodInput.trim()){toast('กรุณาพิมพ์ชื่ออาหาร','#DC2626');return;} 
setAnalyzing(true); 
try {
  const resp = await fetch(`${SUPABASE_URL}/functions/v1/analyze-calories`, {
    method: 'POST',
    headers: { 'Content-Type':'application/json', 'Authorization': `Bearer ${SUPABASE_ANON}` },
    body: JSON.stringify({ foodText: foodInput }),
  });
  if (!resp.ok) throw new Error(`Edge function error ${resp.status}`);
  const data = await resp.json();
  if (!data.items || !Array.isArray(data.items) || data.items.length===0) throw new Error('no items from AI');
  const items = data.items.map(it=>({ name: it.name, kcal: Math.round(+it.kcal)||0, type: it.type||'AI ประเมิน' }));
  const total = items.reduce((a,it)=>a+it.kcal,0);
  const analysis = `🤖 AI วิเคราะห์ (Gemini):\n`+items.map(f=>`• ${f.name} (${f.type}) ~${f.kcal} kcal`).join('\n');
  setCalResult({total,items,analysis,fallback:false});
  toast('AI วิเคราะห์เสร็จแล้ว ✓');
} catch (err) {
  console.error('Gemini analyze failed, using local food database instead:', err);
  const{items,fallback}=analyzeInput(foodInput); 
  const total=items.reduce((a,it)=>a+it.kcal,0); 
  const analysis=fallback?`🤖 เชื่อมต่อ AI ไม่ได้ ใช้ค่าประมาณจากฐานข้อมูลในเครื่องแทน`
  :`🤖 ตรวจพบอาหาร (ฐานข้อมูลในเครื่อง):\n`+items.map(f=>`• ${f.name} (${f.type}) ~${f.kcal} kcal`).join('\n'); 
  setCalResult({total,items,analysis,fallback:true}); 
  toast('เชื่อมต่อ AI ไม่ได้ ใช้ฐานข้อมูลในเครื่องแทน','#C4622D');
} finally {
  setAnalyzing(false);
}
};

// ── Photo: pick / capture ── 
const pickPhoto = (e) => { 
const file = e.target.files[0]; 
if (!file) return; 
setPhotoFile(file); 
setPhotoResult(null); 
const reader = new FileReader(); 
reader.onloadend = () => setPhotoPreview(reader.result); 
reader.readAsDataURL(file); 
};

// ── Photo: call Claude claude-sonnet-4-6 Vision via Anthropic API ── 
const analyzePhoto = async () => { 
if (!photoFile) { toast('กรุณาเลือกรูปภาพก่อน','#A83240'); return; } 
setPhotoLoading(true); 
setPhotoResult(null); 
try { 
// Convert file to base64 
const base64 = await new Promise((res, rej) => { 
const r = new FileReader(); 
r.onloadend = () => res(r.result.split(',')[1]); 
r.onerror   = () => rej(new Error('อ่านไฟล์ไม่ได้')); 
r.readAsDataURL(photoFile); 
}); 
const mediaType = photoFile.type || 'image/jpeg';

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1024,
      messages: [{
        role: 'user',
        content: [
          {
            type: 'image',
            source: { type: 'base64', media_type: mediaType, data: base64 }
          },
          {
            type: 'text',
            text: `คุณคือนักโภชนาการผู้เชี่ยวชาญ วิเคราะห์อาหารในรูปนี้และประมาณแคลอรี่

ตอบเป็น JSON เท่านั้น ไม่มีข้อความอื่น รูปแบบ: 
{"total_kcal": <ตัวเลขรวม>, "items": [{"name":"<ชื่ออาหาร>","kcal":<ตัวเลข>,"note":"<รายละเอียดสั้น>"}], "summary": "<สรุปภาษาไทย 1 ประโยค>"} 
ถ้าไม่เห็นอาหารชัด ให้ประมาณจากสิ่งที่มองเห็นได้ดีที่สุด` 
} 
] 
}] 
}) 
});

  if (!resp.ok) {
    const errText = await resp.text();
    throw new Error(`API error ${resp.status}: ${errText.slice(0,120)}`);
  }

  const data = await resp.json();
  const raw  = data.content?.[0]?.text || '{}';

  // Strip markdown fences if present
  const cleaned = raw.replace(/```json|```/g,'').trim();
  const parsed  = JSON.parse(cleaned);

  const total = parsed.total_kcal || 0;
  const items = (parsed.items || []).map(it=>({
    name: it.name, kcal: it.kcal, note: it.note||''
  }));
  const summary = parsed.summary || 'AI วิเคราะห์เรียบร้อยแล้ว';

  setPhotoResult({ total, items, summary, isAI: true });
  toast(`📸 AI ประมาณได้ ${total} kcal ✓`, '#1C3D5A');

} catch(err) {
  console.error('Photo AI error:', err);
  // Graceful fallback: use rule-based estimate
  const fallbackKcal = 450;
  setPhotoResult({
    total: fallbackKcal,
    items: [{ name:'อาหารในรูป (ประมาณ)', kcal: fallbackKcal, note:'ไม่สามารถเชื่อมต่อ AI ได้' }],
    summary: 'ไม่สามารถเชื่อมต่อ AI ได้ — ใช้ค่าประมาณเฉลี่ยแทน',
    isAI: false,
    error: err.message
  });
  toast('ใช้ค่าประมาณเฉลี่ยแทน (AI ไม่พร้อมใช้งาน)', '#C4622D');
} finally {
  setPhotoLoading(false);
}

};

// ── Log from text result ──

// ── Log from photo result ── 
const addPhotoToLog=()=>{ 
if(!photoResult) return; 
const name = photoResult.items.map(i=>i.name).join(', ') || 'อาหารจากรูปถ่าย'; 
const analysis = `📸 AI วิเคราะห์จากรูปถ่าย:\n${photoResult.items.map(it=>`• ${it.name} ~${it.kcal} kcal${it.note? ` (${it.note})` : ''}`).join('\n')}`;

setPhotoFile(null); setPhotoPreview(null); setPhotoResult(null); 
toast('บันทึกจากรูปถ่ายแล้ว ✓'); 
if(showBuddy) showBuddy('calorie'); 
};

const del=(id)=>{ const up=foods.filter(f=>f.id !== id); setFoods(up); db.set({foods:up}); }; 
const reset=()=>{ setFoods([]); db.set({foods:[]}); setCalResult(null); setFoodInput(''); 
setPhotoFile(null); setPhotoPreview(null); setPhotoResult(null); toast('รีเซ็ตแล้ว'); };

const HINTS=['หมูกระทะกับโค้ก','ชานมไข่มุก','ข้าวกะเพราไข่ดาว','ส้มตำ + ข้าวเหนียว','ไก่ทอด','ชาบู'];


return ( 
<div className="space-y-4"> 
<div style={{ display:'flex',alignItems:'center',justifyContent:'space-between' }}> 
<h2 className="text-2xl font-black text-slate-900">🤖 AI คำนวณแคลอรี</h2> 
<button onClick={reset} style={{ fontSize:12,fontWeight:700,padding:'6px 14px',borderRadius:12, 
color:'#fff',border:'none',cursor:'pointer', 
background:'linear-gradient(145deg,#A83240,#8B2635)', 
boxShadow:'var(--shadow-btn)' }}>รีเซ็ต</button> 
</div>

  {/* ── CALORIE PROGRESS ── */}
  <Card className="p-5">
    <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8 }}>
      <div style={{ display:'flex',alignItems:'center',gap:8 }}>
        <Icons.Flame size={16} color="#C4622D"/>
        <span style={{ fontSize:13,fontWeight:900,color:'#374151' }}>แคลอรีวันนี้ (สุทธิ)</span>
      </div>
      <span style={{ fontSize:13,fontWeight:900,color:calPct>=100?'#A83240':'#1C3D5A' }}>{fmt(netCal)} / {fmt(target)}</span>
    </div>
    <Progress pct={calPct} color={calPct>=100?'#A83240':'#2B5278'} height={14}/>
    {todayBurned>0 && (
      <div style={{ display:'flex',justifyContent:'space-between',gap:8,marginTop:10 }}>
        <span style={{ fontSize:10,color:'#8A9BA8' }}>🍽️ กินเข้าไป {fmt(totalCal)} kcal</span>
        <span style={{ fontSize:10,color:'#1A5C35',fontWeight:800 }}>🔥 เผาไป -{fmt(todayBurned)} kcal</span>
      </div>
    )}
    <div style={{ display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:8 }}>
      {editingTarget ? (
        <div style={{ display:'flex',alignItems:'center',gap:6,flex:1 }}>
          <input
            type="number"
            value={targetInput}
            onChange={e=>setTargetInput(e.target.value)}
            placeholder="เช่น 1800"
            style={{ width:90,padding:'4px 8px',borderRadius:10,border:'1.5px solid #2B5278',
              fontSize:13,fontWeight:700,outline:'none',color:'#1C2C3A',
              background:'#F0F6FF',fontFamily:'inherit' }}
            autoFocus
          />
          <span style={{ fontSize:11,color:'#8A9BA8' }}>kcal/วัน</span>
          <button onClick={()=>{
            const v = +targetInput;
            if(v>=500 && v<=9999){
              const updated = {...user, targetCal: v};
              db.set({user: updated});
              setUser && setUser(updated);
              toast('บันทึกเป้าหมายแล้ว ✓','#1A5C35');
            } else { toast('กรุณากรอก 500–9999 kcal','#A83240'); }
            setEditingTarget(false);
          }} style={{ padding:'4px 10px',borderRadius:10,background:'linear-gradient(145deg,#1A5C35,#0F3D24)',
            color:'#fff',border:'none',fontSize:11,fontWeight:800,cursor:'pointer',fontFamily:'inherit' }}>
            บันทึก
          </button>
          <button onClick={()=>setEditingTarget(false)}
            style={{ padding:'4px 8px',borderRadius:10,background:'#F0F0F0',
              color:'#8A9BA8',border:'none',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit' }}>
            ยกเลิก
          </button>
        </div>
      ) : (
        <div style={{ display:'flex',alignItems:'center',gap:8 }}>
          <span style={{ fontSize:10,color:'#94A3B8' }}>เป้าหมาย {fmt(target)} kcal/วัน</span>
          <button onClick={()=>{ setTargetInput(String(target)); setEditingTarget(true); }}
            style={{ padding:'2px 8px',borderRadius:8,background:'#EBF3FF',
              color:'#2B5278',border:'1px solid #C8DDF5',fontSize:10,fontWeight:700,
              cursor:'pointer',fontFamily:'inherit' }}>
            ✏️ แก้ไข
          </button>
        </div>
      )}
      <span style={{ fontSize:10,fontWeight:700,color:remaining<0?'#A83240':'#1C3D5A',flexShrink:0 }}>
        {remaining>=0?`เหลือ ${fmt(remaining)}`:`เกิน ${fmt(Math.abs(remaining))}`} kcal
      </span>
    </div>
    <div style={{ display:'flex',alignItems:'center',gap:4,marginTop:6 }}>
      <span style={{ fontSize:9,color:'#B0B8C4' }}>🔄 รีเซ็ตอัตโนมัติทุกวันเวลา 00:00 น.</span>
    </div>
    <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',gap:4,marginTop:4 }}>
      <span style={{ fontSize:9,color:'#94A3B8' }}>📅 {dateStrTH}</span>
      <span style={{ fontSize:9,color:'#94A3B8',fontFamily:'monospace' }}>🕐 {timeStrTH}</span>
    </div>
  </Card>

  <div style={{ display:'flex',alignItems:'center',gap:8,padding:'10px 14px',

      const elapsedMs = startTs ? (now - startTs) : 0;
      const elapsedH  = elapsedMs / 3600000;
      const fastH     = ifData?.fastHours || 16;
      const feedH     = ifData?.feedHours || 8;
      const totalH    = fastH + feedH;
      const pct       = (ifData?.active && startTs) ? clamp(Math.round(elapsedH/fastH*100),0,100) : 0;
      const inFeed    = elapsedH >= fastH && elapsedH < totalH;
      const hh=Math.floor(elapsedH);
      const mm=Math.floor((elapsedH-hh)*60);
      const ss=Math.floor(((elapsedH-hh)*60-mm)*60);
      const elapsed=`${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
      const remFastMs = startTs ? Math.max(0,(startTs.getTime()+fastH*3600000)-now) : 0;
      const remH=Math.floor(remFastMs/3600000), remM=Math.floor((remFastMs%3600000)/60000);
      const endFastTime = startTs ? new Date(startTs.getTime()+fastH*3600000).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}) : '--:--';
      const endFeedTime = startTs ? new Date(startTs.getTime()+totalH*3600000).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}) : '--:--';

                        fontWeight:900,textAlign:'center',outline:'none',
                        boxSizing:'border-box',color:'#1C2C3A' }}/>
                  </div>
                  <div>
                    <label style={{ fontSize:10,color:'#8A9BA8',fontWeight:700,textTransform:'uppercase',
                      letterSpacing:.5,display:'block',marginBottom:6 }}>🍽️ ช่วงกิน (ชม.)</label>
                    <input type="number" value={feedHours} onChange={e=>setFeedHours(+e.target.value)}
                      min={1} max={23} style={{ width:'100%',border:'1px solid #E2E8F0',
                        background:'#fff',borderRadius:12,padding:'10px 12px',fontSize:22,
                        fontWeight:900,textAlign:'center',outline:'none',
                        boxSizing:'border-box',color:'#1C2C3A' }}/>
                  </div>
                </div>
                <p style={{ fontSize:10,color:'#8A9BA8',margin:'0 0 8px',fontWeight:700 }}>โปรโตคอลยอดนิยม:</p>
                <div style={{ display:'flex',gap:6,flexWrap:'wrap' }}>
                  {[[16,8,'16:8'],[18,6,'18:6'],[20,4,'20:4'],[14,10,'14:10']].map(([f,e,l])=>(
                    <button key={l} onClick={()=>{setFastHours(f);setFeedHours(e);}}
                      style={{ padding:'5px 12px',borderRadius:20,fontWeight:800,fontSize:11,
                        cursor:'pointer',border:'none',
                        background:(fastHours===f&&feedHours===e)
                          ?'linear-gradient(145deg,#1A5C35,#0F3D24)':'var(--clay-card)',
                        color:(fastHours===f&&feedHours===e)?'#fff':'#6B7E8D',
                        boxShadow:(fastHours===f&&feedHours===e)?'var(--shadow-btn)':'var(--shadow-out)' }}>
                      {l}
                    </button>
                  ))}
                </div>
              </div>
              <button onClick={startIF} style={{ width:'100%',padding:'14px 0',borderRadius:16,
                fontWeight:900,fontSize:15,border:'none',cursor:'pointer',color:'#fff',
                background:'linear-gradient(145deg,#1A5C35,#0F3D24)',
                boxShadow:'0 6px 18px rgba(26,92,53,0.35)',fontFamily:'inherit' }}>
                ⏱ เริ่ม IF {fastHours}:{feedHours}
              </button>
            </>
          )}
          {/* Active timer */}
          {ifData?.active && (
            <div style={{ background:'linear-gradient(135deg,#0F2537,#1C3D5A,#1A5C35)',
              borderRadius:20,padding:'20px 18px',color:'#fff',textAlign:'center' }}>
              <div style={{ display:'inline-flex',alignItems:'center',gap:6,
                background:inFeed?'rgba(167,243,208,0.2)':'rgba(253,230,138,0.2)',

                <div style={{ width:7,height:7,borderRadius:'50%',

// IN-APP PROMPT MODAL — ใช้แทน window.prompt() เพราะ window.prompt/alert/confirm
// ไม่ทำงาน (หรือทำให้จอกระพริบ/เด้งไปมา) เมื่อแอปถูกเปิดแบบ standalone PWA
// (กด "เพิ่มลงในหน้าจอโฮม" บน iOS) — เป็นบั๊กที่รู้จักกันดีของ WebKit
//  
function PromptModalBox({ title, defaultValue, onSubmit, onCancel }) {
  const [val, setVal] = useState(defaultValue || '');
  return (
    <div onClick={onCancel} style={{ position:'fixed', inset:0, zIndex:9999,
      background:'rgba(0,0,0,0.5)', display:'flex', alignItems:'center',
      justifyContent:'center', padding:24 }}>
      <div onClick={e=>e.stopPropagation()} style={{ background:'#fff',
        borderRadius:20, padding:20, width:'100%', maxWidth:340,
        boxShadow:'0 20px 60px rgba(0,0,0,0.3)' }}>
        <p style={{ fontSize:13, fontWeight:800, color:'#1C2C3A',
          margin:'0 0 12px', whiteSpace:'pre-line', lineHeight:1.5 }}>{title}</p>
        <input autoFocus value={val} onChange={e=>setVal(e.target.value)}
          onKeyDown={e=>{ if(e.key==='Enter') onSubmit(val); }}
          className="clay-input" style={{ marginBottom:14 }}/>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
          <button onClick={onCancel} style={{ padding:'10px 0', borderRadius:12,
            border:'1px solid var(--clay-border)', background:'var(--clay-inset)',
            color:'#8A9BA8', fontWeight:700, cursor:'pointer', fontFamily:'inherit' }}>ยกเลิก</button>
          <button onClick={()=>onSubmit(val)} style={{ padding:'10px 0', borderRadius:12,
            border:'none', background:'linear-gradient(145deg,#2B5278,#1C3D5A)',
            color:'#fff', fontWeight:800, cursor:'pointer', fontFamily:'inherit' }}>ตกลง</button>
        </div>
      </div>
    </div>
  );
}
function usePromptModal() {
  const [state, setState] = useState(null);
  const ask = (title, defaultValue = '') => new Promise((resolve) => {
    setState({ title, defaultValue, resolve });
  });
  const Modal = !state ? null : (
    <PromptModalBox
      title={state.title}
      defaultValue={state.defaultValue}
      onSubmit={(val) => { state.resolve(val); setState(null); }}
      onCancel={() => { state.resolve(null); setState(null); }}
    />
  );
  return { ask, Modal };
}

function AdminPanelScreen({ loans, setLoans, toast, invitations, setInvitations, onLogout }) {

const loadMemberFinance = async (userId) => {
  setExpandedFinance(prev=>({...prev,[userId]:true}));
  if (financeData[userId]) return;
  try {
    const { data, error } = await supabase
      .from('daily_summaries').select('*').eq('user_id', userId).order('date',{ascending:false}).limit(90);
    if (error) { setFinanceData(prev=>({...prev,[userId]:{error:true}})); return; }
    const rows = data || [];
    const totalIncome  = rows.reduce((s,r)=>s+(+r.income||0),0);
    const totalExpense = rows.reduce((s,r)=>s+(+r.expense||0),0);
    const avgCalories  = rows.length ? Math.round(rows.reduce((s,r)=>s+(+r.calories||0),0)/rows.length) : 0;
    setFinanceData(prev=>({...prev,[userId]:{
      days: rows.length, totalIncome, totalExpense, net: totalIncome-totalExpense, avgCalories,
    }}));
  } catch(e) { setFinanceData(prev=>({...prev,[userId]:{error:true}})); }
};
const [admLoaded,    setAdmLoaded]    = useState(false);

const loadMembers = async () => { 
setAdmLoading(true); 
try { 
const { data, error } = await supabase 
.from('user_profiles').select('*').order('created_at', { ascending: false }); 
if (!error) setAdmProfiles(data || []); 
} catch(e) {} 
setAdmLoading(false); setAdmLoaded(true); 
};

// รีเฟรชแบบเงียบๆ (ไม่โชว์ข้อความ "กำลังโหลด") ใช้สำหรับ auto-refresh ทุก 5 วิ
const loadMembersSilent = async () => {
  try {
    const { data, error } = await supabase
      .from('user_profiles').select('*').order('created_at', { ascending: false });
    if (!error) { setAdmProfiles(data || []); setAdmLoaded(true); }
  } catch(e) {}
};

// โหลดข้อมูลสมาชิกทันทีตอนเปิดหน้า + ฟังสัญญาณ Realtime จาก Supabase ทันทีที่มีการเปลี่ยนแปลง
// (ต้องรัน SQL: alter publication supabase_realtime add table public.user_profiles; ก่อนถึงจะทำงาน)
// poll ทุก 1 วินาทีไว้เป็นตัวสำรอง เผื่อ realtime หลุดสัญญาณ (เช่น เน็ตไม่นิ่ง)
useEffect(() => {
  loadMembers();
  const t = setInterval(loadMembersSilent, 1000);

  let channel = null;
  try {
    channel = supabase
      .channel('user-profiles-realtime')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'user_profiles' }, () => {
        loadMembersSilent();
      })
      .subscribe((status, err) => {
        if (err) console.warn('[Realtime user_profiles] subscribe error (ใช้ poll 1 วิแทน):', err.message);
      });
  } catch (e) {
    console.warn('[Realtime user_profiles] ไม่รองรับในสภาพแวดล้อมนี้ ใช้ poll 1 วิแทน:', e.message);
  }

  return () => { clearInterval(t); try { if (channel) supabase.removeChannel(channel); } catch {} };
}, []);

// ── ซิงก์สถานะสินเชื่อเข้า loans array (ใช้แสดงในหน้า "ธุรกรรม" ของผู้ใช้) ──
const syncLoanForMember = (profile, status, amount) => {
  const key = profile.nickname || profile.email || profile.user_id;
  const existing = loans.find(l => l.userId === key);
  let up;
  if (existing) {
    up = loans.map(l => l.userId === key ? {
      ...l, status,
      amount: (amount!=null ? +amount : l.amount) || 0,
      creditLimit: status==='approved' ? (amount!=null ? +amount : (l.creditLimit||l.amount||0)) : l.creditLimit,
      outstandingBalance: status==='approved' ? (l.outstandingBalance||0) : l.outstandingBalance,
      userEmail: profile.email || l.userEmail || '',
      decidedAt: (status==='approved'||status==='rejected') ? todayTH() : l.decidedAt,
    } : l);
  } else {
    up = [...loans, {
      id: Date.now(), userId: key, userEmail: profile.email || '',
      amount: (amount!=null ? +amount : 0) || 0,
      creditLimit: status==='approved' ? ((amount!=null ? +amount : 0) || 0) : null,
      outstandingBalance: 0,
      status, appliedAt: todayTH(),
      decidedAt: (status==='approved'||status==='rejected') ? todayTH() : null,
    }];
  }
  setLoans(up); db.set({ loans: up });
};

  // เคลียร์ notifiedStatus เพื่อบังคับให้ popup ยินดีด้วยเด้งขึ้นใหม่อีกครั้ง
  // (เผื่อกรณีให้สินเชื่อซ้ำให้คนที่อนุมัติอยู่แล้ว สถานะจะไม่เปลี่ยนแต่ก็ควรเห็น popup)
  const key = profile.nickname || profile.email || profile.user_id;
  setLoans(prev => {
    const up = prev.map(l => l.userId===key ? { ...l, notifiedStatus:null } : l);
    db.set({ loans: up });
    return up;
  });
  // ส่ง push notification ไปยังเครื่องของผู้ใช้คนนั้น (เด้งขึ้นแม้ปิดแอปไปแล้ว ถ้าเคยกด "เปิดการแจ้งเตือน" ไว้)
  sendPushNotification(key, '🎉 ได้รับวงเงินสินเชื่อแล้ว!', `คุณได้รับวงเงิน ฿${fmt(n)} จากแอดมิน เปิดแอปเพื่อยืนยันรับสิทธิ์ค่ะ`, '/');
  toast(`ให้สินเชื่อ ฿${fmt(n)} แก่ ${profile.nickname||'สมาชิก'} แล้ว ✓`,'#1A5C35');

const setCreditLimit = async (profile) => {
  const key = profile.nickname || profile.email;
  const loan = loans.find(l => l.userId === key);
  if (!loan) { toast('ไม่พบข้อมูลสินเชื่อของสมาชิกคนนี้','#A83240'); return; }
  const input = await ask('ตั้ง/เพิ่มวงเงินหมุนเวียน (บาท):', String(loan.creditLimit || ''));
  if (input == null) return;
  const limit = +input;
  if (!limit || limit <= 0) { toast('กรุณากรอกวงเงินให้ถูกต้อง','#A83240'); return; }
  const up = loans.map(l => l.userId===key ? { ...l, creditLimit: limit, outstandingBalance: l.outstandingBalance || 0 } : l);
  setLoans(up); db.set({ loans: up });
  toast(`ตั้งวงเงิน ฿${fmt(limit)} แล้ว ✓`, '#1A5C35');
};

// ── ตั้งอัตราดอกเบี้ยรายปี (%) ──
const setInterestRate = async (profile) => {
  const key = profile.nickname || profile.email;
  const loan = loans.find(l => l.userId === key);
  if (!loan) { toast('ไม่พบข้อมูลสินเชื่อของสมาชิกคนนี้','#A83240'); return; }
  const input = await ask('ตั้งอัตราดอกเบี้ยรายปี (%):', String(loan.interestRate || ''));
  if (input == null) return;
  const rate = +input;
  if (isNaN(rate) || rate < 0) { toast('กรุณากรอกอัตราดอกเบี้ยให้ถูกต้อง','#A83240'); return; }
  const up = loans.map(l => l.userId===key ? { ...l, interestRate: rate } : l);
  setLoans(up); db.set({ loans: up });
  toast(`ตั้งอัตราดอกเบี้ย ${rate}% ต่อปี แล้ว ✓`, '#1A5C35');
};

const closeLoanForMember = async (profile) => {
  const key = profile.nickname || profile.email;
  const loan = loans.find(l => l.userId === key);
  if (!loan) { toast('ไม่พบข้อมูลสินเชื่อของสมาชิกคนนี้','#A83240'); return; }
  const outstanding = loan.outstandingBalance || 0;
  if (outstanding > 0) {
    const proceed = await ask(
      `⚠️ สมาชิกคนนี้ยังมียอดคงค้าง ฿${fmt(outstanding)}\nพิมพ์ "ปิด" เพื่อยืนยันปิดสินเชื่อทั้งที่ยังมียอดค้าง หรือกดยกเลิก`, ''
    );

  } else {
    const confirmTxt = await ask('พิมพ์ "ปิด" เพื่อยืนยันการปิดสินเชื่อของสมาชิกคนนี้', '');
    if (confirmTxt !== 'ปิด') { toast('ยกเลิกการปิดสินเชื่อ', '#8A9BA8'); return; }
  }
  // ใช้ admUpdateStatus เพื่อให้ user_profiles (ตารางที่ตารางแอดมินใช้แสดงสถานะ) กับ loans ตรงกันเสมอ
  await admUpdateStatus(profile.user_id, 'closed');
