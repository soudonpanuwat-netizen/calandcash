  toast('ปิดสินเชื่อแล้ว ✓', '#1A5C35');
};

// ── ตั้งยอดที่ต้องคืน/วันครบกำหนด/จำนวนงวด+ยอดต่องวด/ส่งข้อความฝ่ายเดียวถึงผู้ใช้ ──
// (ยอดเงินทุกช่องกรอกเองโดยแอดมินทุกครั้ง ไม่มีการคำนวณดอกเบี้ยอัตโนมัติในระบบ)
const manageLoan = async (profile) => {
  const key = profile.nickname || profile.email;
  const loan = loans.find(l => l.userId === key);
  if (!loan) { toast('ไม่พบข้อมูลสินเชื่อของสมาชิกคนนี้','#A83240'); return; }

  const baseAmount = loan.amount || 0;
  const rate = loan.interestRate || 0;
  let suggestedTotal = baseAmount;
  
  if (rate > 0) {
    // คำนวณดอกเบี้ยเบื้องต้น (ตัวอย่าง: ดอกเบี้ยรายปีหาร 12 สำหรับ 1 เดือน)
    const yearlyInterest = (baseAmount * rate) / 100;
    const monthlyInterest = yearlyInterest / 12;
    suggestedTotal = Math.ceil(baseAmount + monthlyInterest);
  }

  const totalDueInput = await ask(
    `ยอดที่ต้องคืนทั้งหมด (บาท)\n[เงินต้น ฿${fmt(baseAmount)} + ดอกเบี้ย ${rate}% ต่อปี]\n(คำนวณรายเดือนเบื้องต้น: ฿${fmt(suggestedTotal)})`,
    String(loan.totalDue || suggestedTotal || baseAmount || '')
  );
  if (totalDueInput == null) return;
  const totalDue = +totalDueInput;
  if (!totalDue || totalDue <= 0) { toast('กรุณากรอกยอดเงินให้ถูกต้อง','#A83240'); return; }

  const installmentsInput = await ask('ผ่อนกี่งวด (เว้นว่างไว้ถ้าจ่ายครั้งเดียว):', loan.installments ? String(loan.installments) : '');
  if (installmentsInput == null) return;
  const installments = (+installmentsInput > 0) ? Math.round(+installmentsInput) : null;

  let installmentAmount = null;
  if (installments) {
    const suggested = Math.ceil(totalDue / installments);
    const installmentAmountInput = await ask('กี่บาทต่องวด (กรอกเองได้ ไม่บังคับหารเท่ากันทุกงวด):', String(loan.installmentAmount || suggested));
    if (installmentAmountInput == null) return;
    installmentAmount = +installmentAmountInput || suggested;
  }

  const dueDateInput = await ask('วันที่ต้องคืนเงิน/งวดแรก (เช่น 30/06/2569):', loan.dueDate || '');
  if (dueDateInput == null) return;

  const messageInput = await ask('ส่งข้อความถึงผู้ใช้ (เว้นว่างไว้ได้ถ้าไม่ต้องการส่ง):', '');

  const up = loans.map(l => {
    if (l.userId !== key) return l;
    const messages = (messageInput && messageInput.trim())
      ? [...(l.messages || []), { text: messageInput.trim(), at: todayTH() }]
      : (l.messages || []);
    return { ...l, totalDue, dueDate: dueDateInput.trim(), installments, installmentAmount, messages };
  });
  setLoans(up); db.set({ loans: up });
  toast('บันทึกข้อมูลสินเชื่อแล้ว ✓', '#1C3D5A');
};

    <div className="space-y-4">
      {/* Load button */}
      {!admLoaded && (
        <div style={{ textAlign:'center',padding:'24px 0' }}>
          <button onClick={loadMembers}
            style={{ padding:'14px 28px',borderRadius:16,fontWeight:800,fontSize:14,
              background:'linear-gradient(145deg,#2B5278,#1C3D5A)',
              boxShadow:'var(--shadow-btn)',color:'#fff',border:'none',cursor:'pointer' }}>
            🌐 โหลดข้อมูลสมาชิกจาก Supabase
          </button>
        </div>
      )}

      {admLoading && (
        <Card className="p-8" style={{ textAlign:'center' }}>
          <p style={{ fontSize:14,color:'var(--clay-sub)' }}>📊 กำลังโหลดข้อมูล...</p>
        </Card>
      )}

        const total    = admProfiles.length;
        const invited  = admProfiles.filter(p=>p.loan_status==='invited').length;
        const pending  = admProfiles.filter(p=>p.loan_status==='pending').length;
        const approved = admProfiles.filter(p=>p.loan_status==='approved').length;

        const filtered = admProfiles.filter(p=>{
          const matchSt = admFilter==='all' || p.loan_status===admFilter;
          const q = admSearch.toLowerCase();
          const matchSr = !q
            || (p.nickname||'').toLowerCase().includes(q)
            || (p.email||'').toLowerCase().includes(q);
          return matchSt && matchSr;
        });

        const badgeMap = {
          none:    <span className="adm-badge adm-badge-none">—</span>,
          invited: <span className="adm-badge adm-badge-invited">📨 เชิญแล้ว</span>,
          pending: <span className="adm-badge adm-badge-pending">⏳ รอพิจารณา</span>,
          approved:<span className="adm-badge adm-badge-approved">✅ อนุมัติ</span>,
          rejected:<span className="adm-badge adm-badge-rejected">❌ ปฏิเสธ</span>,
          closed:  <span className="adm-badge adm-badge-rejected">🔒 ปิดแล้ว</span>,
        };

        return (
          <>
            {previewSlip && (
              <div onClick={()=>setPreviewSlip(null)}
                style={{ position:'fixed', inset:0, zIndex:9999, background:'rgba(0,0,0,0.88)',
                  display:'flex', alignItems:'center', justifyContent:'center', padding:20 }}>
                <img src={previewSlip} alt="สลิป" style={{ maxWidth:'100%', maxHeight:'85%', borderRadius:12, objectFit:'contain' }}/>
                <button onClick={()=>setPreviewSlip(null)}
                  style={{ position:'absolute', top:20, right:20, width:40, height:40, borderRadius:'50%',
                    background:'rgba(255,255,255,0.15)', border:'none', color:'#fff', fontSize:20, cursor:'pointer' }}>
                  ✕
                </button>
              </div>
            )}
            {/* Stats */}
            <div className="adm-stat-grid">
              {[['สมาชิกทั้งหมด',total,'#1C3D5A','👥'],
                ['เชิญแล้ว',invited,'#2B5278','📨'],
                ['รออนุมัติ',pending,'#C4622D','⏳'],
                ['อนุมัติแล้ว',approved,'#1A5C35','✅']].map(([l,v,c,ic])=>(
                <div key={l} className="adm-stat-card">
                  <div style={{ fontSize:18,marginBottom:3 }}>{ic}</div>
                  <div className="adm-stat-val" style={{ color:c }}>{v}</div>
                  <div className="adm-stat-lbl">{l}</div>
                </div>
              ))}
            </div>

            {/* Search + Filter + Reload */}
            <Card className="p-4">
              <div className="adm-search">
                <input className="clay-input" style={{ flex:1,padding:'8px 12px',fontSize:12 }}
                  placeholder="🔍 ค้นหาชื่อ / อีเมล..."
                  value={admSearch} onChange={e=>setAdmSearch(e.target.value)}/>
                <button onClick={loadMembers}
                  style={{ padding:'8px 14px',borderRadius:12,fontSize:12,fontWeight:800,
                    background:'linear-gradient(145deg,#2B5278,#1C3D5A)',
                    boxShadow:'var(--shadow-btn)',color:'#fff',border:'none',cursor:'pointer' }}>
                  🔄
                </button>
              </div>
              <div className="adm-filter-row">
                {[['all','ทั้งหมด'],['none','ยังไม่เชิญ'],['invited','เชิญแล้ว'],
                  ['pending','รอพิจารณา'],['approved','อนุมัติ'],['rejected','ปฏิเสธ']].map(([v,l])=>(
                  <button key={v}
                    className={'adm-filter'+(admFilter===v?' act':'')}
                    onClick={()=>setAdmFilter(v)}>{l}
                  </button>
                ))}
              </div>
            </Card>

            {/* Table */}
            <Card className="p-4">
              <div style={{ fontSize:13,fontWeight:900,color:'#1C2C3A',marginBottom:12,
                display:'flex',alignItems:'center',gap:8 }}>
                <span>📋</span> รายชื่อสมาชิก
                <span style={{ fontSize:11,color:'var(--clay-sub)',fontWeight:600 }}>
                  ({filtered.length} รายการ)
                </span>
              </div>
              {filtered.length===0
                ? <div style={{ textAlign:'center',padding:'24px',color:'var(--clay-sub)' }}>
                    🔍 ไม่พบข้อมูล
                  </div>
                : <div className="adm-table-wrap">
                    <table className="adm-table">
                      <thead><tr>
                        <th>ชื่อเล่น / อีเมล</th>
                        <th>สถานะสินเชื่อ</th>
                        <th>วันที่สมัคร</th>
                        <th>สุขภาพ</th>
                        <th>จัดการ</th>
                      </tr></thead>
                      <tbody>
                        {filtered.map(p=>{
                          const ls = p.loan_status || 'none';
                          const date = p.created_at
                            ? new Date(p.created_at).toLocaleDateString('th-TH',
                                {day:'2-digit',month:'short',year:'2-digit'})
                            : '—';
                          const health = [
                            p.height?`${p.height}cm`:'',
                            p.weight?`${p.weight}kg`:'',
                            p.age?`${p.age}ปี`:'',
                          ].filter(Boolean).join(' · ') || '—';

                          const loanRec = loans.find(l=>l.userId===(p.nickname||p.email));

                          return (
                            <React.Fragment key={p.user_id}>
                            <tr>
                              <td>
                                <div style={{ fontWeight:800,fontSize:12 }}>
                                  {p.nickname||'(ยังไม่ระบุ)'}
                                </div>
                                <div style={{ fontSize:10,color:'var(--clay-sub)',marginTop:1 }}>
                                  {p.email||'—'}
                                </div>
                              </td>
                              <td>
                                {badgeMap[ls]||badgeMap.none}
                                {ls==='pending' && loanRec && (
                                  <div style={{ marginTop:4 }}>
                                    <p style={{ fontSize:12, fontWeight:900, color:'#C4622D', margin:0 }}>
                                      ขอ ฿{fmt(loanRec.amount)}
                                    </p>
                                    {loanRec.reason && (
                                      <p style={{ fontSize:10, color:'var(--clay-sub)', margin:'2px 0 0' }}>
                                        {loanRec.reason}
                                      </p>
                                    )}
                                    {loanRec.docRequest?.status === 'pending' && (
                                      <p style={{ fontSize:10, color:'#C4622D', margin:'4px 0 0', fontWeight:700 }}>
                                        ⏳ รอผู้สมัครกรอกข้อมูลเพิ่ม
                                      </p>
                                    )}
                                    {loanRec.docRequest?.status === 'submitted' && loanRec.extraInfo && (
                                      <div style={{ marginTop:6, background:'#F8FAFB', borderRadius:8, padding:8 }}>
                                        <p style={{ fontSize:10, fontWeight:800, color:'#6B7E8D', margin:'0 0 3px' }}>📝 ข้อมูลเพิ่มเติม</p>
                                        {Object.entries(loanRec.extraInfo).map(([k,v])=>v && (
                                          <p key={k} style={{ fontSize:10, color:'#374151', margin:'1px 0' }}>{k}: {v}</p>
                                        ))}
                                      </div>
                                    )}
                                  </div>
                                )}
                                {ls==='approved' && loanRec && (() => {
                                  const confirmedPaid = (loanRec.payments||[]).filter(pm=>pm.status==='confirmed').reduce((s,pm)=>s+(+pm.amount||0),0);
                                  const baseAmount = loanRec.amount || 0;
                                  const compareAmount = loanRec.totalDue || baseAmount;
                                  const markup = baseAmount>0 ? Math.round(((compareAmount-baseAmount)/baseAmount)*1000)/10 : 0;
                                  return (
                                    <div style={{ marginTop:4 }}>
                                      <p style={{ fontSize:10, color:'var(--clay-sub)', margin:0 }}>
                                        วงเงิน ฿{fmt(loanRec.creditLimit||loanRec.amount)}
                                        {loanRec.outstandingBalance ? ` · คงค้าง ฿${fmt(loanRec.outstandingBalance)}` : ''}
                                        {loanRec.interestRate ? ` · ดอกเบี้ย ${loanRec.interestRate}%/ปี` : ''}
                                      </p>
                                      {confirmedPaid > 0 && (
                                        <p style={{ fontSize:10, color:'#1A5C35', margin:'2px 0 0', fontWeight:700 }}>
                                          คืนแล้ว ฿{fmt(confirmedPaid)}
                                          {loanRec.totalDue ? ` จาก ฿${fmt(loanRec.totalDue)} (เหลือ ฿${fmt(Math.max(0,loanRec.totalDue-confirmedPaid))})` : ''}
                                        </p>
                                      )}
                                      {loanRec.totalDue && markup !== 0 && (
                                        <p style={{ fontSize:10, color:'#C4622D', margin:'2px 0 0' }}>
                                          ส่วนต่างจากยอดอนุมัติเดิม: {markup>0?'+':''}{markup}%
                                        </p>
                                      )}
                                    </div>
                                  );
                                })()}
                              </td>
                              <td style={{ fontSize:10,color:'var(--clay-sub)' }}>{date}</td>
                              <td style={{ fontSize:10,color:'var(--clay-sub)' }}>{health}</td>
                              <td>
                                <button onClick={()=>{
                                    const opening = !expandedActions[p.user_id];
                                    setExpandedActions(prev=>({...prev,[p.user_id]:opening}));
                                    if (opening && ls!=='none') loadMemberFinance(p.user_id);
                                  }}
                                  style={{ padding:'10px 16px', borderRadius:12, fontSize:12, fontWeight:800,
                                    background:'linear-gradient(145deg,#3B6E96,#2B5278)', color:'#fff', border:'none', cursor:'pointer' }}>
                                  📂 จัดการ {expandedActions[p.user_id] ? '▲' : '▼'}
                                </button>
                              </td>
                            </tr>
                            {expandedActions[p.user_id] && (
                              <tr>
                                <td colSpan={5} style={{ background:'#F4F8FB', padding:14 }}>
                                  <p style={{ fontSize:11, fontWeight:800, color:'#3B6E96', margin:'0 0 10px' }}>
                                    📂 จัดการสมาชิกคนนี้
                                  </p>

                                  <div style={{ background:'#fff', borderRadius:12, padding:10, marginBottom:10 }}>
                                    <p style={{ fontSize:10, fontWeight:700, color:'#94A3B8', margin:'0 0 4px' }}>🏃 ข้อมูลสุขภาพ</p>
                                    <p style={{ fontSize:12, color:'#1C2C3A', margin:0 }}>{health}</p>
                                  </div>

                                  {ls!=='none' && (() => {
                                    const fin = financeData[p.user_id];
                                    return (
                                      <div style={{ background:'#EAF7F5', borderRadius:12, padding:10, marginBottom:10 }}>
                                        <p style={{ fontSize:10, fontWeight:700, color:'#0B6F65', margin:'0 0 6px' }}>💰 สรุปการเงิน (90 วันล่าสุด)</p>
                                        {!fin ? (
                                          <p style={{ fontSize:11, color:'#94A3B8', margin:0 }}>กำลังโหลด...</p>
                                        ) : fin.error ? (
                                          <p style={{ fontSize:11, color:'#A83240', margin:0 }}>โหลดข้อมูลไม่สำเร็จ</p>
                                        ) : fin.days === 0 ? (
                                          <p style={{ fontSize:11, color:'#94A3B8', margin:0 }}>ยังไม่มีข้อมูลการเงินบันทึกไว้</p>
                                        ) : (
                                          <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:6 }}>
                                            <div><p style={{ fontSize:9,color:'#94A3B8',margin:0 }}>รายรับ</p><p style={{ fontSize:12,fontWeight:900,color:'#1A5C35',margin:0 }}>฿{fmt(fin.totalIncome)}</p></div>
                                            <div><p style={{ fontSize:9,color:'#94A3B8',margin:0 }}>รายจ่าย</p><p style={{ fontSize:12,fontWeight:900,color:'#B94040',margin:0 }}>฿{fmt(fin.totalExpense)}</p></div>
                                            <div><p style={{ fontSize:9,color:'#94A3B8',margin:0 }}>เงินเก็บ</p><p style={{ fontSize:12,fontWeight:900,color: fin.net>=0?'#1A5C35':'#B94040',margin:0 }}>฿{fmt(fin.net)}</p></div>
                                          </div>
                                        )}
                                      </div>
                                    );
                                  })()}

                                  <div style={{ display:'grid', gridTemplateColumns:'repeat(2, 1fr)', gap:8 }}>
                                    {ls==='none' && (
                                      <button className="adm-btn adm-btn-invite" style={{ width:'100%' }}
                                        onClick={async ()=>{
                                          await admUpdateStatus(p.user_id,'invited');
                                          const key = p.nickname || p.email || p.user_id;
                                          setLoans(prev => {
                                            const up = prev.map(l => l.userId===key ? { ...l, notifiedStatus:null } : l);
                                            db.set({ loans: up });
                                            return up;
                                          });
                                          sendPushNotification(key, '🎊 ได้รับสิทธิ์สมัครสินเชื่อแล้ว!', 'เปิดแอปเพื่อกรอกคำขอเบิกเงินเดือนล่วงหน้าได้เลยค่ะ', '/');
                                        }}>
                                        📨 เชิญ
                                      </button>
                                    )}
                                    {ls==='none' && (
                                      <button className="adm-btn" style={{ width:'100%', background:'linear-gradient(145deg,#3B82C4,#2B5278)',color:'#fff',border:'none' }}
                                        onClick={()=>inviteByEmail(p)}>
                                        ✉️ เชิญ+อีเมล
                                      </button>
                                    )}
                                    {ls==='none' && (
                                      <button className="adm-btn" style={{ width:'100%', background:'linear-gradient(145deg,#2E7D4E,#1A5C35)',color:'#fff',border:'none' }}
                                        onClick={()=>grantDirectly(p)}>
                                        🎁 ให้เลย (ไม่ต้องสมัคร)
                                      </button>
                                    )}
                                    {(ls==='invited'||ls==='pending') && (
                                      <button className="adm-btn adm-btn-approve" style={{ width:'100%' }}
                                        onClick={async ()=>{
                                          const amt = await ask('ระบุจำนวนเงินที่อนุมัติ (บาท):', String(loans.find(l=>l.userId===(p.nickname||p.email))?.amount||'3000'));
                                          if (amt==null) return;
                                          if (!(+amt>0)) { toast('กรุณากรอกจำนวนเงินให้ถูกต้อง','#A83240'); return; }
                                          await admUpdateStatus(p.user_id,'approved',+amt);
                                          const key = p.nickname || p.email || p.user_id;
                                          setLoans(prev => {
                                            const up = prev.map(l => l.userId===key ? { ...l, notifiedStatus:null } : l);
                                            db.set({ loans: up });
                                            return up;
                                          });
                                          sendPushNotification(key, '🎉 คำขอสินเชื่อได้รับการอนุมัติแล้ว!', `คุณได้รับวงเงิน ฿${fmt(+amt)} เปิดแอปเพื่อยืนยันรับสิทธิ์ค่ะ`, '/');
                                        }}>
                                        ✓ อนุมัติ
                                      </button>
                                    )}
                                    {ls==='pending' && (
                                      <button className="adm-btn" style={{ width:'100%', background:'linear-gradient(145deg,#6B7E8D,#3F4E5A)',color:'#fff',border:'none' }}
                                        onClick={()=>requestMoreInfo(p)}>
                                        📝 ขอข้อมูลเพิ่มเติม
                                      </button>
                                    )}
                                    {(ls==='invited'||ls==='pending'||ls==='approved') && (
                                      <button className="adm-btn adm-btn-reject" style={{ width:'100%' }}
                                        onClick={()=>admUpdateStatus(p.user_id,'rejected')}>
                                        ✕ ปฏิเสธ
                                      </button>
                                    )}
                                    {ls!=='none' && (
                                      <button className="adm-btn" style={{ width:'100%', background:'linear-gradient(145deg,#0F9B8E,#0B6F65)',color:'#fff',border:'none' }}
                                        onClick={()=>loadMemberFinance(p.user_id)}>
                                        💰 ดูข้อมูลการเงิน
                                      </button>
                                    )}
                                    {ls!=='none' && (
                                      <button className="adm-btn" style={{ width:'100%', background:'linear-gradient(145deg,#5B8DBF,#3B6E96)',color:'#fff',border:'none' }}
                                        onClick={()=>sendQuickMessage(p)}>
                                        💬 ส่งข้อความ
                                      </button>
                                    )}
                                    {ls==='approved' && (
                                      <button className="adm-btn" style={{ width:'100%', background:'linear-gradient(145deg,#7C5CBF,#5B3FA0)',color:'#fff',border:'none' }}
                                        onClick={()=>manageLoan(p)}>
                                        📋 จัดการ/ส่งข้อความ
                                      </button>
                                    )}
                                    {ls==='approved' && (
                                      <button className="adm-btn" style={{ width:'100%', background:'linear-gradient(145deg,#3B82C4,#2B5278)',color:'#fff',border:'none' }}
                                        onClick={()=>setCreditLimit(p)}>
                                        💳 ตั้ง/เพิ่มวงเงิน
                                      </button>
                                    )}
                                    {ls==='approved' && (
                                      <button className="adm-btn" style={{ width:'100%', background:'linear-gradient(145deg,#F59E0B,#D97706)',color:'#fff',border:'none' }}
                                        onClick={()=>setInterestRate(p)}>
                                        📈 ตั้งดอกเบี้ย (%/ปี)
                                      </button>
                                    )}
                                    {ls==='approved' && (
                                      <button className="adm-btn" style={{ width:'100%', background:'linear-gradient(145deg,#6B2030,#A83240)',color:'#fff',border:'none' }}
                                        onClick={()=>closeLoanForMember(p)}>
                                        🔒 ปิดสินเชื่อ
                                      </button>
                                    )}
                                    {ls==='approved' && (() => {
                                      const loanRec = loans.find(l=>l.userId===(p.nickname||p.email));
                                      const pendingDraws = (loanRec?.drawRequests||[]).filter(d=>d.status==='pending');
                                      if (pendingDraws.length === 0) return null;
                                      return (
                                        <button className="adm-btn" style={{ width:'100%', background:'linear-gradient(145deg,#E0A52E,#C4622D)', color:'#fff', border:'none' }}
                                          onClick={()=>setExpandedDraws(prev=>({...prev,[p.user_id]:!prev[p.user_id]}))}>
                                          📨 คำขอเบิก ({pendingDraws.length})
                                        </button>
                                      );
                                    })()}
                                    {ls==='approved' && (() => {
                                      const loanRec = loans.find(l=>l.userId===(p.nickname||p.email));
                                      const pendingCount = (loanRec?.payments||[]).filter(pm=>pm.status==='claimed').length;
                                      const totalCount = (loanRec?.payments||[]).length;
                                      if (totalCount === 0) return null;
                                      return (
                                        <button className="adm-btn" style={{ width:'100%',
                                          background: pendingCount>0 ? 'linear-gradient(145deg,#E0A52E,#C4622D)' : 'var(--clay-inset)',
                                          color: pendingCount>0 ? '#fff' : 'var(--clay-sub)', border:'none' }}
                                          onClick={()=>setExpandedSlips(prev=>({...prev,[p.user_id]:!prev[p.user_id]}))}>
                                          🧾 สลิป ({totalCount}){pendingCount>0?` · รอยืนยัน ${pendingCount}`:''}
                                        </button>
                                      );
                                    })()}
                                    {ls!=='none' && (
                                      <button className="adm-btn" style={{ width:'100%', background:'var(--clay-inset)', color:'var(--clay-sub)',
                                        border:'1px solid var(--clay-border)', boxShadow:'var(--shadow-in)' }}
                                        onClick={()=>admUpdateStatus(p.user_id,'none')}>
                                        ↺ รีเซ็ตสถานะ
                                      </button>
                                    )}
                                  </div>
                                </td>
                              </tr>
                            )}
                            {expandedSlips[p.user_id] && (() => {
                              const key = p.nickname || p.email;
                              const loanRec = loans.find(l=>l.userId===key);
                              const payments = loanRec?.payments || [];
                              const confirmPayment = async (paymentId) => {
                                const pm = payments.find(x=>x.id===paymentId);
                                let outstandingBalance = loanRec?.outstandingBalance;
                                if (typeof outstandingBalance === 'number') {
                                  const suggested = Math.max(0, outstandingBalance - (+(pm?.amount)||0));
                                  const input = await ask(
                                    'ยอดคงค้างใหม่หลังหักดอกเบี้ย/ตามที่ตกลงกันไว้ (บาท):',
                                    String(suggested)
                                  );
                                  if (input == null) return;
                                  outstandingBalance = Math.max(0, +input || 0);
                                }
                                const up = loans.map(l => l.userId!==key ? l : {
                                  ...l,
                                  outstandingBalance: typeof outstandingBalance === 'number' ? outstandingBalance : l.outstandingBalance,
                                  payments: (l.payments||[]).map(x => x.id===paymentId ? { ...x, status:'confirmed', confirmedAt: todayTH() } : x),
                                });
                                setLoans(up); db.set({ loans: up });
                                toast('ยืนยันรับเงินงวดนี้แล้ว ✓','#1A5C35');
                              };
                              const confirmedTotal = payments.filter(pm=>pm.status==='confirmed').reduce((s,pm)=>s+(+pm.amount||0),0);
                              return (
                                <tr>
                                  <td colSpan={5} style={{ background:'var(--clay-inset)', padding:14 }}>
                                    {loanRec?.totalDue && (
                                      <p style={{ fontSize:11, fontWeight:700, color:'#6B7E8D', margin:'0 0 10px' }}>
                                        ชำระแล้ว (ยืนยัน) ฿{fmt(confirmedTotal)} จากทั้งหมด ฿{fmt(loanRec.totalDue)}
                                      </p>
                                    )}
                                    <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                                      {payments.map(pm => (
                                        <div key={pm.id} style={{ display:'flex', alignItems:'center', gap:10,
                                          background:'#fff', borderRadius:12, padding:10, border:'1px solid var(--clay-border)' }}>
                                          {pm.slip
                                            ? <img src={pm.slip} alt="slip" style={{ width:56, height:56, borderRadius:8, objectFit:'cover', flexShrink:0, cursor:'pointer' }}
                                                onClick={()=>setPreviewSlip(pm.slip)}/>
                                            : <div style={{ width:56, height:56, borderRadius:8, background:'#F1F5F9', flexShrink:0,
                                                display:'flex', alignItems:'center', justifyContent:'center', fontSize:20 }}>🧾</div>}

function FirstSetup({ onDone }) { 
const [img,  setImg]  = useState(null); 
const [name, setName] = useState(''); 
const [ht,   setHt]   = useState(''); 
const [wt,   setWt]   = useState(''); 
const [age,  setAge]  = useState(''); 
const [sex,  setSex]  = useState('male'); 
const fileRef = useRef(null); 
const pickImg = async (e) => { 
const file = e.target.files[0]; 
if (!file) return; 
console.log('[ProfileImg] File selected:', file.name, file.type, file.size, 'bytes'); 
// 1. Preview locally first (fast) 
const reader = new FileReader(); 
reader.onloadend = () => setImg(reader.result); 
reader.readAsDataURL(file); 
// 2. Try upload to Supabase Storage (bucket: 'avatars') 
try { 
const session = await sbGetSession(); 
if (!session) { console.warn('[ProfileImg] Not logged in, skipping Supabase upload'); return; } 
const ext  = file.name.split('.').pop() || 'jpg'; 
const path = `${session.id}/avatar.${ext}`; 
console.log('[ProfileImg] Uploading to Supabase Storage path:', path); 
const { data, error } = await supabase.storage 
.from('avatars') 
.upload(path, file, { upsert: true, contentType: file.type }); 
if (error) { 
console.error('[ProfileImg] Upload error:', error.message, error); 
// Keep local base64 preview — user still sees their pic 
} else { 
console.log('[ProfileImg] Upload success:', data); 
const { data: urlData } = supabase.storage.from('avatars').getPublicUrl(path); 
const publicUrl = urlData?.publicUrl; 
console.log('[ProfileImg] Public URL:', publicUrl); 
if (publicUrl) setImg(publicUrl); // use CDN URL instead of base64 
} 
} catch(err) { 
console.error('[ProfileImg] Exception during upload:', err); 
} 
};

e.preventDefault();

function SummaryScreen({ txns, foods, user, ifHistory, exercises, weights, setWeights }) { 
const [period,     setPeriod]    = useState('daily'); 
const [histRows,   setHistRows]  = useState([]);   // renamed: no Supabase 
const [histLoading,setHistLoading] = useState(false); 
const [histLoaded, setHistLoaded]  = useState(false); 
const [pdfLoading, setPdfLoading]  = useState(null); 
const canExportPDF = true; // Testing mode — always enabled
const [showStatement, setShowStatement] = useState(false);
const [statDays,      setStatDays]      = useState(1); // 1, 3, 7

// ── Today data ── 
const todayStr  = new Date().toLocaleDateString('th-TH',{day:'2-digit',month:'2-digit',year:'numeric'}); 
const todayIsoSum = todayISO();
const todayTxns = txns.filter(t=>t.isoDate ? t.isoDate===todayIsoSum : isSameThaiDay(t.date));
const todayFoodsArr = foods.filter(f=>f.isoDate===todayIsoSum);
const todayIn   = todayTxns.filter(t=>t.type==='income').reduce((a,t)=>a+t.amount,0); 
const todayOut  = todayTxns.filter(t=>t.type==='expense').reduce((a,t)=>a+t.amount,0); 
const todayCal  = todayFoodsArr.reduce((a,f)=>a+f.cal,0); 
const todayBurned = (exercises||[]).filter(x=>x.isoDate===todayIsoSum).reduce((a,x)=>a+x.cal,0);
const targetCal = user.targetCal || 2000;

// ── Premium & rolling limit ── 
const [isPrem, setIsPrem] = useState(isPremium); 
const maxDays = isPrem ? 30 : 7;

// ── Load history (pure localStorage, zero network) ── 
const doLoadHistory = useCallback(() => { 
setHistLoading(true); 
try { 
const rows = loadHistory();  // getRollingLimit() inside 
setHistRows(rows); 
setHistLoaded(true); 
console.log('[SummaryScreen] Loaded', rows.length, '/', maxDays, 'days'); 
} catch(e) { 
console.error('[SummaryScreen]', e); 
} 
setHistLoading(false); 
}, [maxDays]);

// Auto-load on mount & whenever premium changes 
useEffect(() => { doLoadHistory(); }, [doLoadHistory]);

// ── helper: draw PDF header block ── 
const _pdfHeader = (doc, title, subtitle) => { 
// Navy header bar 
doc.setFillColor(28, 61, 90); 
doc.rect(0, 0, 210, 42, 'F'); 
// Accent stripe 
doc.setFillColor(43, 82, 120); 
doc.rect(0, 38, 210, 4, 'F'); 
// App name 
doc.setTextColor(255, 255, 255); 
doc.setFontSize(22); doc.setFont('helvetica', 'bold'); 
doc.text('Cal & Cash', 14, 18); 
// Subtitle 
doc.setFontSize(9); doc.setFont('helvetica', 'normal'); 
doc.text(title, 14, 27); 
doc.text(subtitle, 14, 34); 
// Generated timestamp (right-aligned) 
doc.text(`Generated: ${new Date().toLocaleString('th-TH')}`, 196, 34, { align:'right' }); 
};

// ── helper: draw account info box ── 
const _pdfAccountBox = (doc, y, name, email) => { 
doc.setFillColor(245, 247, 250); 
doc.roundedRect(14, y, 182, 22, 3, 3, 'F'); 
doc.setDrawColor(220, 225, 235); 
doc.roundedRect(14, y, 182, 22, 3, 3, 'S'); 
doc.setFontSize(8); doc.setFont('helvetica', 'normal'); 
doc.setTextColor(130, 140, 160); 
doc.text('ACCOUNT HOLDER', 18, y + 7); 
doc.setFontSize(11); doc.setFont('helvetica', 'bold'); 
doc.setTextColor(28, 44, 58); 
doc.text(name || '-', 18, y + 15); 
if (email) { 
doc.setFontSize(8); doc.setFont('helvetica', 'normal'); 
doc.setTextColor(100, 120, 140); 
doc.text(email, 18, y + 20); 
} 
return y + 28; 
};

// ── helper: draw section title ── 
const _pdfSection = (doc, y, title) => { 
doc.setFillColor(235, 240, 248); 
doc.rect(14, y, 182, 8, 'F'); 
doc.setFontSize(9); doc.setFont('helvetica', 'bold'); 
doc.setTextColor(28, 61, 90); 
doc.text(title, 17, y + 5.5); 
return y + 12; 
};

// ── helper: draw summary stat row ── 
const _pdfRow = (doc, y, label, value, isAlt, colorRGB) => { 
if (isAlt) { doc.setFillColor(250, 251, 253); doc.rect(14, y-5, 182, 10, 'F'); } 
doc.setFontSize(10); doc.setFont('helvetica', 'normal'); 
doc.setTextColor(80, 90, 100); 
doc.text(label, 17, y + 1); 
doc.setFont('helvetica', 'bold'); 
if (colorRGB) doc.setTextColor(...colorRGB); 
else doc.setTextColor(28, 44, 58); 
doc.text(value, 193, y + 1, { align: 'right' }); 
return y + 12; 
};

// ── helper: draw total bar ── 
const _pdfTotal = (doc, y, label, value, bgRGB, textRGB) => { 
doc.setFillColor(...bgRGB); 
doc.roundedRect(14, y, 182, 12, 2, 2, 'F'); 
doc.setFontSize(11); doc.setFont('helvetica', 'bold'); 
doc.setTextColor(...textRGB); 
doc.text(label, 17, y + 8); 
doc.text(value, 193, y + 8, { align: 'right' }); 
return y + 18; 
};

// ── helper: draw footer ── 
const _pdfFooter = (doc, y) => { 
doc.setDrawColor(210, 215, 225); 
doc.line(14, y, 196, y); 
doc.setFontSize(7.5); doc.setFont('helvetica', 'normal'); 
doc.setTextColor(160, 165, 175); 
doc.text('Cal & Cash v14.08.43  |  Auto-generated Statement  |  Not an official bank document', 105, y+6, { align:'center' }); 
doc.text(`Page generated on ${new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric'})}`, 105, y+11, { align:'center' }); 
};

// ── generate PDF for single day ── 
const generatePDF = async (row) => { 
if (!window.jspdf) { alert('PDF library not ready. Please wait a moment.'); return; } 
setPdfLoading(row.date); 
try { 
const { jsPDF } = window.jspdf; 
const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' }); 
const thDate = row.date || '-'; // use ISO date (YYYY-MM-DD) for PDF font compatibility

  _pdfHeader(doc, 'Daily Financial & Health Statement', `Date: ${thDate}`);

  let y = 50;
  y = _pdfAccountBox(doc, y, user.name, user.email || '');
  y += 4;
  y = _pdfSection(doc, y, 'FINANCIAL SUMMARY');

  const net = (row.income||0) - (row.expense||0);
  y = _pdfRow(doc, y, 'Income',      `THB ${(row.income||0).toLocaleString('th-TH')}`, false, [26,92,53]);
  y = _pdfRow(doc, y, 'Expense',   `THB ${(row.expense||0).toLocaleString('th-TH')}`, true,  [168,50,64]);
  y += 2;
  y = _pdfTotal(doc, y, 'Net Balance',
    `${net>=0?'+':''}฿ ${net.toLocaleString('th-TH')}`,
    net>=0 ? [232,245,238] : [245,235,235],
    net>=0 ? [26,92,53]    : [168,50,64]);

  y += 4;
  y = _pdfSection(doc, y, 'HEALTH SUMMARY');
  const netCalForPct = Math.max(0,(row.calories||0)-(row.burned||0));
  const calPct = Math.round(netCalForPct / (user.targetCal||2000) * 100);
  y = _pdfRow(doc, y, 'Calories Consumed',  `${(row.calories||0).toLocaleString('th-TH')} kcal`, false, [196,98,45]);
  if ((row.burned||0)>0) {
    y = _pdfRow(doc, y, 'Calories Burned (Exercise)', `-${(row.burned||0).toLocaleString('th-TH')} kcal`, true, [26,92,53]);
    y = _pdfRow(doc, y, 'Net Calories', `${netCalForPct.toLocaleString('th-TH')} kcal`, false, [28,44,58]);
  }
  y = _pdfRow(doc, y, 'Daily Target',    `${(user.targetCal||2000).toLocaleString('th-TH')} kcal`, true);
  y = _pdfRow(doc, y, '% of Target',   `${calPct}%`, false, calPct>100?[168,50,64]:[26,92,53]);

  // Progress bar visual
  doc.setFillColor(230, 235, 240);
  doc.roundedRect(17, y, 176, 5, 2, 2, 'F');
  const barW = Math.min(176, Math.round(176 * calPct / 100));
  const bColor = calPct > 100 ? [168,50,64] : [43,82,120];
  doc.setFillColor(...bColor);
  if (barW > 0) doc.roundedRect(17, y, barW, 5, 2, 2, 'F');
  y += 12;

  // ── Weight ──
  if (row.weight!=null) {
    y = _pdfRow(doc, y, 'Body Weight', `${row.weight} kg`, false, [74,127,165]);
  }

  // ── Exercise detail for this day ──
  const dayExRows = (exercises||[]).filter(x=>x.isoDate===row.date);
  if (dayExRows.length > 0) {
    if (y > 220) { doc.addPage(); y = 20; }
    y += 4;
    y = _pdfSection(doc, y, 'EXERCISE LOG');
    dayExRows.forEach((x,i)=>{
      y = _pdfRow(doc, y, x.name||'Exercise', `-${(x.cal||0).toLocaleString('th-TH')} kcal`, i%2===0, [26,92,53]);
    });
  }

  // ── IF History for this day ──
  const dayIFRows = (ifHistory||[]).filter(h=>{
    try { return new Date(h.startTs).toISOString().slice(0,10) === row.date; } catch(e){return false;}
  });
  if (dayIFRows.length > 0) {
    if (y > 220) { doc.addPage(); y = 20; }
    y += 4;
    y = _pdfSection(doc, y, 'INTERMITTENT FASTING');
    dayIFRows.forEach((h,i)=>{
      const startT = h.startTs ? new Date(h.startTs).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',hour12:false}) : '-';
      const endT   = h.endTs   ? new Date(h.endTs).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',hour12:false}) : '-';
      y = _pdfRow(doc,y,
        `IF ${h.fastH}:${h.feedH} · ${startT} → ${endT}`,
        h.status==='completed'?'Completed':'Cancelled',
        i%2===0,
        h.status==='completed'?[26,92,53]:[168,50,64]
      );
    });
  }
  _pdfFooter(doc, y + 10);
  doc.save(`CalCash_Daily_${row.date}.pdf`);
} catch(e) { console.error('[PDF]', e); alert('PDF Error: ' + e.message); }
setPdfLoading(null);

};

// ── generate full report PDF (all loaded rows) ──

  }

  y += 4;
  y = _pdfSection(doc, y, `DAILY BREAKDOWN  (${histRows.length} days)`);

  // Table header
  doc.setFillColor(28, 61, 90);
  doc.rect(14, y-2, 182, 9, 'F');
  doc.setFontSize(8); doc.setFont('helvetica', 'bold');
  doc.setTextColor(255,255,255);
  doc.text('Date',       17,  y+4);

  doc.text('Net',        148, y+4, { align:'right' });
  doc.text('Calories',   193, y+4, { align:'right' });

    doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);

              </div>

            {/* IF sessions */}
            {d.dayIF.length>0 && (
              <div style={{ borderTop:'1px solid #F1F5F9',paddingTop:10 }}>

                  textTransform:'uppercase',letterSpacing:1,margin:'0 0 6px' }}>⏱ IF Timer</p>
                {d.dayIF.map((h,i)=>{
                  const dur = h.endTs&&h.startTs
                    ? Math.round((new Date(h.endTs)-new Date(h.startTs))/3600000*10)/10 : null;
                  const ok = h.status==='completed';
                  return (
                    <div key={i} style={{ display:'flex',alignItems:'center',gap:8,
                      padding:'7px 10px',borderRadius:10,marginBottom:4,
                      background:ok?'#ECFDF5':'#FEF2F2' }}>
                      <span style={{ fontSize:14 }}>{ok?'✅':'❌'}</span>
                      <div style={{ flex:1 }}>
                        <p style={{ fontSize:11,fontWeight:700,

                        </p>
                        {dur && (
                          <p style={{ fontSize:10,color:'#6B7E8D',margin:'2px 0 0' }}>
                            อดจริง {dur} ชม.
                            {h.startTs&&` · เริ่ม ${new Date(h.startTs).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})}`}
                          </p>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {d.txnCount===0&&d.cal===0&&d.burned===0&&d.weight==null&&d.dayIF.length===0&&(
              <p style={{ fontSize:11,color:'#CBD5E1',textAlign:'center',
                margin:'4px 0 0',fontStyle:'italic' }}>ไม่มีข้อมูลวันนี้</p>
            )}
          </div>
        ))}

        <div style={{ textAlign:'center',padding:'8px 0 80px' }}>
          <p style={{ fontSize:10,color:'#94A3B8',margin:0 }}>
            Cal & Cash · สร้างเมื่อ {new Date().toLocaleString('th-TH')}
          </p>
        </div>
      </div>
    </div>
  );
})()}

</>
); 
}

const WO_PRESETS = [ 
{label:'วิ่ง 1 ชั่วโมง',cal:610},{label:'ว่ายน้ำ 1 ชั่วโมง',cal:500},

];

// ── Financial data ──

const totalOut  = txns.filter(t=>t.type==='expense').reduce((a,t)=>a+t.amount,0);

const saving    = Math.max(0, totalIn - totalOut);

const finPie = [ 
{name:'รายรับ',   value:totalIn,  color:'#10B981'}, 
{name:'รายจ่าย',  value:totalOut, color:'#B94040'},

].filter(d=>d.value>0);

// Monthly txn bar (last 6 months label) 
const monthlyMap = {}; 
txns.forEach(t=>{ 
const d = t.date || ''; 
// thai locale date — extract just a label key from id 
const key = t.id ? new Date(t.id).toLocaleDateString('th-TH',{month:'short',year:'2-digit'}) : '?';

// ── Debt data ──

pct:lTotal>0?Math.round(lPaid/lTotal*100):0 });

date: new Date(w.date+'T00:00').toLocaleDateString('th-TH',{day:'numeric',month:'short'}), 
เผาผลาญ: w.cal,

function AiBuddyPopup({ message, onClose }) { 
// ── FIX: use 3-phase state to control visibility cleanly ── 
// phase: 'enter' → 'show' → 'exit' → unmounted 
const [phase, setPhase] = useState('enter'); 
const onCloseRef = useRef(onClose); 
useEffect(() => { onCloseRef.current = onClose; }, [onClose]);

useEffect(() => { 
// Small delay so browser paints the element before animation starts 
const t1 = setTimeout(() => setPhase('show'), 30); 
// Auto-dismiss after 4.5s 
const t2 = setTimeout(() => { 
setPhase('exit'); 
setTimeout(() => onCloseRef.current(), 380); 
}, 4500); 
return () => { clearTimeout(t1); clearTimeout(t2); }; 
}, []); // ← empty deps: run once on mount only

const handleClose = () => { 
setPhase('exit'); 
setTimeout(() => onCloseRef.current(), 380); 
};

// Don't render at all during initial 'enter' phase until we flip to 'show' 
const animName = phase === 'show' ? 'buddyIn' : phase === 'exit' ? 'buddyOut' : 'buddyIn'; 
const opacity  = phase === 'enter' ? 0 : 1;

return ( 
<> 
<style>{`@keyframes buddyIn { 0%  { transform: translateX(-50%) scale(0.6) translateY(40px); opacity: 0; } 60% { transform: translateX(-50%) scale(1.06) translateY(-6px); opacity: 1; } 80% { transform: translateX(-50%) scale(0.97) translateY(2px); } 100%{ transform: translateX(-50%) scale(1) translateY(0); opacity: 1; } } @keyframes buddyOut { 0%  { transform: translateX(-50%) scale(1) translateY(0); opacity: 1; } 100%{ transform: translateX(-50%) scale(0.75) translateY(28px); opacity: 0; } } @keyframes buddyFloat { 0%,100%{ transform: translateY(0px); } 50%    { transform: translateY(-6px); } } @keyframes buddySparkle { 0%,100%{ opacity:1; transform:scale(1) rotate(0deg); } 50%    { opacity:0.6; transform:scale(1.3) rotate(20deg); } } @keyframes bellShake { 0%,100%{ transform:rotate(0deg); } 5%{ transform:rotate(14deg); } 10%{ transform:rotate(-12deg); } 15%{ transform:rotate(10deg); } 20%{ transform:rotate(-8deg); } 25%{ transform:rotate(4deg); } 30%,100%{ transform:rotate(0deg); } }`}</style>




















  {/* Backdrop — only interactive when showing */}
  {phase !== 'enter' && (
    <div onClick={handleClose} style={{
      position:'fixed', inset:0, zIndex:9990,
      background: phase==='show' ? 'rgba(0,0,0,0.18)' : 'rgba(0,0,0,0)',
      transition: 'background .3s',
      backdropFilter: phase==='show' ? 'blur(2px)' : 'none',
      WebkitBackdropFilter: phase==='show' ? 'blur(2px)' : 'none',
    }}/>
  )}

  {/* Popup card — positioned fixed, translateX in animation */}
  <div style={{
    position:'fixed', bottom:106, left:'50%', zIndex:9999,
    width:'calc(100% - 48px)', maxWidth:360,
    opacity,
    animation: `${animName} ${phase==='exit'?'.38s':'.45s'} cubic-bezier(.34,1.56,.64,1) forwards`,
    willChange:'transform, opacity',
    pointerEvents: phase==='enter' ? 'none' : 'auto',
  }}>
    <div style={{
      background:'linear-gradient(145deg,#FFFDF8,#F5EDE0)',
      borderRadius:28,
      boxShadow:'0 20px 60px rgba(28,61,90,0.25), 0 8px 24px rgba(168,50,64,0.15), inset 0 1px 2px rgba(255,255,255,0.9)',
      border:'2px solid rgba(255,255,255,0.9)',
      padding:'20px 20px 16px',
      position:'relative',
    }}>
      {/* Close button */}
      <button onClick={handleClose} style={{
        position:'absolute',top:12,right:12,
        width:28,height:28,borderRadius:10,
        background:'var(--clay-inset)',
        boxShadow:'var(--shadow-in)',
        border:'1px solid var(--clay-border)',
        cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',
        fontSize:14,color:'#8A9BA8',fontWeight:700,lineHeight:1,
      }}>✕</button>

      {/* Sparkle decorations */}
      {['✨','🌟','💫'].map((s,i)=>(
        <span key={i} style={{
          position:'absolute',
          top: i===0?8 : i===1?-4 : 12,
          left: i===0?14 : i===1?60 : -4,

// AI Smart Advisor: calls Claude API for context-aware messages 
async function getAIAdvice(type, context) { 
try { 
const prompts = { 
food: `อาหารที่เพิ่งบันทึก: ${context} วิเคราะห์แล้วให้คำแนะนำด้านโภชนาการ 1 ประโยค ภาษาไทย อบอุ่น เป็นโค้ชส่วนตัว ไม่เกิน 35 คำ เช่น "เมนูนี้แคลอรีสูงนิดนึงนะคะ แนะนำทานคู่ผักเพิ่มเติมจะดีมากเลย! 🥗"`, 
expense: `รายการที่บันทึก: ${context} วิเคราะห์แล้วให้คำแนะนำด้านการเงิน 1 ประโยค ภาษาไทย อบอุ่น เป็นที่ปรึกษาการเงินส่วนตัว ไม่เกิน 35 คำ เช่น "ใช้จ่ายในหมวดนี้สูงขึ้นนะคะ ลองวางแผนงบประมาณเพื่อความมั่นคงทางการเงินด้วยนะคะ! 💰"`, 
income: `รายรับที่บันทึก: ${context} ให้กำลังใจและแนะนำการออม 1 ประโยค ภาษาไทย อบอุ่น ไม่เกิน 30 คำ`, 
}; 
const prompt = prompts[type] || prompts.expense; 
const res = await fetch('https://api.anthropic.com/v1/messages', { 
method:'POST', 
headers:{'Content-Type':'application/json'}, 
body: JSON.stringify({ 
model:'claude-sonnet-4-6', max_tokens:100, 
messages:[{role:'user', content: prompt}] 
}) 
}); 
if (!res.ok) return null; 
const d = await res.json(); 
return d.content?.[0]?.text?.trim() || null; 
} catch(e) { return null; } 
}

      <Card className="p-5">
        <p style={{ fontSize:11, fontWeight:700, color:'#8A9BA8', textTransform:'uppercase', letterSpacing:1, margin:'0 0 10px' }}>
          ยอดคงค้างปัจจุบัน

        <p style={{ fontSize:32, fontWeight:900, color: outstanding>0?'#A83240':'#1A5C35', margin:0, letterSpacing:-1 }}>

            </p>

    channel = supabase
      .channel('loans-realtime')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'loans' }, () => {
        if (Date.now() - lastLocalLoanWriteRef.current < 400) return;
        sbLoadLoans().then(cloudLoans => {
          if (cloudLoans !== null) setLoans(cloudLoans);
        });
      })
      .subscribe((status, err) => {
        if (err) console.warn('[Realtime] subscribe error (ใช้ระบบรีเฟรชสำรองแทน):', err.message);
      });
  } catch (e) {
    console.warn('[Realtime] ไม่รองรับในสภาพแวดล้อมนี้ ใช้ระบบรีเฟรชสำรองทุก 1 วิแทน:', e.message);

  const t = setInterval(() => {
    if (Date.now() - lastLocalLoanWriteRef.current < 400) return;
    sbLoadLoans().then(cloudLoans => {
      if (cloudLoans !== null) {
        setLoans(prev => JSON.stringify(prev) === JSON.stringify(cloudLoans) ? prev : cloudLoans);
      }
    });
  }, 1000);
  return () => { clearInterval(t); try { if (channel) supabase.removeChannel(channel); } catch {} };
}, []);

    {tab==='health'   && <HealthScreen   exercises={exercises} setExercises={setExercises} weights={weights} setWeights={setWeights} toast={showToast}/>}
    {tab==='admin'    && isAdmin && <AdminPanelScreen loans={loans} setLoans={setLoans} toast={showToast} invitations={invitations} setInvitations={setInvitations}
      onLogout={async ()=>{
        try { await supabase.auth.signOut(); } catch {}
        setSbUser(null);
        setAuthenticated(false); setRole('user'); setTab('home'); clearSession();
      }}/>}
    {tab==='settings' && <SettingsScreen user={user} role={role} sbUser={sbUser} toast={showToast}
      onChangePin={()=>setShowChangePin(true)}
      onLogout={async ()=>{
        try { await supabase.auth.signOut(); } catch {}
        setSbUser(null);
        setAuthenticated(false); setRole('user'); setTab('home'); clearSession();
      }}/>}
  </div>
  </div>

  {(() => {
    const myApp = loans.find(l=>l.userId===user.name);
    if (!myApp) return null;

    // ── สถานะ "เชิญ" — popup เด้งบอกว่าได้รับสิทธิ์สมัครสินเชื่อแล้ว ──
    if (myApp.status === 'invited' && myApp.notifiedStatus !== 'invited') {
      return (
        <InvitedPopup
          onClose={()=>{
            const up = loans.map(l => l.id===myApp.id ? { ...l, notifiedStatus:'invited' } : l);
            setLoans(up); db.set({ loans: up });
            setTab('salaryAdvance');
          }}
        />
      );
    }

    // ── สถานะ "อนุมัติ" — popup เด้งยินดีด้วย ไม่ว่าจะมาจาก "ให้เลย" หรืออนุมัติคำขอ ──
    if (myApp.status === 'approved' && myApp.notifiedStatus !== 'approved') {
      return (
        <LoanGrantedPopup
          loan={myApp}
          onAccept={()=>{
            const up = loans.map(l => l.id===myApp.id ? { ...l, notifiedStatus:'approved' } : l);
            setLoans(up); db.set({ loans: up });
            setTab(myApp.card ? 'salaryAdvance' : 'cardSetup');
          }}
          onDecline={()=>{
            const up = loans.map(l => l.id===myApp.id ? { ...l, notifiedStatus:'rejected', status:'rejected' } : l);
            setLoans(up); db.set({ loans: up });
            showToast('ไม่รับวงเงินนี้แล้วค่ะ', '#8A9BA8');
          }}
        />
      );
    }

    return null;
  })()}

  <BottomNav tab={tab} setTab={setTab} isAdmin={isAdmin} darkMode={darkMode}/>
</div>

); 
}

//  
// ERROR BOUNDARY — prevents blank white screen on runtime errors 
//  
class ErrorBoundary extends React.Component { 
constructor(props) { super(props); this.state = { error: null }; } 
static getDerivedStateFromError(err) { return { error: err }; } 
render() { 
if (this.state.error) { 
return ( 
<div style={{ minHeight:'100vh', display:'flex', flexDirection:'column', 
alignItems:'center', justifyContent:'center', padding:24, 
background:'#0A0F1E', color:'#fff', fontFamily:'Inter,sans-serif' }}> 
<div style={{ fontSize:40, marginBottom:16 }}>⚠️</div> 
<h2 style={{ fontWeight:900, fontSize:20, margin:'0 0 8px' }}>เกิดข้อผิดพลาด</h2> 
<p style={{ color:'#94A3B8', fontSize:13, textAlign:'center', maxWidth:320 }}> 
{String(this.state.error.message)} 
</p> 
<button onClick={()=>this.setState({error:null})} 
style={{ marginTop:24, padding:'10px 24px', borderRadius:16, fontWeight:700, 
background:'#10B981', color:'#fff', border:'none', cursor:'pointer', fontSize:14 }}> 
ลองใหม่ 
</button> 
</div> 
); 
} 
return this.props.children; 
} 
}

const root = ReactDOM.createRoot(document.getElementById('root')); 
root.render( 
<ErrorBoundary> 
<CalCashSuperApp/> 
</ErrorBoundary> 
); 
</script>
</body>
</html>
