// อัปโหลดรูป (data: base64) ขึ้น Supabase Storage แล้วคืน URL สาธารณะ

async function uploadImageToStorage(dataUrl, prefix) {
  if (!dataUrl || !dataUrl.startsWith('data:')) return dataUrl || '';
  if (!sb) return dataUrl;
  try {
    const res = await fetch(dataUrl);
    const blob = await res.blob();
    const path = `${prefix}/${Date.now()}-${Math.random().toString(36).slice(2, 8)}.jpg`;
    const { error: uploadError } = await sb.storage.from(IMAGES_BUCKET).upload(path, blob, { contentType: 'image/jpeg', upsert: true });
    if (uploadError) { console.error('uploadImageToStorage failed:', uploadError); return dataUrl; }
    const { data } = sb.storage.from(IMAGES_BUCKET).getPublicUrl(path);
    return data.publicUrl;
  } catch (err) {
    console.error('uploadImageToStorage failed:', err);
    return dataUrl;
  }
}

// บันทึก "สินค้าทั้งหมด" ขึ้น Supabase: ลบแถวที่ไม่มีใน list ออก แล้ว upsert ของที่เหลือทั้งหมด
// (ทำแบบนี้เพื่อให้ข้อมูลในคลาวด์ตรงกับในเครื่องเสมอ ไม่ว่าจะเพิ่ม/แก้ไข/ลบ จากจุดไหนก็ตาม)
async function saveProducts(list) {
  if (!sb) return false;
  try {
    const ids = list.map((p) => p.id);
    if (ids.length > 0) {
      const { error: delError } = await sb.from(PRODUCTS_TABLE).delete().not('id', 'in', `(${ids.join(',')})`);
      if (delError) throw delError;
    } else {
      const { error: delAllError } = await sb.from(PRODUCTS_TABLE).delete().gte('id', 0);
      if (delAllError) throw delAllError;
    }
    if (list.length > 0) {
      const rows = list.map(productToRow);
      const { error: upsertError } = await sb.from(PRODUCTS_TABLE).upsert(rows, { onConflict: 'id' });
      if (upsertError) throw upsertError;
    }
    return true;
  } catch (err) {
    console.error('saveProducts (Supabase) failed:', err);
    return false;
  }
}

// ==================== Domain helpers ====================
function getStatus(expiryDateStr) {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const exp = new Date(expiryDateStr + 'T00:00:00');
  const diffDays = Math.ceil((exp - today) / 86400000);
  if (diffDays < 0) return 'expired';
  if (diffDays <= URGENT_WINDOW_DAYS) return 'urgent';
  return 'safe';
}
function daysUntil(expiryDateStr) {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const exp = new Date(expiryDateStr + 'T00:00:00');
  return Math.ceil((exp - today) / 86400000);
}
function withComputed(p) { return { ...p, status: getStatus(p.expiryDate), daysLeft: daysUntil(p.expiryDate) }; }
function formatThaiDate(dateStr) {
  return new Date(dateStr + 'T00:00:00').toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
}
function computeStats() {
  const counts = { expired: 0, urgent: 0, safe: 0 };
  products.filter((p) => !p.removed).forEach((p) => counts[getStatus(p.expiryDate)]++);
  return counts;
}

function detectBarcodeType(raw) {
  const code = (raw ?? '').trim();
  if (/^\d{13}$/.test(code)) return 'EAN-13';
  if (/^\d{12}$/.test(code)) return 'UPC-A';
  if (/^\d{8}$/.test(code)) return 'EAN-8';
  if (/^[A-Za-z0-9]{4,}$/.test(code) && /[A-Za-z]/.test(code)) return 'CODE128';
  if (code.length >= 4) return 'CUSTOM';
  return 'INVALID';
}
function isValidBarcode(code) { return detectBarcodeType(code) !== 'INVALID'; }

function escapeHtml(str) {
  return String(str ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

// บีบอัด/ย่อขนาดรูปก่อนแปลงเป็น base64 เพื่อไม่ให้ localStorage เต็มเร็วเกินไป
// (รูปถ่ายจากกล้องมือถือตรงๆ อาจมีขนาด 3-8MB ต่อรูป ถ้าไม่ย่อจะทำให้บันทึกข้อมูลไม่ได้)
function compressImageFile(file, maxDim = 1000, quality = 0.7) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          if (width >= height) { height = Math.round(height * (maxDim / width)); width = maxDim; }
          else { width = Math.round(width * (maxDim / height)); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        try { resolve(canvas.toDataURL('image/jpeg', quality)); }
        catch { resolve(String(reader.result)); }
      };
      img.onerror = () => resolve(String(reader.result));
      img.src = String(reader.result);
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function playBeep() {
  try {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    const ctx = new AudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 1046;
    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.25, ctx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.13);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 0.14);
    osc.onended = () => ctx.close();
  } catch { /* เบราว์เซอร์บล็อก autoplay เสียง - ไม่ต้องทำอะไร */ }
}

function freshnessRingSVG(daysLeft, status, size) {
  size = size || 64;
  const stroke = 6;
  const radius = (size - stroke) / 2;
  const circumference = 2 * Math.PI * radius;
  const ratio = status === 'expired' ? 0 : Math.min(Math.max(daysLeft, 0), 30) / 30;
  const dashOffset = circumference * (1 - ratio);
  const color = STATUS_COLOR[status];
  const c = size / 2;
  return `
    <div class="relative shrink-0" style="width:${size}px;height:${size}px;">
      <svg width="${size}" height="${size}" class="-rotate-90">
        <circle cx="${c}" cy="${c}" r="${radius}" stroke="#daeadd" stroke-width="${stroke}" fill="none" />
        <circle cx="${c}" cy="${c}" r="${radius}" stroke="${color}" stroke-width="${stroke}" fill="none"
          stroke-dasharray="${circumference}" stroke-dashoffset="${dashOffset}" stroke-linecap="round"
          style="transition: stroke-dashoffset .4s ease;" />
      </svg>
      <div class="absolute inset-0 flex flex-col items-center justify-center">
        <span class="text-xl font-extrabold leading-none" style="color:${color}">${status === 'expired' ? '!' : daysLeft}</span>
        ${status !== 'expired' ? '<span class="text-[10px] font-semibold text-stone-500">วัน</span>' : ''}
      </div>
    </div>`;
}

// ==================== Autocomplete ====================
function setupAutocomplete(inp, arr, onSelect) {
  let currentFocus;
  inp.addEventListener("input", function(e) {
      let a, b, i, val = this.value;
      closeAllLists();
      if (!val) { return false;}
      currentFocus = -1;
      a = document.getElementById("autocomplete-list");
      const uniqueArr = [...new Set(arr)];
      let count = 0;
      for (i = 0; i < uniqueArr.length; i++) {
        if (uniqueArr[i].toUpperCase().includes(val.toUpperCase())) {
          b = document.createElement("DIV");
          b.innerHTML = "<strong>" + uniqueArr[i].substr(0, val.length) + "</strong>";
          b.innerHTML += uniqueArr[i].substr(val.length);
          b.innerHTML += "<input type='hidden' value='" + uniqueArr[i] + "'>";
          b.addEventListener("click", function(e) {
              const selectedValue = this.getElementsByTagName("input")[0].value;
              inp.value = selectedValue;
              closeAllLists();
              if (typeof onSelect === 'function') onSelect(selectedValue);
          });
          a.appendChild(b);
          count++;
          if (count >= 5) break;
        }
      }
  });
  inp.addEventListener("keydown", function(e) {
      let x = document.getElementById("autocomplete-list");
      if (x) x = x.getElementsByTagName("div");
      if (e.keyCode == 40) {
        currentFocus++;
        addActive(x);
      } else if (e.keyCode == 38) {
        currentFocus--;
        addActive(x);
      } else if (e.keyCode == 13) {
        e.preventDefault();
        if (currentFocus > -1) {
          if (x) x[currentFocus].click();
        }
      }
  });
  function addActive(x) {
    if (!x) return false;
    removeActive(x);
    if (currentFocus >= x.length) currentFocus = 0;
    if (currentFocus < 0) currentFocus = (x.length - 1);
    x[currentFocus].classList.add("autocomplete-active");
  }
  function removeActive(x) {
    for (let i = 0; i < x.length; i++) {
      x[i].classList.remove("autocomplete-active");
    }
  }
  function closeAllLists(elmnt) {
    const x = document.getElementsByClassName("autocomplete-items");
    for (let i = 0; i < x.length; i++) {
      if (elmnt != x[i] && elmnt != inp) {
        x[i].innerHTML = '';
      }
    }
  }
  document.addEventListener("click", function (e) {
      closeAllLists(e.target);
  });
}

function initScanner() {
  document.getElementById('manual-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const code = document.getElementById('manual-input').value.trim();
    if (code) handleScanResult(code);
  });
  startScanner();
}

function handleScanImageFile(e) {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file) return;
  const resultEl = document.getElementById('scan-result');
  if (resultEl) {
    resultEl.innerHTML = `<div class="rounded-2xl bg-white p-4 text-center text-xs text-stone-400 shadow-card ring-1 ring-brand-100/60">กำลังอ่านบาร์โค้ดจากรูปภาพ...</div>`;
  }
  if (!window.Html5Qrcode) {
    if (resultEl) resultEl.innerHTML = `<p class="text-xs text-red-600">ไม่พบไลบรารีสแกน กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต</p>`;
    return;
  }
  const fileScanner = new Html5Qrcode('file-scan-temp');
  fileScanner
    .scanFile(file, false)
    .then((decodedText) => {
      playBeep();
      handleScanResult(decodedText);
      try { fileScanner.clear(); } catch {}
    })
    .catch(() => {
      if (resultEl) {
        resultEl.innerHTML = `
          <div class="rounded-2xl bg-white p-4 text-center shadow-card ring-1 ring-brand-100/60">
            <p class="text-xs text-red-600">ไม่พบบาร์โค้ดในรูปภาพนี้</p>
            <p class="mt-1 text-[11px] text-stone-400">ลองรูปอื่น หรือพิมพ์บาร์โค้ดด้วยตนเองด้านล่าง</p>
          </div>`;
      }
      try { fileScanner.clear(); } catch {}
    });
}

function startScanner() {
  if (!window.Html5Qrcode) {
    const statusEl = document.getElementById('camera-status');
    if (statusEl) statusEl.textContent = 'ไม่พบไลบรารีกล้อง (ต้องต่ออินเทอร์เน็ตเพื่อโหลด html5-qrcode)';
    return;
  }
  html5QrCode = new Html5Qrcode('qr-reader');
  html5QrCode
    .start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 250, height: 150 } },
      (decodedText) => { playBeep(); handleScanResult(decodedText); },
      () => { /* ไม่เจอบาร์โค้ดในเฟรมนี้ - ไม่ต้องทำอะไร */ },
    )
    .then(() => {
      const statusEl = document.getElementById('camera-status');
      if (statusEl) statusEl.remove();
      const frame = document.getElementById('camera-frame');
      if (frame) frame.classList.remove('hidden');
    })
    .catch((err) => {
      console.error(err);
      const statusEl = document.getElementById('camera-status');
      if (statusEl) {
        statusEl.innerHTML = `
          <div class="flex flex-col items-center gap-2 px-6 text-center">
            <span class="text-2xl">📵</span>
            <span>ไม่สามารถเข้าถึงกล้องได้ กรุณาอนุญาตการใช้กล้อง หรือกรอกบาร์โค้ดด้วยตนเองด้านล่าง<br><span class="text-[10px] text-white/50">(กล้องต้องเปิดผ่าน HTTPS หรือ localhost)</span></span>
          </div>`;
      }
    });
}

function stopScanner() {
  if (html5QrCode) {
    const instance = html5QrCode;
    html5QrCode = null;
    instance.stop().catch(() => {}).finally(() => { try { instance.clear(); } catch {} });
  }
}

function handleScanResult(code) {
  state.scanner.scannedCode = code;
  const product = products.map(withComputed).find((p) => p.barcode === code) || null;
  const type = detectBarcodeType(code);
  const resultEl = document.getElementById('scan-result');
  if (!resultEl) return;

  const notFoundAction = `<button onclick="openSubmissionModal()" class="flex w-full items-center justify-center gap-2 rounded-xl bg-sky-600 py-2.5 text-sm font-semibold text-white active:scale-95">📋 แจ้งเพิ่มสินค้าใหม่</button>`;

  const foundAction = `

      <div class="h-px bg-stone-100"></div>
      <p class="text-[10px] font-bold text-stone-400 uppercase tracking-wider">พบสินค้าในระบบแล้ว</p>

        🆕 เพิ่มวันหมดอายุรอบใหม่ (ล็อตใหม่)
      </button>

  resultEl.innerHTML = `
    <div class="space-y-3 rounded-2xl bg-white p-4 shadow-card ring-1 ring-brand-100/60">
      <div class="flex items-center justify-between">
        <p class="text-sm font-semibold text-stone-700">บาร์โค้ด: ${escapeHtml(code)}</p>

          ${notFoundAction}
        </div>`}
    </div>`;
}

             <p class="text-[10px] font-medium ${existingProduct ? 'text-amber-700' : 'text-sky-700'}">${existingProduct ? 'พบสินค้าในระบบ' : 'ไม่พบข้อมูลในระบบ'}</p>

              <div id="submission-expirydate-list" class="space-y-2">
                <div class="flex gap-2 submission-expirydate-row">
                  <input type="date" class="submission-expirydate-input flex-1 rounded-xl border border-stone-200 px-3 py-2.5 text-sm outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100" required />
                </div>
              </div>
              <button type="button" onclick="addSubmissionExpiryRow()" class="mt-2 text-xs font-bold text-brand-600 active:scale-95">+ เพิ่มวันหมดอายุอีกวัน (ล็อตเดียวกัน)</button>
            </div>

            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="mb-1.5 block text-[10px] font-bold uppercase tracking-wider text-stone-400">รูปสินค้า ${existingProduct && existingProduct.imageUrl ? '' : '*'}</label>
                <label class="relative flex flex-col items-center justify-center gap-1 rounded-2xl border-2 border-dashed ${existingProduct && existingProduct.imageUrl ? 'border-brand-200 bg-white' : 'border-brand-200 bg-brand-50/50'} py-6 text-brand-700 cursor-pointer active:bg-brand-100 transition-colors overflow-hidden">
                  <div id="submission-product-preview" class="text-center">
                    ${existingProduct && existingProduct.imageUrl ? `
                      <img src="${existingProduct.imageUrl}" class="h-24 w-full rounded-xl object-cover shadow-sm" />
                    ` : `
                      <span class="text-3xl">📦</span>
                      <span class="text-[10px] font-bold block mt-1 leading-tight">บังคับถ่าย<br>รูปสินค้า</span>
                    `}
                  </div>
                  <input id="submission-product-image" type="file" accept="image/*" capture="environment" class="hidden" />
                </label>
                ${existingProduct && existingProduct.imageUrl
                  ? `<p class="mt-1 text-center text-[10px] font-medium text-stone-400">ใช้รูปเดิมอัตโนมัติ<br/>(แตะรูปเพื่อถ่ายใหม่ ถ้าเปลี่ยนแพ็กเกจ)</p>`
                  : ''}
              </div>
              <div>
                <label class="mb-1.5 block text-[10px] font-bold uppercase tracking-wider text-stone-400">รูปวันหมดอายุ (ถ้ามี)</label>
                <label class="flex flex-col items-center justify-center gap-1 rounded-2xl border-2 border-dashed border-amber-200 bg-amber-50/50 py-6 text-amber-700 cursor-pointer active:bg-amber-100 transition-colors">
                  <div id="submission-expiry-preview" class="text-center">
                    <span class="text-3xl">📅</span>
                    <span class="text-[10px] font-bold block mt-1 leading-tight">ถ่ายเพิ่ม<br>(ทางเลือก)</span>
                  </div>
                  <input id="submission-expiry-image" type="file" accept="image/*" capture="environment" class="hidden" />
                </label>
              </div>
            </div>

            <p id="submission-error" class="hidden text-xs font-medium text-red-600"></p>

            <button type="submit" class="w-full rounded-2xl bg-brand-600 py-3.5 text-sm font-bold text-white shadow-lg active:scale-[0.98] transition-transform">

  const nameInput = document.getElementById('submission-name');

  // ถ้าสินค้านี้มีรูปอยู่แล้วในระบบ ใช้รูปเดิมไปก่อนเลย ไม่ต้องถ่ายซ้ำ
  // (ถ้าแพ็กเกจเปลี่ยน ผู้ใช้แตะรูปเพื่อถ่ายใหม่ทับได้ตามปกติ)
  let productImageData = (existingProduct && existingProduct.imageUrl) ? existingProduct.imageUrl : '';
  let expiryImageData = '';

  // กรณีไม่มีบาร์โค้ด (หรือพิมพ์ชื่อเอง): พอเลือกชื่อจากคำแนะนำ (autocomplete) ให้ดึงรูป + บาร์โค้ดเดิมของสินค้านั้นมาใส่ให้เลย
  // ผู้ใช้กรอกแค่วันหมดอายุใหม่ ไม่ต้องถ่ายรูปซ้ำหรือพิมพ์ชื่อใหม่
  setupAutocomplete(nameInput, products.map(p => p.name), (selectedName) => {
    const matched = products.find((p) => p.name === selectedName);
    if (!matched) return;
    if (matched.imageUrl) {
      productImageData = matched.imageUrl;
      const previewEl = document.getElementById('submission-product-preview');
      if (previewEl) previewEl.innerHTML = `<img src="${matched.imageUrl}" class="h-24 w-full rounded-xl object-cover shadow-sm" />`;
    }
    if (isManual) {
      const bcInput = document.getElementById('submission-barcode');
      if (bcInput && !bcInput.value && matched.barcode) bcInput.value = matched.barcode;
    }
  });

  window.addSubmissionExpiryRow = function () {
    const list = document.getElementById('submission-expirydate-list');
    const row = document.createElement('div');
    row.className = 'flex gap-2 submission-expirydate-row';
    row.innerHTML = `
      <input type="date" class="submission-expirydate-input flex-1 rounded-xl border border-stone-200 px-3 py-2.5 text-sm outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100" required />
      <button type="button" class="shrink-0 rounded-xl bg-red-50 px-3 text-red-600 active:scale-95" aria-label="ลบวันนี้">🗑️</button>
    `;
    row.querySelector('button').addEventListener('click', () => row.remove());
    list.appendChild(row);
  };

  document.getElementById('submission-product-image').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    document.getElementById('submission-product-preview').innerHTML = `<span class="text-xs text-stone-400">กำลังประมวลผลรูป...</span>`;
    compressImageFile(file).then((dataUrl) => {
      productImageData = dataUrl;
      document.getElementById('submission-product-preview').innerHTML = `<img src="${dataUrl}" class="h-24 w-full rounded-xl object-cover shadow-sm" />`;
    });
  });

  document.getElementById('submission-expiry-image').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    document.getElementById('submission-expiry-preview').innerHTML = `<span class="text-xs text-stone-400">กำลังประมวลผลรูป...</span>`;
    compressImageFile(file).then((dataUrl) => {
      expiryImageData = dataUrl;
      document.getElementById('submission-expiry-preview').innerHTML = `<img src="${dataUrl}" class="h-24 w-full rounded-xl object-cover shadow-sm" />`;
    });
  });

  document.getElementById('submission-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errEl = document.getElementById('submission-error');
    const name = nameInput.value.trim();
    const expiryDates = [...document.querySelectorAll('.submission-expirydate-input')]
      .map((inp) => inp.value)
      .filter((val) => val);
    const barcode = isManual ? document.getElementById('submission-barcode').value.trim() : prefillBarcode;

    if (!name || expiryDates.length === 0 || !productImageData) {
      errEl.textContent = 'กรุณากรอกชื่อสินค้า วันหมดอายุ (อย่างน้อย 1 วัน) และรูปสินค้าให้ครบถ้วน';
      errEl.classList.remove('hidden');
      return;
    }

    // กันส่งซ้ำเฉพาะกรณีบาร์โค้ด + วันหมดอายุตรงกันทุกตัว (ของล็อตเดียวกันที่ส่งซ้ำ)
    // ถ้าบาร์โค้ดเดียวกันแต่วันหมดอายุต่างกัน (ล็อตใหม่) จะส่งได้ตามปกติ
    const duplicateDates = [];
    const newSubmissions = [];

    // อัปโหลดรูปขึ้น Supabase Storage ก่อนบันทึก (ถ้าเป็นรูปที่ใช้ของเดิมอยู่แล้วจะไม่อัปโหลดซ้ำ)
    const uploadedProductImage = await uploadImageToStorage(productImageData, 'products');
    const uploadedExpiryPhoto = await uploadImageToStorage(expiryImageData, 'expiry-photos');

    expiryDates.forEach((expiryDate, idx) => {
      const isDuplicate = barcode && pendingSubmissions.some((p) => p.barcode === barcode && p.expiryDate === expiryDate);
      if (isDuplicate) {
        duplicateDates.push(expiryDate);
      } else {
        newSubmissions.push({
          id: Date.now() + idx,
          barcode,
          name,
          expiryDate,
          imageUrl: uploadedProductImage,
          expiryPhoto: uploadedExpiryPhoto,
          submittedAt: new Date().toISOString(),
          submittedBy: state.staffCode || '',
        });
      }
    });

    if (newSubmissions.length === 0) {
      errEl.textContent = 'วันหมดอายุที่ใส่มามีคำขอบาร์โค้ดนี้ซ้ำอยู่ระหว่างตรวจสอบแล้วทั้งหมด ไม่สามารถส่งซ้ำได้';
      errEl.classList.remove('hidden');
      return;
    }

    const updatedPending = [...pendingSubmissions, ...newSubmissions];
    const saved = await savePending(updatedPending);
    if (!saved) {
      errEl.textContent = 'บันทึกขึ้น Supabase ไม่สำเร็จ กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองส่งคำขอใหม่อีกครั้ง';
      errEl.classList.remove('hidden');
      return;
    }
    pendingSubmissions = updatedPending;
    closeModal();
    const skippedNote = duplicateDates.length > 0 ? ` (ข้าม ${duplicateDates.length} วันที่ซ้ำ)` : '';
    showToast(`✅ ส่งข้อมูลให้ AI ตรวจสอบแล้ว ${newSubmissions.length} รายการ${skippedNote}`);
    if (state.tab === 'scanner') {
      document.getElementById('scan-result').innerHTML = `<div class="rounded-2xl bg-brand-50 p-4 text-center text-xs font-bold text-brand-700 ring-1 ring-brand-200">✅ ส่งข้อมูลให้ AI ตรวจสอบแล้ว ${newSubmissions.length} รายการ${skippedNote}</div>`;
    }
  });
}

function viewPendingPhoto(id, which) {
  const item = pendingSubmissions.find((p) => p.id === id);
  if (!item) return;
  const src = which === 'product' ? item.imageUrl : item.expiryPhoto;
  if (!src) return;
  openModal(`
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/85 p-4" onclick="closeModal()">
      <img src="${src}" class="max-h-full max-w-full rounded-lg object-contain" />
      <button onclick="closeModal()" class="absolute right-4 top-4 flex h-9 w-9 items-center justify-center rounded-full bg-white/20 text-white">✕</button>
    </div>
  `);
}

async function approvePending(id) {
  const item = pendingSubmissions.find((p) => p.id === id);
  if (!item) return;

  const nameInput = document.getElementById(`pending-name-${id}`);
  const expiryInput = document.getElementById(`pending-expiry-${id}`);
  const barcodeInput = document.getElementById(`pending-barcode-${id}`);

  if (!nameInput || !expiryInput || !barcodeInput) {
    showAlertModal('ไม่พบข้อมูล กรุณาลองใหม่อีกครั้ง');
    return;
  }

  const name = nameInput.value.trim();
  const expiryDate = expiryInput.value;
  let barcode = barcodeInput.value.trim();

  if (!name || !expiryDate) {
    showAlertModal('กรุณากรอกชื่อและวันหมดอายุให้ครบถ้วน');
    return;
  }

  if (!barcode) barcode = `REQ${String(Date.now()).slice(-8)}`;

  // เก็บสำเนาไว้ก่อน เผื่อบันทึกไม่สำเร็จจะได้คืนค่าของเดิม ไม่เสียข้อมูล
  const productsSnapshot = products.slice();

  // หาสินค้าที่ "บาร์โค้ดตรงกัน + วันหมดอายุตรงกัน" เพื่ออัปเดตของเดิม
  // ถ้าบาร์โค้ดตรงกันแต่วันหมดอายุต่างกัน ถือเป็นล็อตใหม่ -> เพิ่มเป็นรายการใหม่แยกต่างหาก
  const existingIndex = products.findIndex((p) => p.barcode === barcode && p.expiryDate === expiryDate);

  if (existingIndex !== -1) {
    products[existingIndex] = {
      ...products[existingIndex],
      name,
      imageUrl: item.imageUrl || products[existingIndex].imageUrl,
      notes: 'อัปเดตข้อมูลโดย AI',
    };
  } else {
    const newId = products.length > 0 ? Math.max(...products.map((p) => p.id)) + 1 : 1;
    products.push({
      id: newId, barcode, name, category: '',
      imageUrl: item.imageUrl || '',
      expiryDate, notes: `เพิ่มข้อมูลโดย AI (อนุมัติโดย ${state.staffCode || '-'})`, addedDate: new Date().toISOString(),
      addedBy: item.submittedBy || state.staffCode || '',
    });
  }

  const saved = await saveProducts(products);
  if (!saved) {
    products = productsSnapshot; // คืนค่าของเดิม ไม่ให้ข้อมูลเพี้ยน
    showAlertModal('บันทึกขึ้น Supabase ไม่สำเร็จ\n\nวิธีแก้: ตรวจสอบอินเทอร์เน็ตแล้วลองอนุมัติใหม่อีกครั้ง ถ้ายังไม่ได้ให้กดปุ่ม "💾 สำรอง" เพื่อดาวน์โหลดข้อมูลทั้งหมดเก็บไว้ก่อนค่ะ');
    return;
  }

  pendingSubmissions = pendingSubmissions.filter((p) => p.id !== id);
  await savePending(pendingSubmissions);
  renderPage();
}

function rejectPending(id) {
  showConfirmModal('ต้องการปฏิเสธคำขอนี้ใช่หรือไม่?', async () => {
    pendingSubmissions = pendingSubmissions.filter((p) => p.id !== id);
    await savePending(pendingSubmissions);
    renderPage();
  }, { danger: true, confirmLabel: 'ปฏิเสธ' });
}

// ==================== Calendar ====================
function toDateKey(y, m, d) { return `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`; }

function calendarHTML() {
  return `
    <div class="space-y-4 pb-2">
      <header class="flex items-center gap-2">
        <span class="rounded-xl bg-gradient-to-br from-brand-600 to-brand-800 p-2 text-white text-lg shadow-sm ring-1 ring-white/10">🗓️</span>
        <div>
          <h1 class="text-lg font-bold text-stone-800">ปฏิทินวันหมดอายุ</h1>
          <p class="text-xs text-stone-400">แตะวันที่เพื่อดูสินค้า</p>
        </div>
      </header>
      <div class="rounded-2xl bg-white p-4 shadow-card ring-1 ring-brand-100/60" id="calendar-card">${calendarCardHTML()}</div>
      <div id="calendar-day-list">${calendarDayListHTML()}</div>
    </div>`;
}

function monthSummary(year, month) {
  const prefix = `${year}-${String(month).padStart(2, '0')}-`;
  const summary = {};
  products.filter((p) => !p.removed).forEach((p) => { if (p.expiryDate.startsWith(prefix)) summary[p.expiryDate] = { status: getStatus(p.expiryDate) }; });
  return summary;
}

function calendarCardHTML() {
  const { year, month } = state.cal;
  const firstDay = new Date(year, month - 1, 1).getDay();
  const daysInMonth = new Date(year, month, 0).getDate();
  const cells = Array.from({ length: firstDay }, () => null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);
  const today = new Date();
  const todayKey = toDateKey(today.getFullYear(), today.getMonth() + 1, today.getDate());
  const summary = monthSummary(year, month);
  const dotColor = { expired: 'bg-red-500', urgent: 'bg-amber-500', safe: 'bg-brand-500' };
  return `
    <div class="mb-3 flex items-center justify-between">
      <button onclick="goToMonth(-1)" class="rounded-full p-1.5 text-stone-400 active:bg-stone-100">‹</button>
      <p class="text-sm font-semibold text-stone-700">${MONTHS_TH[month - 1]} ${year + 543}</p>
      <button onclick="goToMonth(1)" class="rounded-full p-1.5 text-stone-400 active:bg-stone-100">›</button>
    </div>
    <div class="grid grid-cols-7 gap-1 text-center">
      ${WEEKDAYS_TH.map((wd) => `<span class="text-[11px] font-medium text-stone-400">${wd}</span>`).join('')}
      ${cells.map((day) => {
        if (day === null) return '<span></span>';
        const key = toDateKey(year, month, day);
        const info = summary[key];
        const isToday = key === todayKey;
        const isSelected = key === state.cal.selected;
        return `
          <button onclick="selectCalendarDay('${key}')" class="flex flex-col items-center gap-0.5 rounded-lg py-1.5 text-xs ${isSelected ? 'bg-brand-600 text-white' : isToday ? 'bg-brand-50 text-brand-700 font-semibold' : 'text-stone-600'}">
            ${day}
            <span class="h-1.5 w-1.5 rounded-full ${info ? (isSelected ? 'bg-white' : dotColor[info.status]) : 'bg-transparent'}"></span>
          </button>`;
      }).join('')}
    </div>`;
}

function calendarDayListHTML() {
  if (!state.cal.selected) return '';
  const list = products.map(withComputed).filter((p) => !p.removed && p.expiryDate === state.cal.selected).sort((a, b) => a.name.localeCompare(b.name));
  return `
    <div class="space-y-2.5 mt-4">
      <p class="text-xs font-medium text-stone-500">หมดอายุวันที่ ${state.cal.selected}</p>
      ${list.length === 0
        ? `<div class="rounded-2xl bg-white py-8 text-center shadow-card ring-1 ring-brand-100/60"><p class="text-sm text-stone-400">ไม่มีสินค้าหมดอายุ</p></div>`
        : list.map((p) => productCardHTML(p)).join('')}
    </div>`;
}

function goToMonth(delta) {
  let m = state.cal.month + delta, y = state.cal.year;
  if (m > 12) { m = 1; y++; } else if (m < 1) { m = 12; y--; }
  state.cal.month = m; state.cal.year = y; state.cal.selected = null;
  document.getElementById('calendar-card').innerHTML = calendarCardHTML();
  document.getElementById('calendar-day-list').innerHTML = calendarDayListHTML();
}
function selectCalendarDay(key) {
  state.cal.selected = key;
  document.getElementById('calendar-card').innerHTML = calendarCardHTML();
  document.getElementById('calendar-day-list').innerHTML = calendarDayListHTML();
}

          </div>

            <input id="cc-new-pin-confirm" type="password" maxlength="4" placeholder="••••" class="w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100" />

        </form>
      </div>
    </div>
  `);
  document.getElementById('change-creds-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errEl = document.getElementById('cc-error');
    const currentPin = document.getElementById('cc-current-pin').value.trim();
    const newId = document.getElementById('cc-new-id').value.trim();
    const newPin = document.getElementById('cc-new-pin').value.trim();
    const newPinConfirm = document.getElementById('cc-new-pin-confirm').value.trim();

    if (currentPin !== adminCreds.pin) {
      errEl.textContent = 'PIN ปัจจุบันไม่ถูกต้อง';
      errEl.classList.remove('hidden');
      return;
    }

      errEl.classList.remove('hidden');

    if (!/^\d{4}$/.test(newPin)) {

  });

    if (productId) {
      const expiryDate = document.getElementById('form-expiry').value;
      const idx = products.findIndex((p) => p.id === productId);
      if (idx !== -1) products[idx] = { ...products[idx], barcode, name, expiryDate, imageUrl };
    } else {
      const expiryDates = [...document.querySelectorAll('.form-expiry-input')]
        .map((inp) => inp.value)
        .filter((val) => val);
      if (expiryDates.length === 0) return;

      expiryDates.forEach((expiryDate) => {
        const existingIdx = products.findIndex((p) => p.barcode === barcode && p.expiryDate === expiryDate);
        if (existingIdx !== -1) {
          products[existingIdx] = { ...products[existingIdx], name, imageUrl: imageUrl || products[existingIdx].imageUrl };
        } else {
          const newId = products.length > 0 ? Math.max(...products.map((p) => p.id)) + 1 : 1;
          products.push({ id: newId, barcode, name, category: '', imageUrl, expiryDate, addedDate: new Date().toISOString(), addedBy: state.staffCode || '' });
        }
      });
    }
    if (await saveProductsOrWarn()) { closeModal(); renderPage(); }
  });
}

// ---- สแกนบาร์โค้ดในฟอร์มเพิ่ม/แก้ไขสินค้า (สำหรับแอดมินเพิ่มเองโดยตรง) ----
let formQrCode = null;
function toggleFormScanner() {
  const box = document.getElementById('form-scanner-box');
  if (!box) return;
  if (box.classList.contains('hidden')) {
    box.classList.remove('hidden');
    startFormScanner();
  } else {
    stopFormScanner();
    box.classList.add('hidden');
  }
}
function startFormScanner() {
  if (!window.Html5Qrcode) {
    const statusEl = document.getElementById('form-qr-status');
    if (statusEl) statusEl.textContent = 'ไม่พบไลบรารีกล้อง (ต้องต่ออินเทอร์เน็ตเพื่อโหลด html5-qrcode)';
    return;
  }
  formQrCode = new Html5Qrcode('form-qr-reader');
  formQrCode
    .start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 220, height: 130 } },
      (decodedText) => {
        playBeep();
        const barcodeInput = document.getElementById('form-barcode');
        if (barcodeInput) barcodeInput.value = decodedText;
        stopFormScanner();
        const box = document.getElementById('form-scanner-box');
        if (box) box.classList.add('hidden');
      },
      () => { /* ไม่เจอบาร์โค้ดในเฟรมนี้ - ไม่ต้องทำอะไร */ },
    )
    .then(() => {
      const statusEl = document.getElementById('form-qr-status');
      if (statusEl) statusEl.remove();
    })
    .catch((err) => {
      console.error(err);
      const statusEl = document.getElementById('form-qr-status');
      if (statusEl) statusEl.textContent = 'ไม่สามารถเข้าถึงกล้องได้ กรุณาอนุญาตการใช้กล้อง';
    });
}
function stopFormScanner() {
  if (formQrCode) {
    const instance = formQrCode;
    formQrCode = null;
    instance.stop().catch(() => {}).finally(() => { try { instance.clear(); } catch {} });
  }
}
function closeProductForm() {
  stopFormScanner();
  closeModal();
}

function markRemovedConfirm(id) {
  const p = products.find((x) => x.id === id);
  if (!p) return;
  showConfirmModal(`เก็บ "${p.name}" ออกจากชั้นแล้วใช่ไหมคะ?`, async () => {
    p.removed = true;
    p.removedDate = new Date().toISOString();
    p.removedBy = state.staffCode || '';
    if (await saveProductsOrWarn()) {
      renderPage();
      showToast('📦 เก็บออกแล้ว');
    }
  }, { confirmLabel: '✅ เก็บออกแล้ว' });
}

async function undoRemoveProduct(id) {
  const p = products.find((x) => x.id === id);
  if (!p) return;
  delete p.removed;
  delete p.removedDate;
  if (await saveProductsOrWarn()) renderPage();
}

function confirmDeleteProduct(id) {
  const p = products.find((x) => x.id === id);
  if (!p) return;
  showConfirmModal(`ลบสินค้า "${p.name}"?`, async () => {
    products = products.filter((x) => x.id !== id);
    if (await saveProductsOrWarn()) renderPage();
  }, { danger: true, confirmLabel: 'ลบ' });
}

function exportCSV() {
  const headers = ['Barcode', 'Name', 'ExpiryDate', 'Status'];
  const rows = products.map(withComputed).map(p => [p.barcode, p.name, p.expiryDate, STATUS_LABEL_TH[p.status]]);
  const csvContent = "\uFEFF" + [headers, ...rows].map(e => e.join(",")).join("\n");
  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.setAttribute("href", url); link.setAttribute("download", `expiry_report.csv`);
  document.body.appendChild(link); link.click(); document.body.removeChild(link);
}

function backupJSON() {
  const data = { products, pendingSubmissions };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a"); link.href = url; link.download = `rimping_backup.json`; link.click();
}

function handleRestoreFile(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = (event) => {
    try {
      const data = JSON.parse(String(event.target.result));
      if (data && Array.isArray(data.products)) {
        pendingRestoreProducts = data.products;
        document.getElementById('restore-panel').innerHTML = `<div class="mt-2 p-2 bg-amber-50 rounded-lg text-xs">พบ ${data.products.length} รายการ <button onclick="confirmRestore()" class="text-brand-600 font-bold ml-2">กู้คืน</button></div>`;
      }
    } catch { showAlertModal('ไฟล์ไม่ถูกต้อง'); }
  };
  reader.readAsText(file);
}
async function confirmRestore() { if (pendingRestoreProducts) { products = pendingRestoreProducts; if (await saveProductsOrWarn()) { pendingRestoreProducts = null; document.getElementById('restore-panel').innerHTML = ''; renderPage(); showAlertModal('สำเร็จ'); } } }

function openModal(html) { document.getElementById('modal-root').innerHTML = html; document.body.style.overflow = 'hidden'; }
function closeModal() { document.getElementById('modal-root').innerHTML = ''; document.body.style.overflow = ''; }

// ==================== Custom alert/confirm (replaces native confirm()/alert()) ====================
// หมายเหตุ: เมื่อแอปถูก "เพิ่มไปยังหน้าจอโฮม" บน iPhone (standalone mode) คำสั่ง confirm()/alert()
// ของเบราว์เซอร์จะไม่ทำงานและทำให้หน้าจอค้างทั้งหน้า จึงต้องใช้หน้าต่างยืนยันที่สร้างขึ้นเองแทน
let pendingConfirmAction = null;
function showAlertModal(message) {
  openModal(`
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4" onclick="if(event.target===this) closeModal()">
      <div class="w-full max-w-sm rounded-2xl bg-white p-5 shadow-xl text-center">
        <p class="text-sm text-stone-700 whitespace-pre-line">${escapeHtml(message)}</p>
        <button onclick="closeModal()" class="mt-4 w-full rounded-xl bg-brand-600 py-2.5 text-sm font-bold text-white active:scale-95">ตกลง</button>
      </div>
    </div>
  `);
}
function showConfirmModal(message, onConfirm, opts) {
  opts = opts || {};
  pendingConfirmAction = onConfirm;
  const confirmLabel = opts.confirmLabel || 'ยืนยัน';
  const confirmClass = opts.danger ? 'bg-red-600' : 'bg-brand-600';
  openModal(`
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4" onclick="if(event.target===this){ pendingConfirmAction=null; closeModal(); }">
      <div class="w-full max-w-sm rounded-2xl bg-white p-5 shadow-xl text-center">
        <p class="text-sm text-stone-700 whitespace-pre-line">${escapeHtml(message)}</p>
        <div class="mt-4 flex gap-2">
          <button onclick="pendingConfirmAction=null; closeModal();" class="flex-1 rounded-xl bg-stone-100 py-2.5 text-sm font-bold text-stone-600 active:scale-95">ยกเลิก</button>
          <button onclick="runPendingConfirm()" class="flex-1 rounded-xl ${confirmClass} py-2.5 text-sm font-bold text-white active:scale-95">${confirmLabel}</button>
        </div>
      </div>
    </div>
  `);
}
function runPendingConfirm() {
  const action = pendingConfirmAction;
  pendingConfirmAction = null;
  closeModal();
  if (action) action();
}

// ดึงข้อมูลจาก Supabase มาใหม่ — silent=true ใช้ตอน sync อัตโนมัติ (ไม่ขึ้น toast, ไม่รบกวนตอนกำลังสแกนกล้องอยู่)
async function refreshFromCloud(silent) {
  if (!silent) showToast('🔄 กำลังรีเฟรชข้อมูล...');
  try {
    const [p, ps, ac] = await Promise.all([fetchProductsFromCloud(), fetchPendingFromCloud(), fetchAdminCredsFromCloud()]);
    products = p;
    pendingSubmissions = ps;
    adminCreds = ac;
    // ไม่รีเฟรชหน้าจอตอนกำลังสแกนบาร์โค้ดอยู่ เพื่อไม่ให้กล้องสะดุด (ข้อมูลที่ดึงมาใหม่จะถูกใช้ตอนกลับไปหน้าอื่น)
    if (!(silent && state.tab === 'scanner')) renderPage();
    if (!silent) showToast('✅ อัปเดตข้อมูลล่าสุดแล้ว');
  } catch (err) {
    console.error('refreshFromCloud failed:', err);
    if (!silent) showAlertModal('รีเฟรชข้อมูลไม่สำเร็จ กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองใหม่อีกครั้งค่ะ');
  }
}

// ==================== Realtime sync (ออนไลน์ทุกเครื่องอัตโนมัติ ไม่ต้องกดรีเฟรชเอง) ====================
// ทุกเครื่องที่เปิดแอปจะรับการเปลี่ยนแปลง (เพิ่ม/แก้ไข/ลบ/อนุมัติ/เปลี่ยนรหัสแอดมิน) จากเครื่องอื่นแบบสดทันที
let realtimeRefreshTimer = null;
function scheduleRealtimeRefresh() {
  // หน่วงเวลาเล็กน้อยและรวมหลายๆ การเปลี่ยนแปลงที่มาพร้อมกันให้เป็นการรีเฟรชครั้งเดียว
  clearTimeout(realtimeRefreshTimer);
  realtimeRefreshTimer = setTimeout(() => { refreshFromCloud(true); }, 600);
}
function setupRealtimeSync() {
  if (!sb) return;
  const updateStatusBadge = () => {
    const el = document.getElementById('online-status-badge');
    if (el) el.outerHTML = onlineStatusBadgeHTML();
  };
  sb.channel('expiry-products-realtime')
    .on('postgres_changes', { event: '*', schema: 'public', table: PRODUCTS_TABLE }, scheduleRealtimeRefresh)
    .subscribe((status) => { state.realtimeStatus.products = status; updateStatusBadge(); });
  sb.channel('expiry-pending-realtime')
    .on('postgres_changes', { event: '*', schema: 'public', table: PENDING_TABLE }, scheduleRealtimeRefresh)
    .subscribe((status) => { state.realtimeStatus.pending = status; updateStatusBadge(); });
  sb.channel('expiry-admincreds-realtime')
    .on('postgres_changes', { event: '*', schema: 'public', table: ADMIN_CREDS_TABLE }, scheduleRealtimeRefresh)
    .subscribe((status) => { state.realtimeStatus.admincreds = status; updateStatusBadge(); });
}

// ป้ายสถานะออนไลน์: เขียว = เชื่อมต่อเรียลไทม์อยู่ครบ, เหลือง = กำลังเชื่อมต่อ, แดง = หลุดการเชื่อมต่อ
function onlineStatusBadgeHTML() {
  const statuses = Object.values(state.realtimeStatus);
  let color = 'bg-amber-400';
  let label = 'กำลังเชื่อมต่อ...';
  if (statuses.every((s) => s === 'SUBSCRIBED')) {
    color = 'bg-emerald-500';
    label = 'ออนไลน์';
  } else if (statuses.some((s) => s === 'CHANNEL_ERROR' || s === 'TIMED_OUT' || s === 'CLOSED')) {
    color = 'bg-red-500';
    label = 'หลุดการเชื่อมต่อ';
  }
  return `<span id="online-status-badge" class="inline-flex items-center gap-1.5 rounded-full bg-white px-2.5 py-1 text-[10px] font-bold text-stone-500 shadow-sm ring-1 ring-stone-200" title="${label}"><span class="h-2 w-2 rounded-full ${color}"></span>${label}</span>`;
}

// ถามรหัส/ชื่อพนักงานก่อนเข้าใช้งานครั้งแรกของเครื่องนี้ (พิมพ์อะไรก็ได้ ไม่มีการตรวจสอบ แค่ติดป้ายว่าใครทำรายการ)
function ensureStaffCode() {
  return new Promise((resolve) => {
    const saved = getSavedStaffCode();
    if (saved) {
      state.staffCode = saved;
      resolve();
      return;
    }
    const appEl = document.getElementById('app');
    appEl.innerHTML = `
      <div class="flex h-[80vh] flex-col items-center justify-center gap-4 px-6 text-center">
        <span class="rounded-2xl bg-brand-600 p-3 text-3xl text-white">🧑‍💼</span>
        <div>
          <h1 class="text-lg font-bold text-stone-800">ใส่ชื่อ/รหัสพนักงาน</h1>
          <p class="mt-1 text-xs text-stone-400">เพื่อบันทึกว่าใครเป็นคนทำรายการ (พิมพ์อะไรก็ได้ครั้งเดียว เครื่องนี้จะจำไว้ให้)</p>
        </div>
        <form id="staff-code-form" class="w-full max-w-xs space-y-3">
          <input id="staff-code-input" placeholder="เช่น ชื่อเล่น หรือรหัสพนักงาน" required class="w-full rounded-xl border border-stone-200 px-4 py-3 text-center text-sm outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100" />
          <button type="submit" class="w-full rounded-xl bg-brand-600 py-3 text-sm font-bold text-white active:scale-95">เข้าใช้งาน</button>
        </form>
      </div>`;
    document.getElementById('staff-code-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const code = document.getElementById('staff-code-input').value.trim();
      if (!code) return;
      saveStaffCode(code);
      state.staffCode = code;
      resolve();
    });
  });
}

// เปลี่ยนชื่อ/รหัสพนักงานของเครื่องนี้ได้ทุกเมื่อ (เช่น เปลี่ยนเวรกัน)
function promptChangeStaffCode() {
  openModal(`
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4" onclick="if(event.target===this) closeModal()">
      <div class="w-full max-w-sm rounded-2xl bg-white p-5 shadow-xl text-center">
        <p class="text-sm font-bold text-stone-700">เปลี่ยนชื่อ/รหัสพนักงาน</p>
        <p class="mt-1 text-xs text-stone-400">ใช้สำหรับเครื่องนี้เท่านั้น (เช่น เปลี่ยนเวรกัน)</p>
        <form id="staff-code-change-form" class="mt-3">
          <input id="staff-code-change-input" value="${escapeHtml(state.staffCode)}" placeholder="ชื่อ/รหัสพนักงาน" required class="w-full rounded-xl border border-stone-200 px-3 py-2.5 text-center text-sm outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100" />
          <div class="mt-4 flex gap-2">
            <button type="button" onclick="closeModal()" class="flex-1 rounded-xl bg-stone-100 py-2.5 text-sm font-bold text-stone-600 active:scale-95">ยกเลิก</button>
            <button type="submit" class="flex-1 rounded-xl bg-brand-600 py-2.5 text-sm font-bold text-white active:scale-95">บันทึก</button>
          </div>
        </form>
      </div>
    </div>
  `);
  document.getElementById('staff-code-change-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const code = document.getElementById('staff-code-change-input').value.trim();
    if (!code) return;
    saveStaffCode(code);
    state.staffCode = code;
    closeModal();
    renderPage();
  });
}

async function initApp() {
  await ensureStaffCode();
  const appEl = document.getElementById('app');
  appEl.innerHTML = `
    <div class="flex h-[70vh] flex-col items-center justify-center gap-3 text-center">
      <div class="h-10 w-10 animate-spin rounded-full border-4 border-brand-200 border-t-brand-600"></div>
      <p class="text-sm text-stone-500">กำลังโหลดข้อมูลจาก Supabase...</p>
    </div>`;
  try {
    const [p, ps, ac] = await Promise.all([fetchProductsFromCloud(), fetchPendingFromCloud(), fetchAdminCredsFromCloud()]);
    products = p;
    pendingSubmissions = ps;
    adminCreds = ac;
    renderPage();
    setupRealtimeSync();
  } catch (err) {
    console.error('initApp failed:', err);
    const errDetail = (err && (err.message || err.error_description || err.hint || err.details)) || (typeof err === 'string' ? err : JSON.stringify(err));
    appEl.innerHTML = `
      <div class="flex h-[70vh] flex-col items-center justify-center gap-3 px-6 text-center">
        <p class="text-3xl">📡</p>
        <p class="text-sm font-semibold text-stone-700">เชื่อมต่อ Supabase ไม่สำเร็จ</p>
        <p class="text-xs text-stone-400">ตรวจสอบการเชื่อมต่ออินเทอร์เน็ต หรือตั้งค่า Supabase (URL/Key/ตาราง) แล้วลองโหลดหน้านี้ใหม่อีกครั้งค่ะ</p>
        <p class="mt-1 max-w-xs break-words rounded-xl bg-stone-100 px-3 py-2 text-left text-[11px] text-stone-500">${escapeHtml(errDetail)}</p>
        <button onclick="location.reload()" class="mt-2 rounded-xl bg-brand-600 px-4 py-2 text-sm font-semibold text-white active:scale-95">โหลดหน้านี้ใหม่</button>
      </div>`;
  }
}
initApp();

// ==================== Lock zoom (กันซูมเข้า-ออก) ====================
// บางเวอร์ชันของ iOS ไม่สนใจ user-scalable=no ใน viewport meta จึงกันซ้ำด้วย JS
document.addEventListener('gesturestart', (e) => e.preventDefault());
document.addEventListener('gesturechange', (e) => e.preventDefault());
document.addEventListener('touchmove', (e) => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
let lastTapTime = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - lastTapTime < 300) e.preventDefault();
  lastTapTime = now;
}, { passive: false });
</script>
